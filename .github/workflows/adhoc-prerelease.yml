name: Ad-hoc prerelease

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or SHA to build
        required: true
        type: string
      release_tag:
        description: Optional immutable prerelease tag to create
        required: false
        type: string
      stable_release_tag:
        description: Optional stable prerelease channel tag to create or update
        required: false
        type: string
      retention_days:
        description: Days before cleanup deletes this prerelease (0 to disable; max 365)
        required: false
        default: "60"
        type: string
      expires_at:
        description: Optional expiration date or RFC3339 timestamp; overrides retention_days
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: adhoc-prerelease-${{ github.event.inputs.stable_release_tag || github.event.inputs.source_ref }}
  cancel-in-progress: false

run-name: Ad-hoc prerelease ${{ inputs.source_ref }}

jobs:
  prerelease:
    name: Build prerelease
    runs-on: ubuntu-latest
    env:
      RELEASE_GITHUB_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
    steps:
      - name: Configure GH_HOST for enterprise compatibility
        shell: bash
        run: |
          set -euo pipefail
          gh_host="${GITHUB_SERVER_URL#https://}"
          gh_host="${gh_host#http://}"
          echo "GH_HOST=${gh_host}" >> "$GITHUB_ENV"

      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout workflow helper scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          path: .workflow-source
          persist-credentials: false
          ref: ${{ github.ref }}

      - name: Stage workflow helper scripts
        shell: bash
        run: |
          set -euo pipefail
          helper_dir="${RUNNER_TEMP}/kongctl-adhoc-prerelease"
          mkdir -p "${helper_dir}"
          cp ".workflow-source/scripts/setup-private-sdk.sh" "${helper_dir}/setup-private-sdk.sh"
          chmod +x "${helper_dir}/setup-private-sdk.sh"
          echo "PRIVATE_SDK_HELPER=${helper_dir}/setup-private-sdk.sh" >> "$GITHUB_ENV"

      - name: Checkout source ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ inputs.source_ref }}
          token: ${{ env.RELEASE_GITHUB_TOKEN }}

      - name: Resolve source and release tags
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ env.RELEASE_GITHUB_TOKEN }}
          EXPIRES_AT_INPUT: ${{ inputs.expires_at }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RETENTION_DAYS_INPUT: ${{ inputs.retention_days }}
          STABLE_RELEASE_TAG_INPUT: ${{ inputs.stable_release_tag }}
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail

          sanitize_ref() {
            local value="$1"

            case "${value}" in
              refs/pull/*/head | refs/pull/*/merge)
                value="pr-${value#refs/pull/}"
                value="${value%/head}"
                value="${value%/merge}"
                ;;
              pull/*/head | pull/*/merge)
                value="pr-${value#pull/}"
                value="${value%/head}"
                value="${value%/merge}"
                ;;
              refs/heads/*)
                value="${value#refs/heads/}"
                ;;
              refs/tags/*)
                value="${value#refs/tags/}"
                ;;
              origin/*)
                value="${value#origin/}"
                ;;
            esac

            value="$(printf '%s' "${value}" | tr '[:upper:]' '[:lower:]')"
            value="$(printf '%s' "${value}" | sed -E 's/[^a-z0-9._-]+/-/g; s/-+/-/g')"
            value="$(printf '%s' "${value}" | sed -E 's/[.]{2,}/-/g; s/\.lock($|[._-])/-lock\1/g')"
            value="$(printf '%s' "${value}" | sed -E 's/^[._-]+//; s/[._-]+$//')"

            if [ -z "${value}" ]; then
              value="source"
            fi

            if [[ "${value}" =~ ^[0-9] ]]; then
              value="ref-${value}"
            fi

            value="$(printf '%.80s' "${value}")"
            value="$(printf '%s' "${value}" | sed -E 's/[._-]+$//; s/\.lock$/-lock/')"

            if [ -z "${value}" ]; then
              value="source"
            fi

            printf '%s\n' "${value}"
          }

          validate_tag() {
            local tag="$1"

            if [ -z "${tag}" ]; then
              echo "::error::release_tag must not be empty"
              exit 1
            fi

            if [ "${#tag}" -gt 128 ]; then
              echo "::error::release tag is too long (${#tag} characters); maximum is 128"
              exit 1
            fi

            if [[ "${tag}" == */* ]]; then
              echo "::error::release tag must not contain '/': ${tag}"
              exit 1
            fi

            if [[ "${tag}" =~ ^[0-9] ]]; then
              echo "::error::release tag must not start with a digit: ${tag}"
              exit 1
            fi

            if [[ "${tag}" == -* ]]; then
              echo "::error::release tag must not start with '-': ${tag}"
              exit 1
            fi

            if ! git check-ref-format --allow-onelevel "${tag}"; then
              echo "::error::release tag is not a valid Git tag name: ${tag}"
              exit 1
            fi
          }

          validate_stable_release_tag() {
            local tag="$1"

            if [ -z "${tag}" ]; then
              echo "::error::stable_release_tag must not be empty"
              exit 1
            fi

            if [ "${#tag}" -gt 128 ]; then
              echo "::error::stable_release_tag is too long (${#tag} characters); maximum is 128"
              exit 1
            fi

            if [[ "${tag}" == */* ]]; then
              echo "::error::stable_release_tag must not contain '/': ${tag}"
              exit 1
            fi

            if [[ "${tag}" =~ ^[0-9] ]]; then
              echo "::error::stable_release_tag must not start with a digit: ${tag}"
              exit 1
            fi

            if [[ "${tag}" == -* ]]; then
              echo "::error::stable_release_tag must not start with '-': ${tag}"
              exit 1
            fi

            if ! git check-ref-format --allow-onelevel "${tag}"; then
              echo "::error::stable_release_tag is not a valid Git tag name: ${tag}"
              exit 1
            fi

            if [[ "${tag}" != prerelease-* ]]; then
              echo "::error::stable_release_tag must start with 'prerelease-' to avoid moving stable release tags: ${tag}"
              exit 1
            fi

            if [[ "${tag}" =~ -[0-9]{8}-[0-9]{4}-g[0-9a-fA-F]{7,}$ ]]; then
              echo "::error::stable_release_tag must not look like an immutable timestamped prerelease tag: ${tag}"
              exit 1
            fi
          }

          resolve_expiration() {
            local expires_at_input="$1"
            local retention_days_input="$2"
            local now_epoch
            local expires_at_epoch

            now_epoch="$(date -u +%s)"

            if [ -n "${expires_at_input}" ]; then
              if ! expires_at_epoch="$(date -u -d "${expires_at_input}" +%s 2>/dev/null)"; then
                echo "::error::expires_at must be a valid date or RFC3339 timestamp: ${expires_at_input}"
                exit 1
              fi
            else
              retention_days_input="${retention_days_input:-60}"

              if ! [[ "${retention_days_input}" =~ ^[0-9]+$ ]]; then
                echo "::error::retention_days must be a non-negative integer: ${retention_days_input}"
                exit 1
              fi

              local retention_days_num
              retention_days_num="$((10#${retention_days_input}))"
              if [ "${retention_days_num}" -eq 0 ]; then
                return 0
              fi

              if [ "${retention_days_num}" -gt 365 ]; then
                echo "::error::retention_days must be 365 or less for ad-hoc prereleases"
                exit 1
              fi

              expires_at_epoch="$((now_epoch + retention_days_num * 86400))"
            fi

            if [ "${expires_at_epoch}" -le "${now_epoch}" ]; then
              echo "::error::expiration must be in the future"
              exit 1
            fi

            date -u -d "@${expires_at_epoch}" +"%Y-%m-%dT%H:%M:%SZ"
          }

          source_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          expires_at="$(resolve_expiration "${EXPIRES_AT_INPUT}" "${RETENTION_DAYS_INPUT}")"
          safe_ref="$(sanitize_ref "${SOURCE_REF}")"
          stable_release_tag="${STABLE_RELEASE_TAG_INPUT}"

          if [ -n "${RELEASE_TAG_INPUT}" ]; then
            release_tag="${RELEASE_TAG_INPUT}"
          else
            timestamp="$(date -u +%Y%m%d-%H%M)"
            release_tag="prerelease-${safe_ref}-${timestamp}-g${short_sha}"
          fi

          validate_tag "${release_tag}"
          if [ -n "${stable_release_tag}" ]; then
            validate_stable_release_tag "${stable_release_tag}"
            if [ "${stable_release_tag}" = "${release_tag}" ]; then
              echo "::error::stable_release_tag must be different from release_tag: ${stable_release_tag}"
              exit 1
            fi
          fi

          git fetch origin --tags --force
          if git show-ref --verify --quiet "refs/tags/${release_tag}"; then
            echo "::error::Git tag already exists locally: ${release_tag}"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            echo "::error::Git tag already exists on origin: ${release_tag}"
            exit 1
          fi

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            echo "::error::GitHub release already exists: ${release_tag}"
            exit 1
          fi

          {
            echo "release_tag=${release_tag}"
            echo "stable_release_tag=${stable_release_tag}"
            echo "expires_at=${expires_at}"
            echo "safe_ref=${safe_ref}"
            echo "short_sha=${short_sha}"
            echo "source_sha=${source_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          cache: false
          go-version-file: go.mod

      - name: Set up private SDK if needed
        id: private_sdk
        shell: bash
        run: |
          set -euo pipefail
          "${PRIVATE_SDK_HELPER}"
        env:
          GH_TOKEN_PRIVATE_READ: ${{ secrets.GH_TOKEN_PRIVATE_READ }}

      - name: Validate build
        shell: bash
        run: |
          set -euo pipefail
          VERSION=dev make build-ci

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          go test -race -count=1 ./...

      - name: Prepare GoReleaser config
        id: goreleaser_config
        shell: bash
        run: |
          set -euo pipefail
          config="${RUNNER_TEMP}/goreleaser-adhoc.yml"
          python3 - <<'PY'
          import os
          from pathlib import Path

          src = Path(".goreleaser.yml")
          dst = Path(os.environ["RUNNER_TEMP"]) / "goreleaser-adhoc.yml"
          text = src.read_text()
          needle = "- -X main.version={{.Version}}"
          replacement = "- -X main.version=dev"
          if needle not in text:
              raise SystemExit("could not find GoReleaser main.version ldflag")
          dst.write_text(text.replace(needle, replacement, 1))
          PY
          echo "config=${config}" >> "$GITHUB_OUTPUT"

      - name: Hide ad-hoc prerelease tags from GoReleaser
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t prerelease_tags < <(git tag -l 'prerelease-*')
          if [ "${#prerelease_tags[@]}" -gt 0 ]; then
            git tag -d "${prerelease_tags[@]}"
          fi

      - name: Build release binaries
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        env:
          CGO_ENABLED: "0"
        with:
          args: build --snapshot --clean --config ${{ steps.goreleaser_config.outputs.config }}
          distribution: goreleaser
          version: v2.13.3

      - name: Package ZIP assets
        shell: bash
        run: |
          set -euo pipefail

          command -v zip >/dev/null 2>&1 || {
            echo "::error::zip is required to package prerelease assets"
            exit 1
          }

          linux_amd64_bin="$(find dist -type f -path "*/kongctl_linux_amd64*" -name kongctl | sort | head -n 1)"
          if [ -z "${linux_amd64_bin}" ]; then
            echo "::error::GoReleaser did not produce a linux/amd64 kongctl binary"
            exit 1
          fi

          version_output="$("${linux_amd64_bin}" version --full)"
          if [[ "${version_output}" != dev\ * && "${version_output}" != "dev" ]]; then
            echo "::error::ad-hoc prerelease binary version must be dev; got: ${version_output}"
            exit 1
          fi

          rm -rf release-assets
          mkdir -p release-assets

          targets=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for target in "${targets[@]}"; do
            os="${target%/*}"
            arch="${target#*/}"
            binary="kongctl"
            if [ "${os}" = "windows" ]; then
              binary="kongctl.exe"
            fi

            built_binary="$(find dist -type f -path "*/kongctl_${os}_${arch}*" -name "${binary}" | sort | head -n 1)"
            if [ -z "${built_binary}" ]; then
              echo "::error::GoReleaser did not produce ${target} binary"
              exit 1
            fi

            stage="${RUNNER_TEMP}/kongctl-${os}-${arch}"
            rm -rf "${stage}"
            mkdir -p "${stage}"
            cp "${built_binary}" "${stage}/${binary}"

            files=("${binary}")
            if [ -f LICENSE ]; then
              cp LICENSE "${stage}/LICENSE"
              files+=("LICENSE")
            fi
            if [ -f README.md ]; then
              cp README.md "${stage}/README.md"
              files+=("README.md")
            fi

            archive="${GITHUB_WORKSPACE}/release-assets/kongctl_${os}_${arch}.zip"
            (cd "${stage}" && zip -q "${archive}" "${files[@]}")
          done

          (cd release-assets && sha256sum kongctl_*.zip > checksums.txt)

      - name: Prepare release notes
        id: notes
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          SDK_COMMIT: ${{ steps.private_sdk.outputs.sdk_commit }}
          SDK_MODE: ${{ steps.private_sdk.outputs.sdk_mode }}
          SDK_VERSION: ${{ steps.private_sdk.outputs.sdk_version }}
          STABLE_RELEASE_TAG: ${{ steps.release.outputs.stable_release_tag }}
          EXPIRES_AT: ${{ steps.release.outputs.expires_at }}
          SOURCE_REF: ${{ inputs.source_ref }}
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
        run: |
          set -euo pipefail
          notes="${RUNNER_TEMP}/release-notes.md"

          {
            echo "## Ad-hoc prerelease"
            echo ""
            echo "<!-- kongctl-adhoc-prerelease: true -->"
            if [ -n "${EXPIRES_AT}" ]; then
              echo "<!-- kongctl-adhoc-prerelease-expires-at: ${EXPIRES_AT} -->"
            fi
            echo ""
            echo "- Source ref: \`${SOURCE_REF}\`"
            echo "- Source SHA: \`${SOURCE_SHA}\`"
            echo "- Binary version: \`dev\`"
            if [ -n "${STABLE_RELEASE_TAG}" ]; then
              echo "- Stable channel: \`${STABLE_RELEASE_TAG}\`"
            fi
            if [ -n "${EXPIRES_AT}" ]; then
              echo "- Expires at: \`${EXPIRES_AT}\`"
            else
              echo "- Expires at: disabled"
            fi
            echo "- SDK mode: \`${SDK_MODE:-public}\`"
            if [ -n "${SDK_VERSION}" ]; then
              echo "- Internal SDK version: \`${SDK_VERSION}\`"
            fi
            if [ -n "${SDK_COMMIT}" ]; then
              echo "- Internal SDK commit: \`${SDK_COMMIT}\`"
            fi
            echo ""
            echo "### Validation"
            echo ""
            echo "- \`VERSION=dev make build-ci\`"
            echo "- \`go test -race -count=1 ./...\`"
            echo "- GoReleaser snapshot cross-compile completed"
            echo "- ZIP assets and \`checksums.txt\` generated"
            echo ""
            echo "### Install"
            echo ""
            if [ -n "${STABLE_RELEASE_TAG}" ]; then
              echo "Stable channel:"
              echo ""
              echo "\`\`\`sh"
              echo "curl -fsSL https://raw.githubusercontent.com/Kong/kongctl/main/scripts/install.sh | sh -s -- --version ${STABLE_RELEASE_TAG}"
              echo "\`\`\`"
              echo ""
              echo "This immutable build:"
              echo ""
            fi
            echo "\`\`\`sh"
            echo "curl -fsSL https://raw.githubusercontent.com/Kong/kongctl/main/scripts/install.sh | sh -s -- --version ${RELEASE_TAG}"
            echo "\`\`\`"
          } > "${notes}"

          echo "path=${notes}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${SOURCE_SHA}" -m "Ad-hoc prerelease ${RELEASE_TAG}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ env.RELEASE_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" release-assets/*.zip release-assets/checksums.txt \
            --notes-file "${{ steps.notes.outputs.path }}" \
            --prerelease \
            --latest=false \
            --target "${SOURCE_SHA}" \
            --title "${RELEASE_TAG}" \
            --verify-tag

      - name: Create or update stable GitHub prerelease
        if: steps.release.outputs.stable_release_tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ env.RELEASE_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          STABLE_RELEASE_TAG: ${{ steps.release.outputs.stable_release_tag }}
          SOURCE_SHA: ${{ steps.release.outputs.source_sha }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "${STABLE_RELEASE_TAG}" "${SOURCE_SHA}" \
            -m "Ad-hoc prerelease channel ${STABLE_RELEASE_TAG} -> ${RELEASE_TAG}"
          git push --force origin "refs/tags/${STABLE_RELEASE_TAG}"

          if gh release view "${STABLE_RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${STABLE_RELEASE_TAG}" release-assets/*.zip release-assets/checksums.txt --clobber
            gh release edit "${STABLE_RELEASE_TAG}" \
              --notes-file "${{ steps.notes.outputs.path }}" \
              --prerelease \
              --target "${SOURCE_SHA}" \
              --title "${STABLE_RELEASE_TAG}"
          else
            gh release create "${STABLE_RELEASE_TAG}" release-assets/*.zip release-assets/checksums.txt \
              --notes-file "${{ steps.notes.outputs.path }}" \
              --prerelease \
              --latest=false \
              --target "${SOURCE_SHA}" \
              --title "${STABLE_RELEASE_TAG}" \
              --verify-tag
          fi

      - name: Verify GitHub prerelease state
        shell: bash
        env:
          GH_TOKEN: ${{ env.RELEASE_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          STABLE_RELEASE_TAG: ${{ steps.release.outputs.stable_release_tag }}
        run: |
          set -euo pipefail

          latest_tag="$(gh api "/repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null || true)"

          verify_prerelease() {
            local tag="$1"

            is_prerelease="$(gh release view "${tag}" --json isPrerelease --jq '.isPrerelease')"
            if [ "${is_prerelease}" != "true" ]; then
              echo "::error::GitHub release ${tag} is not marked as a prerelease"
              exit 1
            fi

            if [ "${latest_tag}" = "${tag}" ]; then
              echo "::error::GitHub release ${tag} is marked as the repository latest release"
              exit 1
            fi
          }

          verify_prerelease "${RELEASE_TAG}"
          if [ -n "${STABLE_RELEASE_TAG}" ]; then
            verify_prerelease "${STABLE_RELEASE_TAG}"
          fi

      - name: Cleanup private SDK workspace
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .private
          if [ -d .git ]; then
            git checkout -- go.mod go.sum || true
          fi
