name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (manual fallback only; must match an existing GitHub release tag)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve release tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          TAG="${TAG#"${TAG%%[![:space:]]*}"}"
          TAG="${TAG%"${TAG##*[![:space:]]}"}"

          if [ -z "$TAG" ]; then
            echo "::error::Tag input cannot be empty."
            exit 1
          fi

          case "$TAG" in
            *$'\n'*|*$'\r'*)
              echo "::error::Tag input must not contain newline or carriage-return characters."
              exit 1
              ;;
          esac

          if [ "${TAG#-}" != "$TAG" ]; then
            echo "::error::Tag input must not start with a '-' character."
            exit 1
          fi

          echo "RESOLVED_TAG=$TAG" >> "$GITHUB_ENV"
          echo "SEMVER_TAGS_ENABLED=false" >> "$GITHUB_ENV"

          if echo "$TAG" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$'; then
            VERSION="${TAG#v}"
            MAJOR_MINOR="$(echo "$VERSION" | sed -E 's/^([0-9]+\.[0-9]+)\..*$/\1/')"
            echo "RESOLVED_VERSION=$VERSION" >> "$GITHUB_ENV"
            echo "RESOLVED_MAJOR_MINOR=$MAJOR_MINOR" >> "$GITHUB_ENV"
            echo "SEMVER_TAGS_ENABLED=true" >> "$GITHUB_ENV"
          fi

      - name: Download released binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          AMD64_ASSET="$(gh release view "$RESOLVED_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[] | select(.name | test("linux_amd64\\.zip$")) | .name' \
            | head -n1)"
          ARM64_ASSET="$(gh release view "$RESOLVED_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '.assets[] | select(.name | test("linux_arm64\\.zip$")) | .name' \
            | head -n1)"

          if [ -z "$AMD64_ASSET" ] || [ -z "$ARM64_ASSET" ]; then
            echo "::error::Missing linux amd64/arm64 zip assets for release $RESOLVED_TAG."
            exit 1
          fi

          rm -rf /tmp/kongctl-release-assets
          mkdir -p linux/amd64 linux/arm64 /tmp/kongctl-release-assets/amd64 /tmp/kongctl-release-assets/arm64
          rm -f linux/amd64/kongctl linux/arm64/kongctl

          gh release download "$RESOLVED_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$AMD64_ASSET" \
            --dir /tmp/kongctl-release-assets/amd64
          gh release download "$RESOLVED_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$ARM64_ASSET" \
            --dir /tmp/kongctl-release-assets/arm64

          unzip -o "/tmp/kongctl-release-assets/amd64/$AMD64_ASSET" -d /tmp/kongctl-release-assets/amd64/unpacked
          unzip -o "/tmp/kongctl-release-assets/arm64/$ARM64_ASSET" -d /tmp/kongctl-release-assets/arm64/unpacked

          AMD64_BIN="$(find /tmp/kongctl-release-assets/amd64/unpacked -type f -name kongctl | head -n1)"
          ARM64_BIN="$(find /tmp/kongctl-release-assets/arm64/unpacked -type f -name kongctl | head -n1)"

          if [ -z "$AMD64_BIN" ] || [ -z "$ARM64_BIN" ]; then
            echo "::error::Downloaded release assets did not contain expected kongctl binary."
            exit 1
          fi

          install -m 0755 "$AMD64_BIN" linux/amd64/kongctl
          install -m 0755 "$ARM64_BIN" linux/arm64/kongctl

      - name: Docker metadata (GHCR)
        id: meta-ghcr
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/kong/kongctl
          tags: |
            type=raw,value=${{ env.RESOLVED_TAG }}
            type=raw,value=${{ env.RESOLVED_VERSION }},enable=${{ env.SEMVER_TAGS_ENABLED == 'true' }}
            type=raw,value=${{ env.RESOLVED_MAJOR_MINOR }},enable=${{ env.SEMVER_TAGS_ENABLED == 'true' }}

      - name: Docker metadata (Docker Hub)
        id: meta-dockerhub
        if: ${{ env.DOCKER_USERNAME != '' }}
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: kong/kongctl
          tags: |
            type=raw,value=${{ env.RESOLVED_TAG }}
            type=raw,value=${{ env.RESOLVED_VERSION }},enable=${{ env.SEMVER_TAGS_ENABLED == 'true' }}
            type=raw,value=${{ env.RESOLVED_MAJOR_MINOR }},enable=${{ env.SEMVER_TAGS_ENABLED == 'true' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push to Docker Hub
        if: ${{ env.DOCKER_USERNAME != '' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
