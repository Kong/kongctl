name: E2E
run-name: >-
  E2E ${{
    github.event_name == 'workflow_dispatch' &&
    inputs.trusted_pr_number != '' &&
    format('trusted PR {0} {1}', inputs.trusted_pr_number, inputs.trusted_head_sha) ||
    github.event_name == 'workflow_dispatch' &&
    inputs.dispatch_source == 'main-debounce' &&
    format('main debounce {0}', inputs.main_sha) ||
    github.ref_name
  }}
permissions:
  contents: read

on:
  pull_request:
    branches: ['**']
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
    inputs:
      dispatch_source:
        description: Internal dispatch source
        type: string
        default: ""
      main_sha:
        description: Main branch SHA selected by the debounce workflow
        type: string
        default: ""
      trusted_pr_number:
        description: Fork PR number approved for trusted E2E
        type: string
        default: ""
      trusted_head_sha:
        description: Exact reviewed fork PR head SHA approved for trusted E2E
        type: string
        default: ""
      konnect_environment:
        description: Konnect environment to target
        type: choice
        options:
          - production
          - tech
        default: production
      run_portal_applications:
        description: Run Gmail-backed portal applications scenario
        type: boolean
        default: false
      capture_tcpdump:
        description: Capture tcpdump traffic for Konnect endpoints on the runner
        type: boolean
        default: false

env:
  DO_NOT_TRACK: "1"

# The E2E target orgs are shared stateful environments. Queue full workflow
# runs so PR, merge queue, manual, and debounced main runs never overlap.
concurrency:
  group: kongctl-e2e-global
  queue: max

jobs:
  e2e-needed:
    name: "E2E Gate: Decide"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      required: ${{ steps.detect.outputs.required }}
      is_fork: ${{ steps.detect.outputs.is_fork }}
      trusted_e2e_required: ${{ steps.detect.outputs.trusted_e2e_required }}
      run_shards: ${{ steps.detect.outputs.run_shards }}
      konnect_environment: ${{ steps.target.outputs.konnect_environment }}
      orgs_json: ${{ steps.target.outputs.orgs_json }}
      status_sha: ${{ steps.detect.outputs.status_sha }}
      checkout_repository: ${{ steps.detect.outputs.checkout_repository }}
      checkout_ref: ${{ steps.detect.outputs.checkout_ref }}
      trusted_pr_number: ${{ steps.detect.outputs.trusted_pr_number }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve Konnect target
        id: target
        shell: bash
        env:
          DISPATCH_KONNECT_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.konnect_environment || '' }}
          CONFIGURED_KONNECT_ENVIRONMENT: ${{ vars.KONGCTL_E2E_KONNECT_ENV || '' }}
          DEFAULT_ORGS_JSON: ${{ vars.KONGCTL_E2E_ORGS_JSON || '' }}
          PRODUCTION_ORGS_JSON: ${{ vars.KONGCTL_E2E_PRODUCTION_ORGS_JSON || '' }}
          TECH_ORGS_JSON: ${{ vars.KONGCTL_E2E_TECH_ORGS_JSON || '' }}
          DISABLE_DEFAULT_ORG_FALLBACK: >-
            ${{
              (
                github.event_name == 'pull_request' &&
                github.event.pull_request.head.repo.full_name != github.repository
              ) &&
              'true' ||
              'false'
            }}
        run: |
          set -euo pipefail

          konnect_environment="${DISPATCH_KONNECT_ENVIRONMENT:-}"
          if [ -z "${konnect_environment}" ]; then
            konnect_environment="${CONFIGURED_KONNECT_ENVIRONMENT:-production}"
          fi

          case "${konnect_environment}" in
            production|tech)
              ;;
            *)
              echo "::error::Unsupported Konnect environment: ${konnect_environment}"
              exit 1
              ;;
          esac

          orgs_json=""
          if [ "${konnect_environment}" = "tech" ]; then
            orgs_json="${TECH_ORGS_JSON:-}"
          else
            orgs_json="${PRODUCTION_ORGS_JSON:-}"
          fi
          if [ -z "${orgs_json}" ]; then
            orgs_json="${DEFAULT_ORGS_JSON:-}"
          fi
          if [ -z "${orgs_json}" ]; then
            if [ "${DISABLE_DEFAULT_ORG_FALLBACK}" = "true" ]; then
              orgs_json='[]'
            else
              orgs_json='[{"org_name":"default"}]'
            fi
          fi

          orgs_json="$(ORGS_JSON="${orgs_json}" python3 - <<'PY'
          import json
          import os

          orgs = json.loads(os.environ["ORGS_JSON"])
          if not isinstance(orgs, list):
              raise SystemExit("org matrix must be a JSON array")
          for index, org in enumerate(orgs):
              if not isinstance(org, dict) or not org.get("org_name"):
                  raise SystemExit(f"org matrix entry {index} must include org_name")
          print(json.dumps(orgs, separators=(",", ":")))
          PY
          )"

          echo "konnect_environment=${konnect_environment}" >> "${GITHUB_OUTPUT}"
          echo "orgs_json=${orgs_json}" >> "${GITHUB_OUTPUT}"

      - name: Detect whether E2E is required
        id: detect
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BASE_REF: ${{ github.base_ref || '' }}
          DISPATCH_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.dispatch_source || '' }}
          MAIN_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.main_sha || '' }}
          TRUSTED_PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.trusted_pr_number || '' }}
          TRUSTED_HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.trusted_head_sha || '' }}
          PULL_REQUEST_HEAD_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || '' }}
          PULL_REQUEST_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          status_sha="${GITHUB_SHA}"
          checkout_repository="${GITHUB_REPOSITORY}"
          checkout_ref="${GITHUB_SHA}"
          is_fork=false

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${PULL_REQUEST_HEAD_SHA}" ]; then
            status_sha="${PULL_REQUEST_HEAD_SHA}"
            if [ -n "${PULL_REQUEST_HEAD_REPO}" ] && [ "${PULL_REQUEST_HEAD_REPO}" != "${GITHUB_REPOSITORY}" ]; then
              is_fork=true
            fi
          fi

          emit_outputs() {
            local required="$1"
            local run_shards="$2"
            local trusted_e2e_required="$3"

            {
              echo "required=${required}"
              echo "run_shards=${run_shards}"
              echo "is_fork=${is_fork}"
              echo "trusted_e2e_required=${trusted_e2e_required}"
              echo "status_sha=${status_sha}"
              echo "checkout_repository=${checkout_repository}"
              echo "checkout_ref=${checkout_ref}"
              echo "trusted_pr_number=${TRUSTED_PR_NUMBER}"
            } >> "${GITHUB_OUTPUT}"
          }

          if [ -n "${TRUSTED_PR_NUMBER}" ] || [ -n "${TRUSTED_HEAD_SHA}" ]; then
            if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
              echo "::error::Trusted E2E inputs are only valid for workflow_dispatch."
              exit 1
            fi
            if [ -z "${TRUSTED_PR_NUMBER}" ] || [ -z "${TRUSTED_HEAD_SHA}" ]; then
              echo "::error::trusted_pr_number and trusted_head_sha must both be provided."
              exit 1
            fi
            if ! [[ "${TRUSTED_PR_NUMBER}" =~ ^[0-9]+$ ]]; then
              echo "::error::trusted_pr_number must be a pull request number."
              exit 1
            fi
            if ! [[ "${TRUSTED_HEAD_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "::error::trusted_head_sha must be a full 40-character Git SHA."
              exit 1
            fi

            pr_api="/repos/${GITHUB_REPOSITORY}/pulls/${TRUSTED_PR_NUMBER}"
            head_sha="$(gh api "${pr_api}" --jq '.head.sha')"
            head_repo="$(gh api "${pr_api}" --jq '.head.repo.full_name')"
            base_repo="$(gh api "${pr_api}" --jq '.base.repo.full_name')"

            if [ "${head_repo}" = "${base_repo}" ]; then
              echo "::error::Trusted fork E2E only accepts fork pull requests. Use the normal E2E workflow for same-repo PRs."
              exit 1
            fi
            if [ "${TRUSTED_HEAD_SHA}" != "${head_sha}" ]; then
              echo "::error::Trusted SHA ${TRUSTED_HEAD_SHA} does not match current PR head ${head_sha}."
              exit 1
            fi

            is_fork=true
            status_sha="${TRUSTED_HEAD_SHA}"
            checkout_repository="${head_repo}"
            checkout_ref="${TRUSTED_HEAD_SHA}"
            emit_outputs true true false
            echo "Trusted E2E required for fork PR #${TRUSTED_PR_NUMBER} at ${TRUSTED_HEAD_SHA}."
            exit 0
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${DISPATCH_SOURCE}" = "main-debounce" ]; then
            if [ -z "${MAIN_SHA}" ]; then
              echo "::error::Debounced E2E dispatch is missing main_sha."
              exit 1
            fi

            current_main_sha="$(
              gh api "/repos/${GITHUB_REPOSITORY}/git/ref/heads/${DEFAULT_BRANCH}" --jq '.object.sha'
            )"
            if [ "${MAIN_SHA}" != "${current_main_sha}" ]; then
              emit_outputs false false false
              echo "Skipping stale debounced E2E for ${MAIN_SHA}; current ${DEFAULT_BRANCH} is ${current_main_sha}."
              exit 0
            fi

            emit_outputs true true false
            echo "E2E required for debounced ${DEFAULT_BRANCH} dispatch at ${MAIN_SHA}."
            exit 0
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            emit_outputs true true false
            echo "E2E required for ${GITHUB_EVENT_NAME}."
            exit 0
          fi

          base_branch="${DEFAULT_BRANCH}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${BASE_REF}" ]; then
            base_branch="${BASE_REF}"
          fi

          if ! git check-ref-format --branch "${base_branch}" >/dev/null 2>&1; then
            echo "::error::Invalid base branch ref: ${base_branch}"
            exit 1
          fi

          remote_base_ref="refs/remotes/origin/${base_branch}"
          if ! git show-ref --verify --quiet "${remote_base_ref}"; then
            git fetch --no-tags --prune origin "refs/heads/${base_branch}:${remote_base_ref}"
          fi

          merge_base="$(git merge-base "origin/${base_branch}" HEAD)" || {
            echo "::error::Unable to determine merge base between origin/${base_branch} and HEAD"
            exit 1
          }

          changed_files="$(mktemp)"
          git diff --name-only "${merge_base}" HEAD | tee "${changed_files}"

          e2e_pattern="$(
            printf '%s' \
              '^(go\.mod|go\.sum|main\.go|[^/]+\.go|internal/.*|test/e2e/.*' \
              '|Makefile|\.goreleaser\.yml|\.github/workflows/e2e\.yaml' \
              '|\.github/workflows/e2e-main-debounce\.yaml)$'
          )"

          if grep -Eq "${e2e_pattern}" "${changed_files}"; then
            if [ "${is_fork}" = "true" ]; then
              emit_outputs true false true
              echo "E2E requires maintainer-triggered trusted run for fork PR."
              if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                {
                  echo "## E2E"
                  echo
                  echo "- Status: waiting for trusted maintainer run"
                  echo "- Reason: fork PR code cannot receive E2E secrets automatically"
                  echo "- Reviewed SHA required: ${status_sha}"
                } >> "${GITHUB_STEP_SUMMARY}"
              fi
            else
              emit_outputs true true false
              echo "E2E required for this change set."
            fi
            exit 0
          fi

          emit_outputs false false false
          echo "E2E not required for this change set."

  e2e-harness:
    name: E2E Harness
    needs:
      - e2e-needed
    if: needs.e2e-needed.outputs.run_shards == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ needs.e2e-needed.outputs.checkout_repository }}
          ref: ${{ needs.e2e-needed.outputs.checkout_ref }}

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Run E2E harness tests
        run: |
          go test -count=1 -tags=e2e ./test/e2e/harness/...

  e2e-build:
    name: E2E Build
    needs:
      - e2e-needed
    if: needs.e2e-needed.outputs.run_shards == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ needs.e2e-needed.outputs.checkout_repository }}
          ref: ${{ needs.e2e-needed.outputs.checkout_ref }}

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build kongctl
        run: make build-ci

      - name: Build E2E test binary
        run: go test -c -tags=e2e -o e2e.test ./test/e2e

      - name: Upload E2E binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-binaries-${{ github.run_id }}
          path: |
            ${{ github.workspace }}/kongctl
            ${{ github.workspace }}/e2e.test

  e2e:
    name: E2E (${{ matrix.org_name }})
    needs:
      - e2e-needed
      - e2e-harness
      - e2e-build
    if: needs.e2e-needed.outputs.run_shards == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Backstop serialization per target org if workflow-level serialization is
    # relaxed in the future.
    concurrency:
      group: konnect-e2e-${{ matrix.org_name }}
      queue: max
      cancel-in-progress: false
    environment: ${{ matrix.org_name }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.e2e-needed.outputs.orgs_json) }}
    env:
      KONGCTL_E2E_MATRIX_ORG: ${{ matrix.org_name }}
      KONGCTL_E2E_BIN: ${{ github.workspace }}/kongctl
      KONGCTL_E2E_TEST_BIN: ${{ github.workspace }}/e2e.test
      KONGCTL_E2E_TEST_TIMEOUT: ${{ vars.KONGCTL_E2E_TEST_TIMEOUT || '55m' }}
      KONGCTL_E2E_KONNECT_PAT: ${{ secrets.KONGCTL_E2E_KONNECT_PAT }}
      KONGCTL_E2E_KONNECT_ENV: ${{ needs.e2e-needed.outputs.konnect_environment }}
      KONGCTL_E2E_KONNECT_BASE_URL: ${{ vars.KONGCTL_E2E_KONNECT_BASE_URL || '' }}
      KONGCTL_E2E_KONNECT_BASE_AUTH_URL: ${{ vars.KONGCTL_E2E_KONNECT_BASE_AUTH_URL || '' }}
      KONGCTL_E2E_KONNECT_MACHINE_CLIENT_ID: ${{ vars.KONGCTL_E2E_KONNECT_MACHINE_CLIENT_ID || '' }}
      # Reset is enabled by default in the harness; set explicitly for clarity
      KONGCTL_E2E_RESET: "1"
      # Set HTTP timeout vars to 0s/default/off to disable kongctl/harness application-level timeouts
      # and rely on Go transport behavior plus the workflow/job timeout.
      KONGCTL_E2E_HTTP_TIMEOUT: ${{ vars.KONGCTL_E2E_HTTP_TIMEOUT || '0s' }}
      # Set TCP user timeout to 0s/default/off to leave TCP_USER_TIMEOUT unset and use the platform default.
      KONGCTL_E2E_HTTP_TCP_USER_TIMEOUT: ${{ vars.KONGCTL_E2E_HTTP_TCP_USER_TIMEOUT || '0s' }}
      KONGCTL_E2E_HTTP_DISABLE_KEEPALIVES: ${{ vars.KONGCTL_E2E_HTTP_DISABLE_KEEPALIVES || '' }}
      KONGCTL_E2E_HTTP_RECYCLE_CONNECTIONS_ON_ERROR: ${{ vars.KONGCTL_E2E_HTTP_RECYCLE_CONNECTIONS_ON_ERROR || '1' }}
      KONGCTL_E2E_HTTP_RETRY_ATTEMPTS: ${{ vars.KONGCTL_E2E_HTTP_RETRY_ATTEMPTS || '4' }}
      KONGCTL_E2E_HTTP_RETRY_INTERVAL: ${{ vars.KONGCTL_E2E_HTTP_RETRY_INTERVAL || '1s' }}
      KONGCTL_E2E_HTTP_RETRY_MAX_INTERVAL: ${{ vars.KONGCTL_E2E_HTTP_RETRY_MAX_INTERVAL || '5s' }}
      KONGCTL_E2E_HTTP_RETRY_BACKOFF_FACTOR: ${{ vars.KONGCTL_E2E_HTTP_RETRY_BACKOFF_FACTOR || '2' }}
      KONGCTL_E2E_HTTP_RETRY_JITTER: ${{ vars.KONGCTL_E2E_HTTP_RETRY_JITTER || '250ms' }}
      # Set reset timeouts to 0s/default/off to disable reset deadlines and rely on the workflow/job timeout.
      KONGCTL_E2E_RESET_HTTP_TIMEOUT: ${{ vars.KONGCTL_E2E_RESET_HTTP_TIMEOUT || '0s' }}
      KONGCTL_E2E_RESET_TIMEOUT: ${{ vars.KONGCTL_E2E_RESET_TIMEOUT || '0s' }}
      KONGCTL_E2E_RESET_RETRY_ATTEMPTS: ${{ vars.KONGCTL_E2E_RESET_RETRY_ATTEMPTS || '3' }}
      KONGCTL_E2E_RESET_RETRY_INTERVAL: ${{ vars.KONGCTL_E2E_RESET_RETRY_INTERVAL || '1s' }}
      KONGCTL_E2E_RESET_RETRY_MAX_INTERVAL: ${{ vars.KONGCTL_E2E_RESET_RETRY_MAX_INTERVAL || '5s' }}
      KONGCTL_E2E_RESET_RETRY_BACKOFF_FACTOR: ${{ vars.KONGCTL_E2E_RESET_RETRY_BACKOFF_FACTOR || '2' }}
      KONGCTL_E2E_RESET_RETRY_JITTER: ${{ vars.KONGCTL_E2E_RESET_RETRY_JITTER || '250ms' }}
      KONGCTL_E2E_LOG_LEVEL: "debug"
      KONGCTL_E2E_CONSOLE_LOG_LEVEL: "warn"
      KONGCTL_E2E_ARTIFACTS_DIR: ${{ github.workspace }}/.e2e-artifacts/${{ github.run_id }}-${{ matrix.org_name }}
      KONGCTL_E2E_SHARD_INDEX: ${{ strategy.job-index }}
      KONGCTL_E2E_SHARD_TOTAL: ${{ strategy.job-total }}
      KONGCTL_E2E_ORGS_JSON: ${{ needs.e2e-needed.outputs.orgs_json }}
      KONGCTL_E2E_RUN_PORTAL_APPLICATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_portal_applications && '1' || '' }}
      KONGCTL_E2E_RUN_PORTAL_IDENTITY_PROVIDERS: ${{ vars.KONGCTL_E2E_RUN_PORTAL_IDENTITY_PROVIDERS || '' }}
      KONGCTL_E2E_CAPTURE_TCPDUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.capture_tcpdump && '1' || vars.KONGCTL_E2E_CAPTURE_TCPDUMP || '' }}
      KONGCTL_E2E_GMAIL_ACCESS_TOKEN: ${{ secrets.KONGCTL_E2E_GMAIL_ACCESS_TOKEN }}
      KONGCTL_E2E_GMAIL_ADDRESS: ${{ secrets.KONGCTL_E2E_GMAIL_ADDRESS }}
      KONGCTL_E2E_GMAIL_CLIENT_ID: ${{ secrets.KONGCTL_E2E_GMAIL_CLIENT_ID }}
      KONGCTL_E2E_GMAIL_CLIENT_SECRET: ${{ secrets.KONGCTL_E2E_GMAIL_CLIENT_SECRET }}
      KONGCTL_E2E_GMAIL_REFRESH_TOKEN: ${{ secrets.KONGCTL_E2E_GMAIL_REFRESH_TOKEN }}
      KONGCTL_E2E_PORTAL_IDP_ISSUER_URL: ${{ secrets.KONGCTL_E2E_PORTAL_IDP_ISSUER_URL }}
      KONGCTL_E2E_PORTAL_IDP_CLIENT_ID: ${{ secrets.KONGCTL_E2E_PORTAL_IDP_CLIENT_ID }}
      KONGCTL_E2E_PORTAL_IDP_CLIENT_SECRET: ${{ secrets.KONGCTL_E2E_PORTAL_IDP_CLIENT_SECRET }}
      KONGCTL_E2E_PORTAL_IDP_UPDATE_ISSUER_URL: ${{ secrets.KONGCTL_E2E_PORTAL_IDP_UPDATE_ISSUER_URL }}
      KONGCTL_E2E_PORTAL_IDP_UPDATE_CLIENT_ID: ${{ secrets.KONGCTL_E2E_PORTAL_IDP_UPDATE_CLIENT_ID }}
      KONGCTL_E2E_PORTAL_IDP_UPDATE_CLIENT_SECRET: ${{ secrets.KONGCTL_E2E_PORTAL_IDP_UPDATE_CLIENT_SECRET }}
      KONGCTL_E2E_ORG_USER_EMAIL_1: ${{ vars.KONGCTL_E2E_ORG_USER_EMAIL_1 }}
      KONGCTL_E2E_ORG_USER_EMAIL_2: ${{ vars.KONGCTL_E2E_ORG_USER_EMAIL_2 }}
      KONGCTL_E2E_ORG_USER_EMAIL_3: ${{ vars.KONGCTL_E2E_ORG_USER_EMAIL_3 }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ needs.e2e-needed.outputs.checkout_repository }}
          ref: ${{ needs.e2e-needed.outputs.checkout_ref }}

      # Optional: Un-comment if you need private module access
      # - name: Configure private module access
      #   run: git config --global url.https://$GITHUB_TOKEN@github.com/.insteadOf https://github.com/
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GH_TOKEN_PRIVATE_READ }}

      - name: Setup deck
        uses: kong/setup-deck@6ea0a466ee5826ddb531cbe851ba8e5a77a0e041 # v1.7.1

      - name: Download E2E binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e2e-binaries-${{ github.run_id }}
          path: ${{ github.workspace }}

      - name: Make E2E binaries executable
        run: chmod 0755 "${KONGCTL_E2E_BIN}" "${KONGCTL_E2E_TEST_BIN}"

      - name: Install tcpdump
        if: env.KONGCTL_E2E_CAPTURE_TCPDUMP == '1'
        run: |
          set -euo pipefail
          if ! command -v tcpdump >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y tcpdump
          fi

          tcpdump --version | sed -n '1p'

      - name: Start tcpdump capture
        if: env.KONGCTL_E2E_CAPTURE_TCPDUMP == '1'
        run: |
          set -euo pipefail

          CAP_DIR="${KONGCTL_E2E_ARTIFACTS_DIR}/tcpdump"
          mkdir -p "${CAP_DIR}"

          regional_url="${KONGCTL_E2E_KONNECT_BASE_URL:-}"
          global_url="${KONGCTL_E2E_KONNECT_BASE_AUTH_URL:-}"
          konnect_env="${KONGCTL_E2E_KONNECT_ENV:-production}"

          if [ -z "${regional_url}" ]; then
            if [ "${konnect_env}" = "tech" ]; then
              regional_url="https://us.api.konghq.tech"
            else
              regional_url="https://us.api.konghq.com"
            fi
          fi
          if [ -z "${global_url}" ]; then
            if [ "${konnect_env}" = "tech" ]; then
              global_url="https://global.api.konghq.tech"
            else
              global_url="https://global.api.konghq.com"
            fi
          fi

          regional_host="${regional_url#http://}"
          regional_host="${regional_host#https://}"
          regional_host="${regional_host%%/*}"
          global_host="${global_url#http://}"
          global_host="${global_host#https://}"
          global_host="${global_host%%/*}"
          filter="(tcp port 443) and (host ${regional_host} or host ${global_host})"

          {
            printf 'started_at=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'konnect_env=%s\n' "${konnect_env}"
            printf 'regional_host=%s\n' "${regional_host}"
            printf 'global_host=%s\n' "${global_host}"
            printf 'filter=%s\n' "${filter}"
            echo
            uname -a
            echo
            getent hosts "${regional_host}" || true
            getent hosts "${global_host}" || true
            echo
            ip addr || true
            echo
            ip route || true
          } > "${CAP_DIR}/context.txt"

          sudo tcpdump \
            -U \
            -i any \
            -nn \
            -s 0 \
            -w "${CAP_DIR}/konnect.pcap" \
            -Z "${USER}" \
            "${filter}" \
            > "${CAP_DIR}/tcpdump.log" 2>&1 &

          echo "$!" > "${CAP_DIR}/tcpdump.pid"

      # If you later want runs to be opt-in via label, add a guard like this:
      # - name: Require opt-in label to run E2E
      #   if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'run-e2e')
      #   run: |
      #     echo "Skipping E2E (no 'run-e2e' label)." && exit 0

      - name: Run E2E scenario tests (Konnect)
        run: |
          set -euo pipefail

          ART_DIR="${KONGCTL_E2E_ARTIFACTS_DIR}/$(date +%Y%m%d-%H%M%S)"
          mkdir -p "${ART_DIR}"
          export KONGCTL_E2E_ARTIFACTS_DIR="${ART_DIR}"

          extract_results() {
            local status="$1"
            local output_file="$2"

            sed -n "s/^[[:space:]]*--- ${status}: Test_Scenarios\/\(.*\) (.*/\1/p" "${ART_DIR}/run.log" | \
              sed 's#^test/e2e/scenarios/##' | sort > "${output_file}"
          }

          run_started_at="$(date +%s)"
          set +e
          "${KONGCTL_E2E_TEST_BIN}" -test.v -test.count=1 -test.timeout "${KONGCTL_E2E_TEST_TIMEOUT}" -test.run '^Test_Scenarios$' ${GOTESTFLAGS:-} \
            2>&1 | tee "${ART_DIR}/run.log"
          code=${PIPESTATUS[0]}
          set -e
          run_finished_at="$(date +%s)"

          passed_file="$(mktemp)"
          failed_file="$(mktemp)"
          skipped_file="$(mktemp)"

          extract_results "PASS" "${passed_file}"
          extract_results "FAIL" "${failed_file}"
          extract_results "SKIP" "${skipped_file}"

          passed_count="$(wc -l < "${passed_file}" | tr -d ' ')"
          failed_count="$(wc -l < "${failed_file}" | tr -d ' ')"
          skipped_count="$(wc -l < "${skipped_file}" | tr -d ' ')"
          observed_count="$((passed_count + failed_count + skipped_count))"
          duration_seconds="$((run_finished_at - run_started_at))"

          {
            printf 'org_name=%s\n' "${KONGCTL_E2E_MATRIX_ORG}"
            printf 'run_attempt=%s\n' "${GITHUB_RUN_ATTEMPT}"
            printf 'shard_index=%s\n' "${KONGCTL_E2E_SHARD_INDEX}"
            printf 'shard_total=%s\n' "${KONGCTL_E2E_SHARD_TOTAL}"
            printf 'exit_code=%s\n' "${code}"
            printf 'duration_seconds=%s\n' "${duration_seconds}"
            printf 'passed_count=%s\n' "${passed_count}"
            printf 'failed_count=%s\n' "${failed_count}"
            printf 'skipped_count=%s\n' "${skipped_count}"
            printf 'observed_count=%s\n' "${observed_count}"
            printf '\n[passed]\n'
            cat "${passed_file}"
            printf '\n[failed]\n'
            cat "${failed_file}"
            printf '\n[skipped]\n'
            cat "${skipped_file}"
          } > "${ART_DIR}/scenario-results.txt"

          echo "E2E artifacts: ${ART_DIR}"
          exit "${code}"

      - name: Stop tcpdump capture
        if: always() && env.KONGCTL_E2E_CAPTURE_TCPDUMP == '1'
        run: |
          set +e

          CAP_DIR="${KONGCTL_E2E_ARTIFACTS_DIR}/tcpdump"
          PID_FILE="${CAP_DIR}/tcpdump.pid"

          if [ -f "${PID_FILE}" ]; then
            pid="$(cat "${PID_FILE}")"
            sudo kill -INT "${pid}" 2>/dev/null || true

            for _ in $(seq 1 10); do
              if ! ps -p "${pid}" >/dev/null 2>&1; then
                break
              fi
              sleep 1
            done
          fi

          sudo chown -R "${USER}:${USER}" "${CAP_DIR}" 2>/dev/null || true
          ls -lh "${CAP_DIR}" || true

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts-${{ github.run_id }}-${{ matrix.org_name }}
          path: ${{ env.KONGCTL_E2E_ARTIFACTS_DIR }}

  e2e-verify:
    name: E2E Shard Verification
    needs:
      - e2e-needed
      - e2e
    if: ${{ always() && !cancelled() && needs.e2e-needed.outputs.run_shards == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ needs.e2e-needed.outputs.checkout_repository }}
          ref: ${{ needs.e2e-needed.outputs.checkout_ref }}

      - name: Download workflow artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ github.workspace }}/.downloaded-artifacts

      - name: Verify shard coverage
        shell: bash
        run: |
          set -euo pipefail

          summary_file="${GITHUB_STEP_SUMMARY:-}"
          summary_rows="$(mktemp)"
          failed_rows="$(mktemp)"
          nonzero_exit_rows="$(mktemp)"
          expected="$(mktemp)"
          actual="$(mktemp)"
          indices="$(mktemp)"
          records="$(mktemp)"
          selected_records="$(mktemp)"
          all_totals="$(mktemp)"
          latest_totals="$(mktemp)"
          passed_total=0
          failed_total=0
          skipped_total=0
          observed_total=0
          duration_total=0
          nonzero_exit_total=0

          fail() {
            local message="$1"
            echo "::error::${message}"
            if [ -n "${summary_file}" ]; then
              {
                echo "## E2E Verify"
                echo
                echo "- Status: failed"
                echo "- Reason: ${message}"
              } >> "${summary_file}"
            fi
            exit 1
          }

          find test/e2e/scenarios -name scenario.yaml -type f | \
            sed 's#^test/e2e/scenarios/##' | sort > "${expected}"

          mapfile -t manifests < <(find .downloaded-artifacts -name assigned-scenarios.txt -type f | sort)
          if [ "${#manifests[@]}" -eq 0 ]; then
            fail "No shard manifests were uploaded by the matrix jobs."
          fi

          : > "${actual}"
          : > "${indices}"
          : > "${records}"
          : > "${selected_records}"
          : > "${all_totals}"
          : > "${latest_totals}"
          : > "${summary_rows}"
          : > "${failed_rows}"
          : > "${nonzero_exit_rows}"

          for manifest in "${manifests[@]}"; do
            results="$(dirname "${manifest}")/scenario-results.txt"
            if [ ! -f "${results}" ]; then
              fail "Missing scenario results alongside ${manifest}"
            fi

            index="$(sed -n '1s/^shard_index=//p' "${manifest}")"
            total="$(sed -n '2s/^shard_total=//p' "${manifest}")"
            if [ -z "${index}" ] || [ -z "${total}" ]; then
              fail "Malformed shard manifest: ${manifest}"
            fi

            scenario_rows="$(tail -n +4 "${manifest}" | sed '/^$/d' | wc -l | tr -d ' ')"
            org_name="$(sed -n 's/^org_name=//p' "${results}")"
            if [ -z "${org_name}" ]; then
              artifact_name="$(basename "$(dirname "$(dirname "${manifest}")")")"
              org_name="${artifact_name#e2e-artifacts-${GITHUB_RUN_ID}-}"
            fi
            run_attempt="$(sed -n 's/^run_attempt=//p' "${results}")"
            if [ -z "${run_attempt}" ]; then
              run_attempt=1
            fi
            exit_code="$(sed -n 's/^exit_code=//p' "${results}")"
            duration_seconds="$(sed -n 's/^duration_seconds=//p' "${results}")"
            passed_count="$(sed -n 's/^passed_count=//p' "${results}")"
            failed_count="$(sed -n 's/^failed_count=//p' "${results}")"
            skipped_count="$(sed -n 's/^skipped_count=//p' "${results}")"
            observed_count="$(sed -n 's/^observed_count=//p' "${results}")"
            if [ -z "${exit_code}" ] || [ -z "${duration_seconds}" ] || [ -z "${passed_count}" ] || \
              [ -z "${failed_count}" ] || [ -z "${skipped_count}" ] || [ -z "${observed_count}" ]; then
              fail "Malformed scenario results: ${results}"
            fi

            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "${run_attempt}" \
              "${index}" \
              "${total}" \
              "${org_name}" \
              "${scenario_rows}" \
              "${passed_count}" \
              "${failed_count}" \
              "${skipped_count}" \
              "${observed_count}" \
              "${exit_code}" \
              "${duration_seconds}" \
              "${manifest}" \
              "${results}" >> "${records}"
          done

          cut -f3 "${records}" | sort -n -u > "${all_totals}"
          latest_attempt="$(cut -f1 "${records}" | sort -n | tail -n1)"
          awk -F'\t' -v attempt="${latest_attempt}" '$1 == attempt { print $3 }' "${records}" | \
            sort -n -u > "${latest_totals}"

          if [ "$(wc -l < "${latest_totals}" | tr -d ' ')" -ne 1 ]; then
            fail "Latest workflow attempt ${latest_attempt} reported inconsistent shard totals."
          fi

          total="$(cat "${latest_totals}")"
          sort -t $'\t' -k2,2n -k1,1nr "${records}" | \
            awk -F'\t' -v total="${total}" '$3 == total && !seen[$2]++ { print }' > "${selected_records}"

          while IFS=$'\t' read -r run_attempt index shard_total org_name scenario_rows \
            passed_count failed_count skipped_count observed_count exit_code duration_seconds manifest results; do
            if [ -z "${index}" ]; then
              continue
            fi

            printf '%s\n' "${index}" >> "${indices}"
            tail -n +4 "${manifest}" | sed '/^$/d' >> "${actual}"

            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "${index}" \
              "${run_attempt}" \
              "${org_name}" \
              "${scenario_rows}" \
              "${passed_count}" \
              "${failed_count}" \
              "${skipped_count}" \
              "${exit_code}" \
              "${duration_seconds}" >> "${summary_rows}"

            passed_total="$((passed_total + passed_count))"
            failed_total="$((failed_total + failed_count))"
            skipped_total="$((skipped_total + skipped_count))"
            observed_total="$((observed_total + observed_count))"
            duration_total="$((duration_total + duration_seconds))"
            if [ "${exit_code}" -ne 0 ]; then
              nonzero_exit_total="$((nonzero_exit_total + 1))"
              printf '%s\t%s\t%s\t%s\n' \
                "${index}" \
                "${run_attempt}" \
                "${org_name}" \
                "${exit_code}" >> "${nonzero_exit_rows}"
            fi

            awk '
              /^\[failed\]$/ { section="failed"; next }
              /^\[/ { section=""; next }
              section == "failed" && NF { print }
            ' "${results}" | while IFS= read -r scenario_name; do
              printf '%s\t%s\n' "${org_name}" "${scenario_name}" >> "${failed_rows}"
            done
          done < "${selected_records}"

          manifest_count="$(wc -l < "${indices}" | tr -d ' ')"
          if [ "${manifest_count}" -ne "${total}" ]; then
            if [ "$(wc -l < "${all_totals}" | tr -d ' ')" -gt 1 ]; then
              totals_seen="$(paste -sd, "${all_totals}")"
              fail \
                "Latest workflow attempt ${latest_attempt} expects ${total} shards, but only found ${manifest_count} matching shard manifests. Mixed shard layouts across reruns were detected (${totals_seen}); rerun all jobs or start a new workflow run."
            fi
            fail "Latest workflow attempt ${latest_attempt} expects ${total} shard manifests, found ${manifest_count}."
          fi

          sort -n "${indices}" > "${indices}.sorted"
          duplicate_indices="$(uniq -d "${indices}.sorted" || true)"
          if [ -n "${duplicate_indices}" ]; then
            fail "Duplicate shard indices detected: ${duplicate_indices}"
          fi

          seq 0 "$((total - 1))" > "${indices}.expected"
          if ! diff -u "${indices}.expected" "${indices}.sorted"; then
            fail "Shard indices were not assigned exactly once."
          fi

          sort "${actual}" -o "${actual}"
          duplicate_scenarios="$(uniq -d "${actual}" || true)"
          if [ -n "${duplicate_scenarios}" ]; then
            fail "Scenarios were assigned to multiple shards: ${duplicate_scenarios}"
          fi

          if ! diff -u "${expected}" "${actual}"; then
            fail "Scenario coverage mismatch across shard manifests."
          fi

          scenario_count="$(wc -l < "${actual}" | tr -d ' ')"
          if [ -n "${summary_file}" ]; then
            {
              echo "## E2E Results"
              echo
              echo "- Status: $([ "${failed_total}" -eq 0 ] && [ "${nonzero_exit_total}" -eq 0 ] && echo passed || echo failed)"
              echo "- Selected shard layout attempt: ${latest_attempt}"
              echo "- Shards: ${total}"
              echo "- Assigned scenarios: ${scenario_count}"
              echo "- Passed: ${passed_total}"
              echo "- Failed: ${failed_total}"
              echo "- Skipped: ${skipped_total}"
              echo "- Shards with non-zero exit: ${nonzero_exit_total}"
              echo "- Observed results: ${observed_total}"
              echo "- Total shard runtime: ${duration_total}s"
              echo
              echo "| Shard | Attempt | Org | Assigned | Passed | Failed | Skipped | Exit | Duration |"
              echo "| --- | ---: | --- | ---: | ---: | ---: | ---: | ---: | ---: |"
            } >> "${summary_file}"
            while IFS=$'\t' read -r index run_attempt org_name assigned_count passed_count failed_count skipped_count exit_code duration_seconds; do
              printf '| %s | %s | %s | %s | %s | %s | %s | %s | %ss |\n' \
                "${index}" \
                "${run_attempt}" \
                "${org_name}" \
                "${assigned_count}" \
                "${passed_count}" \
                "${failed_count}" \
                "${skipped_count}" \
                "${exit_code}" \
                "${duration_seconds}" >> "${summary_file}"
            done < <(sort -n "${summary_rows}")
            if [ "${failed_total}" -gt 0 ]; then
              {
                echo
                echo "### Failed Scenarios"
                echo
                echo "| Org | Scenario |"
                echo "| --- | --- |"
              } >> "${summary_file}"
              while IFS=$'\t' read -r org_name scenario_name; do
                printf '| %s | %s |\n' "${org_name}" "${scenario_name}" >> "${summary_file}"
              done < "${failed_rows}"
            fi
            if [ "${nonzero_exit_total}" -gt 0 ]; then
              {
                echo
                echo "### Shards With Non-Zero Exit"
                echo
                echo "| Shard | Attempt | Org | Exit |"
                echo "| --- | ---: | --- | ---: |"
              } >> "${summary_file}"
              while IFS=$'\t' read -r index run_attempt org_name exit_code; do
                printf '| %s | %s | %s | %s |\n' \
                  "${index}" \
                  "${run_attempt}" \
                  "${org_name}" \
                  "${exit_code}" >> "${summary_file}"
              done < <(sort -n "${nonzero_exit_rows}")
            fi
          fi

          failure_reason=""
          if [ "${failed_total}" -gt 0 ]; then
            failure_reason="${failed_total} scenario(s) failed"
          fi
          if [ "${nonzero_exit_total}" -gt 0 ]; then
            if [ -n "${failure_reason}" ]; then
              failure_reason="${failure_reason}; "
            fi
            failure_reason="${failure_reason}${nonzero_exit_total} shard(s) exited non-zero"
          fi
          if [ -n "${failure_reason}" ]; then
            fail "E2E verification failed: ${failure_reason}."
          fi
          echo "Verified ${scenario_count} scenarios across ${total} shards."

  e2e-required:
    name: "E2E Gate: Report Result"
    needs:
      - e2e-needed
      - e2e-verify
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      statuses: write
    outputs:
      state: ${{ steps.report.outputs.state }}
      description: ${{ steps.report.outputs.description }}
      status_sha: ${{ steps.report.outputs.status_sha }}
      trusted_pr_number: ${{ steps.report.outputs.trusted_pr_number }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Report E2E Required outcome
        id: report
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          E2E_NEEDED_RESULT: ${{ needs.e2e-needed.result }}
          E2E_REQUIRED: ${{ needs.e2e-needed.outputs.required }}
          E2E_RUN_SHARDS: ${{ needs.e2e-needed.outputs.run_shards }}
          E2E_TRUSTED_REQUIRED: ${{ needs.e2e-needed.outputs.trusted_e2e_required }}
          E2E_VERIFY_RESULT: ${{ needs.e2e-verify.result }}
          TRUSTED_DISPATCH: ${{ github.event_name == 'workflow_dispatch' && inputs.trusted_pr_number != '' && 'true' || 'false' }}
          TRUSTED_PR_NUMBER: ${{ needs.e2e-needed.outputs.trusted_pr_number || inputs.trusted_pr_number }}
          STATUS_SHA: >-
            ${{
              needs.e2e-needed.outputs.status_sha ||
              (
                github.event_name == 'workflow_dispatch' &&
                inputs.trusted_head_sha
              ) ||
              (
                github.event_name == 'pull_request' &&
                github.event.pull_request.head.sha
              ) ||
              github.sha
            }}
        with:
          script: |
            const statusContext = 'E2E Required';
            const eventName = process.env.GITHUB_EVENT_NAME;
            const neededResult = process.env.E2E_NEEDED_RESULT;
            const required = process.env.E2E_REQUIRED === 'true';
            const runShards = process.env.E2E_RUN_SHARDS === 'true';
            const trustedE2ERequired = process.env.E2E_TRUSTED_REQUIRED === 'true';
            const verifyResult = process.env.E2E_VERIFY_RESULT;
            const trustedDispatch = process.env.TRUSTED_DISPATCH === 'true';
            const trustedPRNumber = process.env.TRUSTED_PR_NUMBER;
            const statusSha = process.env.STATUS_SHA;
            const runURL = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const pullRequest = context.payload.pull_request;
            const forkPullRequest = eventName === 'pull_request' &&
              pullRequest?.head?.repo?.full_name !== pullRequest?.base?.repo?.full_name;

            let state = 'success';
            let description = 'E2E not required for this change.';
            let failureMessage = '';

            if (neededResult !== 'success') {
              state = 'failure';
              description = `E2E Needed concluded ${neededResult}.`;
              failureMessage = description;
            } else if (required && runShards && verifyResult !== 'success') {
              state = 'failure';
              description = `E2E required but E2E Verify concluded ${verifyResult}.`;
              failureMessage = description;
            } else if (required && trustedE2ERequired) {
              state = 'pending';
              description = 'Fork PR requires trusted maintainer E2E for reviewed SHA.';
            } else if (required && runShards) {
              description = trustedDispatch
                ? 'Trusted E2E passed for reviewed fork SHA.'
                : 'E2E required and E2E Verify succeeded.';
            }

            core.setOutput('state', state);
            core.setOutput('description', description);
            core.setOutput('status_sha', statusSha);
            core.setOutput('trusted_pr_number', trustedPRNumber || '');

            if (forkPullRequest) {
              core.warning('Skipping E2E Required status update for fork pull request.');
            } else if (eventName === 'pull_request' || eventName === 'merge_group' || trustedDispatch) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: statusSha,
                context: statusContext,
                state,
                description,
                target_url: runURL,
              });
            }

            if (trustedDispatch && trustedPRNumber) {
              await core.summary
                .addHeading('Trusted Fork E2E')
                .addList([
                  `Status: ${state}`,
                  `Description: ${description}`,
                  `PR: #${trustedPRNumber}`,
                  `Reviewed SHA: ${statusSha}`,
                  `Trusted run: ${runURL}`,
                ])
                .write();
            }

            if (failureMessage) {
              core.setFailed(failureMessage);
              return;
            }

            core.info(description);

  trusted-e2e-result-comment:
    name: "E2E Gate: Update Trusted PR Comment"
    needs:
      - e2e-required
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.trusted_pr_number != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Update trusted E2E comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          E2E_REQUIRED_STATE: ${{ needs.e2e-required.outputs.state || 'failure' }}
          E2E_REQUIRED_DESCRIPTION: >-
            ${{
              needs.e2e-required.outputs.description ||
              format('E2E gate result job concluded {0}.', needs.e2e-required.result)
            }}
          TRUSTED_PR_NUMBER: ${{ needs.e2e-required.outputs.trusted_pr_number || inputs.trusted_pr_number }}
          STATUS_SHA: ${{ needs.e2e-required.outputs.status_sha || inputs.trusted_head_sha }}
        with:
          script: |
            const trustedCommentMarker = '<!-- kongctl-trusted-e2e-status -->';
            const state = process.env.E2E_REQUIRED_STATE;
            const description = process.env.E2E_REQUIRED_DESCRIPTION;
            const trustedPRNumber = Number(process.env.TRUSTED_PR_NUMBER);
            const statusSha = process.env.STATUS_SHA;
            const runURL = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const statusLabel = state === 'success'
              ? 'passed'
              : state === 'failure' || state === 'error'
                ? 'failed'
                : state;
            const body = [
              trustedCommentMarker,
              `Trusted E2E ${statusLabel} for reviewed fork SHA.`,
              '',
              `- PR: #${trustedPRNumber}`,
              `- Reviewed SHA: \`${statusSha}\``,
              `- Trusted run: ${runURL}`,
              `- Status: \`${state}\``,
              `- Description: ${description}`,
              '',
              'This trusted E2E result applies only to the exact reviewed SHA above. Re-run trusted E2E if the contributor pushes another commit.',
            ].join('\n');

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: trustedPRNumber,
                per_page: 100,
              });
              const existing = comments.find((comment) =>
                comment.body?.includes(trustedCommentMarker) &&
                comment.user?.login === 'github-actions[bot]'
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: trustedPRNumber,
                  body,
                });
              }
            } catch (error) {
              const errorMessage = error?.message ?? String(error);
              core.warning(`Unable to create or update trusted E2E PR comment: ${errorMessage}`);
            }

            await core.summary
              .addHeading('Trusted Fork E2E')
              .addList([
                `Status: ${state}`,
                `Description: ${description}`,
                `PR: #${trustedPRNumber}`,
                `Reviewed SHA: ${statusSha}`,
                `Trusted run: ${runURL}`,
              ])
              .write();
