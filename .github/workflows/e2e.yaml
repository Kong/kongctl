name: E2E
permissions:
  contents: read

# Ensure only one Konnect-mutating e2e run at a time across all refs
concurrency:
  group: konnect-e2e
  cancel-in-progress: false

on:
  pull_request:
    branches: ['**']
    paths: &source-files
      - go.mod
      - go.sum
      - main.go
      - '*.go'
      - internal/**
      - test/e2e/**
      - Makefile
      - .goreleaser.yml
      - .github/workflows/e2e.yaml
    # If you want PR runs to be opt-in later, you can use labels:
    # types: [opened, synchronize, labeled]
  push:
    branches: ['main']
    paths: *source-files
  workflow_dispatch:
    inputs:
      run_portal_applications:
        description: Run Gmail-backed portal applications scenario
        type: boolean
        default: false
      capture_tcpdump:
        description: Capture tcpdump traffic for Konnect endpoints on the runner
        type: boolean
        default: false

jobs:
  e2e-harness:
    name: E2E Harness
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Run E2E harness tests
        run: |
          go test -count=1 -tags=e2e ./test/e2e/harness/...

  e2e-build:
    name: E2E Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Build kongctl
        run: make build-ci

      - name: Build E2E test binary
        run: go test -c -tags=e2e -o e2e.test ./test/e2e

      - name: Upload E2E binaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-binaries-${{ github.run_id }}
          path: |
            ${{ github.workspace }}/kongctl
            ${{ github.workspace }}/e2e.test

  e2e:
    name: E2E (${{ matrix.org_name }})
    needs:
      - e2e-harness
      - e2e-build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ matrix.org_name }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(vars.KONGCTL_E2E_ORGS_JSON || '[{"org_name":"default"}]') }}
    env:
      KONGCTL_ENABLE_EVENT_GATEWAY: "1"
      KONGCTL_E2E_MATRIX_ORG: ${{ matrix.org_name }}
      KONGCTL_E2E_BIN: ${{ github.workspace }}/kongctl
      KONGCTL_E2E_TEST_BIN: ${{ github.workspace }}/e2e.test
      KONGCTL_E2E_KONNECT_PAT: ${{ secrets.KONGCTL_E2E_KONNECT_PAT }}
      KONGCTL_E2E_KONNECT_BASE_URL: ${{ vars.KONGCTL_E2E_KONNECT_BASE_URL || 'https://us.api.konghq.com' }}
      # Reset is enabled by default in the harness; set explicitly for clarity
      KONGCTL_E2E_RESET: "1"
      # Set the timeout vars below to 0s/default/off to disable them and use client or platform defaults.
      KONGCTL_E2E_HTTP_TIMEOUT: ${{ vars.KONGCTL_E2E_HTTP_TIMEOUT || '0s' }}
      KONGCTL_E2E_HTTP_TCP_USER_TIMEOUT: ${{ vars.KONGCTL_E2E_HTTP_TCP_USER_TIMEOUT || '0s' }}
      KONGCTL_E2E_HTTP_DISABLE_KEEPALIVES: ${{ vars.KONGCTL_E2E_HTTP_DISABLE_KEEPALIVES || '' }}
      KONGCTL_E2E_HTTP_RECYCLE_CONNECTIONS_ON_ERROR: ${{ vars.KONGCTL_E2E_HTTP_RECYCLE_CONNECTIONS_ON_ERROR || '1' }}
      KONGCTL_E2E_HTTP_RETRY_ATTEMPTS: ${{ vars.KONGCTL_E2E_HTTP_RETRY_ATTEMPTS || '4' }}
      KONGCTL_E2E_HTTP_RETRY_INTERVAL: ${{ vars.KONGCTL_E2E_HTTP_RETRY_INTERVAL || '1s' }}
      KONGCTL_E2E_HTTP_RETRY_MAX_INTERVAL: ${{ vars.KONGCTL_E2E_HTTP_RETRY_MAX_INTERVAL || '5s' }}
      KONGCTL_E2E_HTTP_RETRY_BACKOFF_FACTOR: ${{ vars.KONGCTL_E2E_HTTP_RETRY_BACKOFF_FACTOR || '2' }}
      KONGCTL_E2E_HTTP_RETRY_JITTER: ${{ vars.KONGCTL_E2E_HTTP_RETRY_JITTER || '250ms' }}
      KONGCTL_E2E_RESET_HTTP_TIMEOUT: ${{ vars.KONGCTL_E2E_RESET_HTTP_TIMEOUT || '0s' }}
      KONGCTL_E2E_RESET_TIMEOUT: ${{ vars.KONGCTL_E2E_RESET_TIMEOUT || '0s' }}
      KONGCTL_E2E_RESET_RETRY_ATTEMPTS: ${{ vars.KONGCTL_E2E_RESET_RETRY_ATTEMPTS || '3' }}
      KONGCTL_E2E_RESET_RETRY_INTERVAL: ${{ vars.KONGCTL_E2E_RESET_RETRY_INTERVAL || '1s' }}
      KONGCTL_E2E_RESET_RETRY_MAX_INTERVAL: ${{ vars.KONGCTL_E2E_RESET_RETRY_MAX_INTERVAL || '5s' }}
      KONGCTL_E2E_RESET_RETRY_BACKOFF_FACTOR: ${{ vars.KONGCTL_E2E_RESET_RETRY_BACKOFF_FACTOR || '2' }}
      KONGCTL_E2E_RESET_RETRY_JITTER: ${{ vars.KONGCTL_E2E_RESET_RETRY_JITTER || '250ms' }}
      KONGCTL_E2E_LOG_LEVEL: "debug"
      KONGCTL_E2E_CONSOLE_LOG_LEVEL: "warn"
      KONGCTL_E2E_ARTIFACTS_DIR: ${{ github.workspace }}/.e2e-artifacts/${{ github.run_id }}-${{ matrix.org_name }}
      KONGCTL_E2E_SHARD_INDEX: ${{ strategy.job-index }}
      KONGCTL_E2E_SHARD_TOTAL: ${{ strategy.job-total }}
      KONGCTL_E2E_RUN_PORTAL_APPLICATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_portal_applications && '1' || '' }}
      KONGCTL_E2E_CAPTURE_TCPDUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.capture_tcpdump && '1' || vars.KONGCTL_E2E_CAPTURE_TCPDUMP || '' }}
      KONGCTL_E2E_GMAIL_ACCESS_TOKEN: ${{ secrets.KONGCTL_E2E_GMAIL_ACCESS_TOKEN }}
      KONGCTL_E2E_GMAIL_ADDRESS: ${{ secrets.KONGCTL_E2E_GMAIL_ADDRESS }}
      KONGCTL_E2E_GMAIL_CLIENT_ID: ${{ secrets.KONGCTL_E2E_GMAIL_CLIENT_ID }}
      KONGCTL_E2E_GMAIL_CLIENT_SECRET: ${{ secrets.KONGCTL_E2E_GMAIL_CLIENT_SECRET }}
      KONGCTL_E2E_GMAIL_REFRESH_TOKEN: ${{ secrets.KONGCTL_E2E_GMAIL_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Optional: Un-comment if you need private module access
      # - name: Configure private module access
      #   run: git config --global url.https://$GITHUB_TOKEN@github.com/.insteadOf https://github.com/
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GH_TOKEN_PRIVATE_READ }}

      - name: Setup deck
        uses: kong/setup-deck@c379e0f67ec1f1363247484a0c3142ae6168f811 # v1.6.0

      - name: Download E2E binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e2e-binaries-${{ github.run_id }}
          path: ${{ github.workspace }}

      - name: Make E2E binaries executable
        run: chmod 0755 "${KONGCTL_E2E_BIN}" "${KONGCTL_E2E_TEST_BIN}"

      - name: Install tcpdump
        if: env.KONGCTL_E2E_CAPTURE_TCPDUMP == '1'
        run: |
          set -euo pipefail
          if ! command -v tcpdump >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y tcpdump
          fi

          tcpdump --version | sed -n '1p'

      - name: Start tcpdump capture
        if: env.KONGCTL_E2E_CAPTURE_TCPDUMP == '1'
        run: |
          set -euo pipefail

          CAP_DIR="${KONGCTL_E2E_ARTIFACTS_DIR}/tcpdump"
          mkdir -p "${CAP_DIR}"

          regional_host="${KONGCTL_E2E_KONNECT_BASE_URL#http://}"
          regional_host="${regional_host#https://}"
          regional_host="${regional_host%%/*}"
          filter="(tcp port 443) and (host ${regional_host} or host global.api.konghq.com)"

          {
            printf 'started_at=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'regional_host=%s\n' "${regional_host}"
            printf 'filter=%s\n' "${filter}"
            echo
            uname -a
            echo
            getent hosts "${regional_host}" || true
            getent hosts global.api.konghq.com || true
            echo
            ip addr || true
            echo
            ip route || true
          } > "${CAP_DIR}/context.txt"

          sudo tcpdump \
            -U \
            -i any \
            -nn \
            -s 0 \
            -w "${CAP_DIR}/konnect.pcap" \
            -Z "${USER}" \
            "${filter}" \
            > "${CAP_DIR}/tcpdump.log" 2>&1 &

          echo "$!" > "${CAP_DIR}/tcpdump.pid"

      # If you later want runs to be opt-in via label, add a guard like this:
      # - name: Require opt-in label to run E2E
      #   if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'run-e2e')
      #   run: |
      #     echo "Skipping E2E (no 'run-e2e' label)." && exit 0

      - name: Run E2E scenario tests (Konnect)
        run: |
          set -euo pipefail

          ART_DIR="${KONGCTL_E2E_ARTIFACTS_DIR}/$(date +%Y%m%d-%H%M%S)"
          mkdir -p "${ART_DIR}"
          export KONGCTL_E2E_ARTIFACTS_DIR="${ART_DIR}"

          extract_results() {
            local status="$1"
            local output_file="$2"

            sed -n "s/^[[:space:]]*--- ${status}: Test_Scenarios\/\(.*\) (.*/\1/p" "${ART_DIR}/run.log" | \
              sed 's#^test/e2e/scenarios/##' | sort > "${output_file}"
          }

          run_started_at="$(date +%s)"
          set +e
          "${KONGCTL_E2E_TEST_BIN}" -test.v -test.count=1 -test.run '^Test_Scenarios$' ${GOTESTFLAGS:-} \
            2>&1 | tee "${ART_DIR}/run.log"
          code=${PIPESTATUS[0]}
          set -e
          run_finished_at="$(date +%s)"

          passed_file="$(mktemp)"
          failed_file="$(mktemp)"
          skipped_file="$(mktemp)"

          extract_results "PASS" "${passed_file}"
          extract_results "FAIL" "${failed_file}"
          extract_results "SKIP" "${skipped_file}"

          passed_count="$(wc -l < "${passed_file}" | tr -d ' ')"
          failed_count="$(wc -l < "${failed_file}" | tr -d ' ')"
          skipped_count="$(wc -l < "${skipped_file}" | tr -d ' ')"
          observed_count="$((passed_count + failed_count + skipped_count))"
          duration_seconds="$((run_finished_at - run_started_at))"

          {
            printf 'org_name=%s\n' "${KONGCTL_E2E_MATRIX_ORG}"
            printf 'run_attempt=%s\n' "${GITHUB_RUN_ATTEMPT}"
            printf 'shard_index=%s\n' "${KONGCTL_E2E_SHARD_INDEX}"
            printf 'shard_total=%s\n' "${KONGCTL_E2E_SHARD_TOTAL}"
            printf 'exit_code=%s\n' "${code}"
            printf 'duration_seconds=%s\n' "${duration_seconds}"
            printf 'passed_count=%s\n' "${passed_count}"
            printf 'failed_count=%s\n' "${failed_count}"
            printf 'skipped_count=%s\n' "${skipped_count}"
            printf 'observed_count=%s\n' "${observed_count}"
            printf '\n[passed]\n'
            cat "${passed_file}"
            printf '\n[failed]\n'
            cat "${failed_file}"
            printf '\n[skipped]\n'
            cat "${skipped_file}"
          } > "${ART_DIR}/scenario-results.txt"

          echo "E2E artifacts: ${ART_DIR}"
          exit "${code}"

      - name: Stop tcpdump capture
        if: always() && env.KONGCTL_E2E_CAPTURE_TCPDUMP == '1'
        run: |
          set +e

          CAP_DIR="${KONGCTL_E2E_ARTIFACTS_DIR}/tcpdump"
          PID_FILE="${CAP_DIR}/tcpdump.pid"

          if [ -f "${PID_FILE}" ]; then
            pid="$(cat "${PID_FILE}")"
            sudo kill -INT "${pid}" 2>/dev/null || true

            for _ in $(seq 1 10); do
              if ! ps -p "${pid}" >/dev/null 2>&1; then
                break
              fi
              sleep 1
            done
          fi

          sudo chown -R "${USER}:${USER}" "${CAP_DIR}" 2>/dev/null || true
          ls -lh "${CAP_DIR}" || true

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-artifacts-${{ github.run_id }}-${{ matrix.org_name }}
          path: ${{ env.KONGCTL_E2E_ARTIFACTS_DIR }}

  e2e-verify:
    name: E2E Verify
    needs:
      - e2e
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download workflow artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ github.workspace }}/.downloaded-artifacts

      - name: Verify shard coverage
        shell: bash
        run: |
          set -euo pipefail

          summary_file="${GITHUB_STEP_SUMMARY:-}"
          summary_rows="$(mktemp)"
          failed_rows="$(mktemp)"
          expected="$(mktemp)"
          actual="$(mktemp)"
          indices="$(mktemp)"
          records="$(mktemp)"
          selected_records="$(mktemp)"
          all_totals="$(mktemp)"
          latest_totals="$(mktemp)"
          passed_total=0
          failed_total=0
          skipped_total=0
          observed_total=0
          duration_total=0

          fail() {
            local message="$1"
            echo "::error::${message}"
            if [ -n "${summary_file}" ]; then
              {
                echo "## E2E Verify"
                echo
                echo "- Status: failed"
                echo "- Reason: ${message}"
              } >> "${summary_file}"
            fi
            exit 1
          }

          find test/e2e/scenarios -name scenario.yaml -type f | \
            sed 's#^test/e2e/scenarios/##' | sort > "${expected}"

          mapfile -t manifests < <(find .downloaded-artifacts -name assigned-scenarios.txt -type f | sort)
          if [ "${#manifests[@]}" -eq 0 ]; then
            fail "No shard manifests were uploaded by the matrix jobs."
          fi

          : > "${actual}"
          : > "${indices}"
          : > "${records}"
          : > "${selected_records}"
          : > "${all_totals}"
          : > "${latest_totals}"
          : > "${summary_rows}"
          : > "${failed_rows}"

          for manifest in "${manifests[@]}"; do
            results="$(dirname "${manifest}")/scenario-results.txt"
            if [ ! -f "${results}" ]; then
              fail "Missing scenario results alongside ${manifest}"
            fi

            index="$(sed -n '1s/^shard_index=//p' "${manifest}")"
            total="$(sed -n '2s/^shard_total=//p' "${manifest}")"
            if [ -z "${index}" ] || [ -z "${total}" ]; then
              fail "Malformed shard manifest: ${manifest}"
            fi

            scenario_rows="$(tail -n +4 "${manifest}" | sed '/^$/d' | wc -l | tr -d ' ')"
            org_name="$(sed -n 's/^org_name=//p' "${results}")"
            if [ -z "${org_name}" ]; then
              artifact_name="$(basename "$(dirname "$(dirname "${manifest}")")")"
              org_name="${artifact_name#e2e-artifacts-${GITHUB_RUN_ID}-}"
            fi
            run_attempt="$(sed -n 's/^run_attempt=//p' "${results}")"
            if [ -z "${run_attempt}" ]; then
              run_attempt=1
            fi
            exit_code="$(sed -n 's/^exit_code=//p' "${results}")"
            duration_seconds="$(sed -n 's/^duration_seconds=//p' "${results}")"
            passed_count="$(sed -n 's/^passed_count=//p' "${results}")"
            failed_count="$(sed -n 's/^failed_count=//p' "${results}")"
            skipped_count="$(sed -n 's/^skipped_count=//p' "${results}")"
            observed_count="$(sed -n 's/^observed_count=//p' "${results}")"

            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "${run_attempt}" \
              "${index}" \
              "${total}" \
              "${org_name}" \
              "${scenario_rows}" \
              "${passed_count}" \
              "${failed_count}" \
              "${skipped_count}" \
              "${observed_count}" \
              "${exit_code}" \
              "${duration_seconds}" \
              "${manifest}" \
              "${results}" >> "${records}"
          done

          cut -f3 "${records}" | sort -n -u > "${all_totals}"
          latest_attempt="$(cut -f1 "${records}" | sort -n | tail -n1)"
          awk -F'\t' -v attempt="${latest_attempt}" '$1 == attempt { print $3 }' "${records}" | \
            sort -n -u > "${latest_totals}"

          if [ "$(wc -l < "${latest_totals}" | tr -d ' ')" -ne 1 ]; then
            fail "Latest workflow attempt ${latest_attempt} reported inconsistent shard totals."
          fi

          total="$(cat "${latest_totals}")"
          sort -t $'\t' -k2,2n -k1,1nr "${records}" | \
            awk -F'\t' -v total="${total}" '$3 == total && !seen[$2]++ { print }' > "${selected_records}"

          while IFS=$'\t' read -r run_attempt index shard_total org_name scenario_rows \
            passed_count failed_count skipped_count observed_count exit_code duration_seconds manifest results; do
            if [ -z "${index}" ]; then
              continue
            fi

            printf '%s\n' "${index}" >> "${indices}"
            tail -n +4 "${manifest}" | sed '/^$/d' >> "${actual}"

            printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
              "${index}" \
              "${run_attempt}" \
              "${org_name}" \
              "${scenario_rows}" \
              "${passed_count}" \
              "${failed_count}" \
              "${skipped_count}" \
              "${exit_code}" \
              "${duration_seconds}" >> "${summary_rows}"

            passed_total="$((passed_total + passed_count))"
            failed_total="$((failed_total + failed_count))"
            skipped_total="$((skipped_total + skipped_count))"
            observed_total="$((observed_total + observed_count))"
            duration_total="$((duration_total + duration_seconds))"

            awk '
              /^\[failed\]$/ { section="failed"; next }
              /^\[/ { section=""; next }
              section == "failed" && NF { print }
            ' "${results}" | while IFS= read -r scenario_name; do
              printf '%s\t%s\n' "${org_name}" "${scenario_name}" >> "${failed_rows}"
            done
          done < "${selected_records}"

          manifest_count="$(wc -l < "${indices}" | tr -d ' ')"
          if [ "${manifest_count}" -ne "${total}" ]; then
            if [ "$(wc -l < "${all_totals}" | tr -d ' ')" -gt 1 ]; then
              totals_seen="$(paste -sd, "${all_totals}")"
              fail \
                "Latest workflow attempt ${latest_attempt} expects ${total} shards, but only found ${manifest_count} matching shard manifests. Mixed shard layouts across reruns were detected (${totals_seen}); rerun all jobs or start a new workflow run."
            fi
            fail "Latest workflow attempt ${latest_attempt} expects ${total} shard manifests, found ${manifest_count}."
          fi

          sort -n "${indices}" > "${indices}.sorted"
          duplicate_indices="$(uniq -d "${indices}.sorted" || true)"
          if [ -n "${duplicate_indices}" ]; then
            fail "Duplicate shard indices detected: ${duplicate_indices}"
          fi

          seq 0 "$((total - 1))" > "${indices}.expected"
          if ! diff -u "${indices}.expected" "${indices}.sorted"; then
            fail "Shard indices were not assigned exactly once."
          fi

          sort "${actual}" -o "${actual}"
          duplicate_scenarios="$(uniq -d "${actual}" || true)"
          if [ -n "${duplicate_scenarios}" ]; then
            fail "Scenarios were assigned to multiple shards: ${duplicate_scenarios}"
          fi

          if ! diff -u "${expected}" "${actual}"; then
            fail "Scenario coverage mismatch across shard manifests."
          fi

          scenario_count="$(wc -l < "${actual}" | tr -d ' ')"
          if [ -n "${summary_file}" ]; then
            {
              echo "## E2E Results"
              echo
              echo "- Status: $([ "${failed_total}" -eq 0 ] && echo passed || echo failed)"
              echo "- Selected shard layout attempt: ${latest_attempt}"
              echo "- Shards: ${total}"
              echo "- Assigned scenarios: ${scenario_count}"
              echo "- Passed: ${passed_total}"
              echo "- Failed: ${failed_total}"
              echo "- Skipped: ${skipped_total}"
              echo "- Observed results: ${observed_total}"
              echo "- Total shard runtime: ${duration_total}s"
              echo
              echo "| Shard | Attempt | Org | Assigned | Passed | Failed | Skipped | Exit | Duration |"
              echo "| --- | ---: | --- | ---: | ---: | ---: | ---: | ---: | ---: |"
            } >> "${summary_file}"
            while IFS=$'\t' read -r index run_attempt org_name assigned_count passed_count failed_count skipped_count exit_code duration_seconds; do
              printf '| %s | %s | %s | %s | %s | %s | %s | %s | %ss |\n' \
                "${index}" \
                "${run_attempt}" \
                "${org_name}" \
                "${assigned_count}" \
                "${passed_count}" \
                "${failed_count}" \
                "${skipped_count}" \
                "${exit_code}" \
                "${duration_seconds}" >> "${summary_file}"
            done < <(sort -n "${summary_rows}")
            if [ "${failed_total}" -gt 0 ]; then
              {
                echo
                echo "### Failed Scenarios"
                echo
                echo "| Org | Scenario |"
                echo "| --- | --- |"
              } >> "${summary_file}"
              while IFS=$'\t' read -r org_name scenario_name; do
                printf '| %s | %s |\n' "${org_name}" "${scenario_name}" >> "${summary_file}"
              done < "${failed_rows}"
            fi
          fi
          echo "Verified ${scenario_count} scenarios across ${total} shards."
