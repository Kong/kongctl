name: E2E
permissions:
  contents: read

# Ensure only one Konnect-mutating e2e run at a time across all refs
concurrency:
  group: konnect-e2e
  cancel-in-progress: false

on:
  pull_request:
    branches: ['**']
    paths: &source-files
      - go.mod
      - go.sum
      - main.go
      - '*.go'
      - internal/**
      - test/e2e/**
      - Makefile
      - .goreleaser.yml
      - .github/workflows/e2e.yaml
    # If you want PR runs to be opt-in later, you can use labels:
    # types: [opened, synchronize, labeled]
  push:
    branches: ['main']
    paths: *source-files
  workflow_dispatch:
    inputs:
      run_portal_applications:
        description: Run Gmail-backed portal applications scenario
        type: boolean
        default: false

jobs:
  e2e:
    name: E2E (${{ matrix.org_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ matrix.environment_name }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(vars.KONGCTL_E2E_ORGS_JSON || '[{"org_name":"default","environment_name":"default"}]') }}
    env:
      KONGCTL_ENABLE_EVENT_GATEWAY: "1"
      KONGCTL_E2E_MATRIX_ORG: ${{ matrix.org_name }}
      KONGCTL_E2E_KONNECT_PAT: ${{ secrets.KONGCTL_E2E_KONNECT_PAT }}
      KONGCTL_E2E_KONNECT_BASE_URL: ${{ vars.KONGCTL_E2E_KONNECT_BASE_URL || 'https://us.api.konghq.com' }}
      # Reset is enabled by default in the harness; set explicitly for clarity
      KONGCTL_E2E_RESET: "1"
      KONGCTL_E2E_LOG_LEVEL: "debug"
      # Keep debug logs in artifacts while reducing console noise
      KONGCTL_E2E_CONSOLE_LOG_LEVEL: "warn"
      KONGCTL_E2E_ARTIFACTS_DIR: ${{ runner.temp }}/kongctl-e2e-${{ github.run_id }}-${{ matrix.org_name }}
      KONGCTL_E2E_SHARD_INDEX: ${{ strategy.job-index }}
      KONGCTL_E2E_SHARD_TOTAL: ${{ strategy.job-total }}
      KONGCTL_E2E_RUN_PORTAL_APPLICATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_portal_applications && '1' || '' }}
      KONGCTL_E2E_GMAIL_ACCESS_TOKEN: ${{ secrets.KONGCTL_E2E_GMAIL_ACCESS_TOKEN }}
      KONGCTL_E2E_GMAIL_ADDRESS: ${{ secrets.KONGCTL_E2E_GMAIL_ADDRESS }}
      KONGCTL_E2E_GMAIL_CLIENT_ID: ${{ secrets.KONGCTL_E2E_GMAIL_CLIENT_ID }}
      KONGCTL_E2E_GMAIL_CLIENT_SECRET: ${{ secrets.KONGCTL_E2E_GMAIL_CLIENT_SECRET }}
      KONGCTL_E2E_GMAIL_REFRESH_TOKEN: ${{ secrets.KONGCTL_E2E_GMAIL_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Optional: Un-comment if you need private module access
      # - name: Configure private module access
      #   run: git config --global url.https://$GITHUB_TOKEN@github.com/.insteadOf https://github.com/
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GH_TOKEN_PRIVATE_READ }}

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Setup deck
        uses: kong/setup-deck@c379e0f67ec1f1363247484a0c3142ae6168f811 # v1.6.0

      # If you later want runs to be opt-in via label, add a guard like this:
      # - name: Require opt-in label to run E2E
      #   if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'run-e2e')
      #   run: |
      #     echo "Skipping E2E (no 'run-e2e' label)." && exit 0

      - name: Build
        run: make build

      - name: Run E2E tests (Konnect)
        run: |
          make test-e2e ${GOTESTFLAGS}

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-artifacts-${{ github.run_id }}-${{ matrix.org_name }}
          path: ${{ env.KONGCTL_E2E_ARTIFACTS_DIR }}
