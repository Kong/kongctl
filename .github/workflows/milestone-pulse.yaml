name: kongctl Pulse

on:
  workflow_dispatch:
    inputs:
      milestone_state:
        description: "Milestone state to report: open, closed, or all"
        required: false
        default: "open"
  schedule:
    # GitHub schedules are UTC-only. These cover 2:00 AM US/Central in
    # daylight and standard time; the schedule gate below runs only the
    # matching trigger for the current Central offset.
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"

permissions:
  contents: read
  issues: read
  id-token: write
  pages: write
  pull-requests: read

concurrency:
  group: milestone-pulse
  cancel-in-progress: false

jobs:
  milestone-pulse:
    name: Refresh kongctl Pulse
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.schedule-gate.outputs.run }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Check schedule window
        id: schedule-gate
        env:
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          central_offset="$(TZ=America/Chicago date +%z)"
          case "${central_offset}" in
            -0500)
              expected_schedule="0 7 * * *"
              ;;
            -0600)
              expected_schedule="0 8 * * *"
              ;;
            *)
              echo "Unsupported America/Chicago offset: ${central_offset}" >&2
              exit 1
              ;;
          esac

          if [ "${EVENT_SCHEDULE}" = "${expected_schedule}" ]; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping ${EVENT_SCHEDULE}; ${expected_schedule} is the 2:00 AM US/Central trigger today."
          fi

      - name: Checkout repository
        if: steps.schedule-gate.outputs.run == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Hydrate Pulse history from Pages
        if: steps.schedule-gate.outputs.run == 'true' && github.ref == 'refs/heads/main'
        env:
          MILESTONE_PULSE_HISTORY_URL: ${{ vars.MILESTONE_PULSE_HISTORY_URL }}
        run: |
          set -euo pipefail

          data_dir="docs/reports/milestones/data"
          repo_name="${GITHUB_REPOSITORY#*/}"
          default_history_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}/docs/reports/milestones/data"
          history_url="${MILESTONE_PULSE_HISTORY_URL:-${default_history_url}}"
          history_url="${history_url%/}"

          mkdir -p "${data_dir}"

          snapshot_index="$(mktemp)"
          if curl -fsSL "${history_url}/snapshots.json" -o "${snapshot_index}"; then
            if jq -e 'type == "array"' "${snapshot_index}" >/dev/null; then
              jq -r '.[] | objects | .path // empty' "${snapshot_index}" \
                | while IFS= read -r snapshot_path; do
                    case "${snapshot_path}" in
                      ????-??-??.json)
                        curl -fsSL "${history_url}/${snapshot_path}" -o "${data_dir}/${snapshot_path}" || true
                        ;;
                    esac
                  done
            else
              echo "Ignoring invalid Pulse snapshot index at ${history_url}/snapshots.json."
            fi
          else
            echo "No published Pulse snapshot index found at ${history_url}/snapshots.json."
          fi
          rm -f "${snapshot_index}"

          if curl -fsSL "${history_url}/history.json" -o "${data_dir}/history.json"; then
            jq empty "${data_dir}/history.json"
          else
            rm -f "${data_dir}/history.json"
            echo "No published Pulse history found at ${history_url}/history.json."
          fi

      - name: Generate kongctl Pulse
        if: steps.schedule-gate.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          MILESTONE_PULSE_STATE: >-
            ${{ github.event_name == 'workflow_dispatch' && inputs.milestone_state || 'open' }}
        run: |
          set -euo pipefail
          scripts/milestone-pulse.sh --repo "${GITHUB_REPOSITORY}" --state "${MILESTONE_PULSE_STATE}"

      - name: Write workflow summary
        if: always() && steps.schedule-gate.outputs.run == 'true'
        run: |
          if [ -f docs/reports/milestones/latest.md ]; then
            cat docs/reports/milestones/latest.md >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "kongctl Pulse summary was not generated." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload kongctl Pulse artifact
        if: always() && steps.schedule-gate.outputs.run == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: milestone-pulse-${{ github.run_id }}
          path: docs/reports/milestones
          if-no-files-found: warn

      - name: Prepare GitHub Pages site
        if: steps.schedule-gate.outputs.run == 'true' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site/docs/reports _site/brand/logo

          cp -R docs/reports/milestones _site/docs/reports/milestones
          cp -R brand/logo/dark _site/brand/logo/dark
          touch _site/.nojekyll

          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=docs/reports/milestones/">
            <title>kongctl Pulse</title>
          </head>
          <body>
            <p><a href="docs/reports/milestones/">kongctl Pulse</a></p>
          </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        if: steps.schedule-gate.outputs.run == 'true' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload GitHub Pages artifact
        if: steps.schedule-gate.outputs.run == 'true' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy-pages:
    name: Publish kongctl Pulse Pages
    if: needs.milestone-pulse.outputs.should-run == 'true' && github.ref == 'refs/heads/main'
    needs: milestone-pulse
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.pages-deployment.outputs.page_url }}
    steps:
      - name: Deploy kongctl Pulse to GitHub Pages
        id: pages-deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
