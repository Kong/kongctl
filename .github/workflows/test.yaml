name: CI Test

concurrency:
  # Run only for most recent commit in PRs but for all tags and commits on main
  # Ref: https://docs.github.com/en/actions/using-jobs/using-concurrency
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - '**'

permissions:
  contents: read

env:
  DO_NOT_TRACK: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: git config --global url.https://$GITHUB_TOKEN@github.com/.insteadOf https://github.com/
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_PRIVATE_READ }}
      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install installer test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zip unzip libarchive-tools
      - name: Clear Go build cache before lint
        run: go clean -cache
      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
      - name: test installer
        run: |
          make test-installer
      - name: test
        run: |
          go test -race -count=1 ./...
      - name: test integration
        run: |
          go test -v -count=1 -tags=integration -race ${GOTESTFLAGS} ./test/integration/...
