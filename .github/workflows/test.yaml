name: CI Test

concurrency:
  # Run only for most recent commit in PRs but for all tags and commits on main
  # Ref: https://docs.github.com/en/actions/using-jobs/using-concurrency
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - '**'

permissions:
  contents: read

env:
  DO_NOT_TRACK: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure private module access
        shell: bash
        env:
          GH_TOKEN_PRIVATE_READ: ${{ secrets.GH_TOKEN_PRIVATE_READ }}
        run: |
          set -euo pipefail

          if ! grep -q 'sdk-konnect-go-internal' go.mod; then
            exit 0
          fi

          if [ -z "${GH_TOKEN_PRIVATE_READ:-}" ]; then
            echo "::error::GH_TOKEN_PRIVATE_READ is required for sdk-konnect-go-internal"
            exit 1
          fi

          git config --global \
            url."https://x-access-token:${GH_TOKEN_PRIVATE_READ}@github.com/".insteadOf \
            "https://github.com/"
          echo "GOPRIVATE=github.com/Kong/sdk-konnect-go-internal" >> "${GITHUB_ENV}"

      - name: Setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Download private SDK module
        shell: bash
        run: |
          set -euo pipefail

          if grep -q 'sdk-konnect-go-internal' go.mod; then
            go mod download github.com/Kong/sdk-konnect-go
          fi

      - name: Install installer test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zip unzip libarchive-tools
      - name: Clear Go build cache before lint
        run: go clean -cache
      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
      - name: test installer
        run: |
          make test-installer
      - name: test
        run: |
          go test -race -count=1 ./...
      - name: test integration
        run: |
          go test -v -count=1 -tags=integration -race ${GOTESTFLAGS} ./test/integration/...
