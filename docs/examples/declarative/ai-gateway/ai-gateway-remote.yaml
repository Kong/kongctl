_defaults:
  kongctl:
    namespace: ai-gateway-example

ai_gateways:
  - ref: customer-support-ai-gateway
    display_name: "Customer Support AI Gateway"
    description: "AI Gateway for customer support traffic"
    proxy_urls:
      - host: support-ai.example.com
        port: 443
        protocol: https
    labels:
      team: support
      environment: staging
    providers:
      - ref: openai-provider
        name: openai-provider
        type: openai
        display_name: "OpenAI Provider"
        config:
          auth:
            type: basic
            headers:
              - name: Authorization
                value: !env OPENAI_AUTH_HEADER
    vaults:
      - ref: support-env
        name: support-env
        type: env
        description: "Environment variables for support AI Gateway secrets"
        labels:
          team: support
          purpose: runtime-secrets
        config:
          prefix: SUPPORT_AI_
          base64_decode: false
    data_plane_certificates:
      - ref: support-data-plane-cert
        title: support-data-plane-cert
        description: "Pinned data plane certificate for support AI traffic"
        cert: |
          -----BEGIN CERTIFICATE-----
          MIIB4TCCAYugAwIBAgIUAenxUyPjkSLCe2BQXoBMBacqgLowDQYJKoZIhvcNAQEL
          BQAwRTELMAkGA1UEBhMCQVUxEzARBgNVBAgMClNvbWUtU3RhdGUxITAfBgNVBAoM
          GEludGVybmV0IFdpZGdpdHMgUHR5IEx0ZDAeFw0yNDEwMjgyMDA3NDlaFw0zNDEw
          MjYyMDA3NDlaMEUxCzAJBgNVBAYTAkFVMRMwEQYDVQQIDApTb21lLVN0YXRlMSEw
          HwYDVQQKDBhJbnRlcm5ldCBXaWRnaXRzIFB0eSBMdGQwXDANBgkqhkiG9w0BAQEF
          AANLADBIAkEAyzipjrbAaLO/yPg7lL1dLWzhqNdc3S4YNR7f1RG9whWhbsPE2z42
          e6WGFf9hggP6xjG4qbU8jFVczpd1UPwGbQIDAQABo1MwUTAdBgNVHQ4EFgQUkPPB
          ghj+iHOHAKJlC1gLbKT/ZHQwHwYDVR0jBBgwFoAUkPPBghj+iHOHAKJlC1gLbKT/
          ZHQwDwYDVR0TAQH/BAUwAwEB/zANBgkqhkiG9w0BAQsFAANBALfy49GvA2ld+u+G
