          qKjBs0k=
          -----END CERTIFICATE-----
    policies:
      - ref: mask-sensitive-data
        name: mask-sensitive-data
        type: ai-sanitizer
        display_name: "Mask Sensitive Data"
        enabled: true
        global: false
        labels:
          team: support
          purpose: pii-redaction
        config:
          anonymize:
            - email
    consumers:
      - ref: support-agent
        name: support-agent
        type: api-key
        display_name: "Support Agent"
        policies:
          - !ref mask-sensitive-data#name
        labels:
          team: support
          access: agent
    agents:
      - ref: customer-support-agent
        name: customer-support-agent
        type: a2a
        display_name: "Customer Support Agent"
        enabled: true
        labels:
          team: support
          agent: customer-support
        config:
          url: https://support-agent.example.com
          route:
            paths:
              - /agents/support
          logging:
            max_payload_size: 524288
        policies:
          - !ref mask-sensitive-data#name
    consumer_groups:
      - ref: premium-support-users
        name: premium-support-users
        display_name: "Premium Support Users"
        policies:
          - !ref mask-sensitive-data#name
        labels:
          team: support
          tier: premium
    models:
      - ref: customer-support-gpt
        type: model
        name: customer-support-gpt
        display_name: "Customer Support GPT"
        enabled: true
        config:
          route: {}
          model: {}
        formats:
          - type: openai
        target_models:
          - name: gpt-4o
            provider: openai-provider
            config:
              type: openai
        policies:
          - !ref mask-sensitive-data#name
        capabilities:
          - generate
    mcp_servers:
      - ref: customer-support-tools
        type: conversion-only
        name: customer-support-tools
        display_name: "Customer Support Tools"
        enabled: true
        labels:
          team: support
          toolset: customer-profile
        config:
          url: https://support-tools.example.com
          route:
            paths:
              - /support-tools
        tools:
          - name: lookup-customer
            description: "Look up a customer profile"
            method: GET
            path: /customers/{customer_id}
        policies:
          - !ref mask-sensitive-data#name
