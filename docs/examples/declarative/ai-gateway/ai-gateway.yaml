_defaults:
  kongctl:
    namespace: ai-gateway-example

ai_gateways:
  - ref: customer-support-ai-gateway
    display_name: "Customer Support AI Gateway"
    description: "AI Gateway for customer support traffic"
    proxy_urls:
      - host: support-ai.example.com
        port: 443
        protocol: https
    labels:
      team: support
      environment: staging
    providers:
      - ref: openai-provider
        name: openai-provider
        type: openai
        display_name: "OpenAI Provider"
        config:
          auth:
            type: basic
            headers:
              - name: Authorization
                value: !env OPENAI_AUTH_HEADER
    models:
      - ref: customer-support-gpt
        type: model
        name: customer-support-gpt
        display_name: "Customer Support GPT"
        enabled: true
        config:
          route: {}
          model: {}
        formats:
          - type: openai
        target_models:
          - name: gpt-4o
            provider: openai-provider
            config:
              type: openai
        policies: []
        capabilities:
          - generate
    mcp_servers:
      - ref: customer-support-tools
        type: conversion-only
        name: customer-support-tools
        display_name: "Customer Support Tools"
        enabled: true
        labels:
          team: support
          toolset: customer-profile
        config:
          url: https://support-tools.example.com
        tools:
          - name: lookup-customer
            description: "Look up a customer profile"
            method: GET
            path: /customers/{customer_id}
        policies: []
