_defaults:
  kongctl:
    namespace: federated-ai-gateway

ai_gateways:
  - ref: shared-ai-gateway
    display_name: "Shared Federated AI Gateway"
    description: "Central AI Gateway owned by the AI platform team"
    proxy_urls:
      - host: shared-ai.example.com
        port: 443
        protocol: https
    labels:
      team: ai-platform
      ownership: central
    providers:
      - ref: shared-openai-provider
        name: shared-openai
        type: openai
        display_name: "Shared OpenAI Provider"
        labels:
          provider_family: openai
        config:
          auth:
            type: basic
            headers:
              - name: Authorization
                value: !env OPENAI_AUTH_HEADER
      - ref: shared-anthropic-provider
        name: shared-anthropic
        type: anthropic
        display_name: "Shared Anthropic Provider"
        labels:
          provider_family: anthropic
        config:
          auth:
            type: basic
            headers:
              - name: x-api-key
                value: !env ANTHROPIC_API_KEY

