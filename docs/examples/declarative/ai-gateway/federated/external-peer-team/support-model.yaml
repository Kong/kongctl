_defaults:
  kongctl:
    namespace: federated-ai-gateway

ai_gateways:
  - ref: external-shared-ai-gateway
    _external:
      selector:
        matchFields:
          display_name: "Shared Federated AI Gateway"

ai_gateway_models:
  - ref: external-peer-support-assistant
    ai_gateway: !ref external-shared-ai-gateway#id
    type: model
    name: external-peer-support-assistant
    display_name: "External Peer Support Assistant"
    enabled: true
    labels:
      team: support-experience
      ownership: external-peer
    config:
      route: {}
      model: {}
    formats:
      - type: openai
    targets:
      - name: gpt-4o-mini
        provider: shared-openai
        config:
          type: openai
      - name: claude-3-5-sonnet-latest
        provider: shared-anthropic
        config:
          type: anthropic
    policies: []
    capabilities:
      - generate
