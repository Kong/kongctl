_defaults:
  kongctl:
    namespace: organization-user-assignments

apis:
  - ref: products-api
    name: products-api
    description: Product catalog API managed by the platform team.

organization:
  teams:
    - ref: platform-team
      name: Platform Engineering
      description: Engineers who operate shared API platform services.
      labels:
        department: engineering
        focus: platform

  users:
    - email: !env KONGCTL_ORG_USER_EMAIL_1
      teams:
        - platform-team
      roles:
        - ref: user1-products-viewer
          role_name: Viewer
          entity_id: !ref products-api#id
          entity_type_name: APIs
          entity_region: us

    # Users can also be selected by Konnect user ID. This is useful for
    # automation, but email selectors are easier for manual testing.
    # - id: 00000000-0000-0000-0000-000000000000
    #   roles:
    #     - ref: user-global-api-viewer
    #       role_name: Viewer
    #       entity_id: "*"
    #       entity_type_name: APIs
    #       entity_region: "*"
