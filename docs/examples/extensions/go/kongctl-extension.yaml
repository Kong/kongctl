schema_version: 1

publisher: kong
name: hello-go
version: 0.1.0
summary: Example Go-based kongctl SDK extension

runtime:
  command: bin/kongctl-ext-hello-go

command_paths:
  - id: get_hello_go
    path:
      - name: get
      - name: hello-go
    summary: Get current user with a Go extension
    description: Calls Konnect through the kongctl Go SDK helper.
    usage: kongctl get hello-go [args] [flags]
    examples:
      - go build -o bin/kongctl-ext-hello-go .
      - kongctl link extension docs/examples/extensions/go
      - kongctl get hello-go --output json --jq '{id, email}'
