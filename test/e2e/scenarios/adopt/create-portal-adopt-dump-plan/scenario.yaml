vars:
  portal_name: adopt-e2e-portal

steps:
  - name: 000-reset
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-create-adopt-dump-plan
    skipInputs: true
    commands:
      - name: 000-create-portal
        create:
          resource: portal
          payload:
            inline:
              name: "{{ .vars.portal_name }}"
              display_name: "Adopt Scenario Portal"
              authentication_enabled: false
              rbac_enabled: false
          recordVar:
            name: portal_id
            responsePath: id

      - name: 001-adopt-portal
        run:
          - adopt
          - portal
          - "{{ .vars.portal_id }}"
          - --namespace
          - team-e2e
        assertions:
          - expect:
              fields:
                namespace: team-e2e
                id: "{{ .vars.portal_id }}"
                resource_type: portal

      - name: 002-dump-portals
        run:
          - dump
          - declarative
          - "--resources=portals"
          - --default-namespace
          - team-e2e
        outputFormat: none
        parseAs: yaml
        stdoutFile: "{{ .workdir }}/dump.yaml"
        assertions:
          - select: "portals[?ref=='{{ .vars.portal_id }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.portal_name }}"
          - select: "_defaults.kongctl"
            expect:
              fields:
                namespace: team-e2e

      - name: 003-plan-from-dump
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/dump.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 002-delete-cleanup
    skipInputs: true
    commands:
      - name: 000-delete
        run:
          - delete
          - -f
          - "{{ .scenario_dir }}/cleanup.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: delete
          - select: plan.summary
            expect:
              fields:
                total_changes: 1
                by_action.DELETE: 1
          - select: summary
            expect:
              fields:
                failed: 0
                status: success
