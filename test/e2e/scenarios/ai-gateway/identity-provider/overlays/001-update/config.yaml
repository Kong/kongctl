_defaults:
  kongctl:
    namespace: ai-gateway-identity-provider-e2e

ai_gateways:
  - ref: ai-gateway-identity-provider-e2e
    name: ai-gateway-identity-provider-e2e
    display_name: "AI Gateway Identity Provider E2E"
    description: "AI Gateway Identity Provider e2e"
    proxy_urls:
      - host: ai-gateway-identity-provider-e2e.example.com
        port: 443
        protocol: https
    identity_providers:
      - ref: support-key-auth
        name: support-key-auth
        type: key-auth
        display_name: "Updated Support Key Auth"
        labels:
          team: support
          owner: platform
        config:
          key_names:
            - x-support-api-key
            - apikey
          hide_credentials: true

