_defaults:
  kongctl:
    namespace: ai-gateway-mcp-server-e2e

ai_gateways:
  - ref: ai-gateway-mcp-e2e
    name: ai-gateway-mcp-e2e
    display_name: "AI Gateway MCP Server E2E"
    description: "AI Gateway MCP Server e2e"
    proxy_urls:
      - host: ai-gateway-mcp-e2e.example.com
        port: 443
        protocol: https
    labels:
      owner: platform
      lifecycle: dev
    policies:
      - ref: mcp-key-auth
        name: mcp-key-auth
        type: key-auth
        display_name: "MCP Key Auth"
        enabled: true
        global: false
        labels:
          team: support
          phase: create
        config:
          key_names:
            - apikey
          hide_credentials: true
    mcp_servers: []
