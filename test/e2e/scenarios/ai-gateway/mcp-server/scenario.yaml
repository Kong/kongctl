baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info
  KONGCTL_E2E_WEATHERAPI_API_KEY: fake-weather-api-key

vars:
  namespace: "ai-gateway-mcp-server-e2e"
  gateway_name: "AI Gateway MCP Server E2E"
  gateway_ref: "ai-gateway-mcp-e2e"
  policy_ref: "mask-sensitive-data"
  policy_name: "mask-sensitive-data"
  policy_display_name: "Mask Sensitive Data"
  server_ref: "support-tools"
  server_name: "support-tools"
  server_display_name: "Support Tools"
  server_updated_display_name: "Support Tools Updated"
  passthrough_server_ref: "context7-passthrough"
  passthrough_server_name: "context7-passthrough"
  passthrough_server_display_name: "POC MCP Server (Context7 passthrough)"
  conversion_listener_server_ref: "support-conversion-listener"
  conversion_listener_server_name: "support-conversion-listener"
  conversion_listener_server_display_name: "Support Conversion Listener"
  listener_server_ref: "support-listener"
  listener_server_name: "support-listener"
  listener_server_display_name: "Support Listener"
  upstream_server_ref: "support-upstream"
  upstream_server_name: "support-upstream"
  upstream_server_display_name: "Support Upstream Server"

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - updated_at
      - config_hash
      - endpoints
      - resource_id
      - change_id
      - generated_at

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-explain-and-scaffold
    skipInputs: true
    commands:
      - name: 000-explain-ai-gateway-policy-json
        run:
          - explain
          - ai_gateway_policy
          - -o
          - json
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: ai_gateway_policy"
                '"x-kongctl-root-key"': ai_gateway_policies
          - select: "contains(keys(properties), 'ai_gateway')"
            expect:
              fields:
                "@": true
      - name: 001-scaffold-ai-gateway-policy
        run:
          - scaffold
          - ai_gateway_policy
        outputFormat: disable
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'ai_gateway_policies:')": true
                "contains(stdout, 'type: ai-sanitizer')": true
                "contains(stdout, 'ai_gateway: !ref')": true
      - name: 002-explain-ai-gateway-mcp-server-json
        run:
          - explain
          - ai_gateway_mcp_server
          - -o
          - json
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: ai_gateway_mcp_server"
                '"x-kongctl-root-key"': ai_gateway_mcp_servers
          - select: "contains(keys(oneOf[0].properties), 'ai_gateway')"
            expect:
              fields:
                "@": true
          - select: "oneOf[?properties.type.const=='passthrough-listener'] | [0].properties"
            expect:
              fields:
                access.properties.acl_attribute_type.type: string
                type.const: passthrough-listener
          - select: "contains(keys(oneOf[?properties.type.const=='conversion-only'] | [0].properties), 'access')"
            expect:
              fields:
                "@": false
          - select: "oneOf[?properties.type.const=='conversion-only'] | [0].properties.tools.items.properties"
            expect:
              fields:
                headers.type: object
                query.type: object
                request_body.type: object
                responses.type: object
      - name: 003-scaffold-ai-gateway-mcp-server
        run:
          - scaffold
          - ai_gateway_mcp_server
        outputFormat: disable
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'ai_gateway_mcp_servers:')": true
                "contains(stdout, 'type: conversion-only')": true
                "contains(stdout, 'tools:')": true

  - name: 002-reject-conversion-only-access
    inputOverlayDirs:
      - overlays/000-invalid-conversion-only-access
    commands:
      - name: 000-plan-invalid-conversion-only-access
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        expectFailure:
          exitCode: 1
          contains: 'field "access" is not supported when type is "conversion-only"'

  - name: 003-plan-apply-create
    commands:
      - name: 000-plan-create
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-create.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                total_changes: 7
                by_action.CREATE: 7
          - select: >-
              changes[?resource_type=='ai_gateway_policy' && resource_ref=='{{ .vars.policy_ref }}'] | [0]
            expect:
              fields:
                action: CREATE
                fields.name: "{{ .vars.policy_name }}"
                fields.type: ai-sanitizer
                fields.display_name: "{{ .vars.policy_display_name }}"
                fields.enabled: true
                fields.global: false
                fields.config.anonymize[0]: email
          - select: >-
              changes[?resource_type=='ai_gateway_mcp_server' && resource_ref=='{{ .vars.server_ref }}'] | [0]
            expect:
              fields:
                action: CREATE
                fields.name: "{{ .vars.server_name }}"
                fields.type: conversion-only
                fields.display_name: "{{ .vars.server_display_name }}"
                fields.config.url: https://support-tools.example.com
                fields.config.route.paths[0]: /support-tools
                fields.tools[0].annotations.title: "Lookup customer"
                fields.tools[0].annotations.read_only_hint: true
                fields.tools[0].parameters[0].name: customer_id
                fields.tools[0].parameters[0].in: path
                fields.tools[0].parameters[0].schema.type: string
                fields.tools[0].query.key: __ENV__:KONGCTL_E2E_WEATHERAPI_API_KEY
                fields.policies[0]: "{{ .vars.policy_name }}"
          - select: >-
              changes[?resource_type=='ai_gateway_mcp_server' && resource_ref=='{{ .vars.passthrough_server_ref }}'] | [0]
            expect:
              fields:
                action: CREATE
                fields.name: "{{ .vars.passthrough_server_name }}"
                fields.type: passthrough-listener
                fields.display_name: "{{ .vars.passthrough_server_display_name }}"
                fields.config.url: https://mcp.context7.com/mcp
                fields.config.route.paths[0]: /mcp
                fields.config.route.methods[0]: GET
                fields.config.route.methods[1]: POST
                fields.access.acl_attribute_type: oauth_access_token
                fields.access.access_token_claim_field: sub
          - select: >-
              changes[?resource_type=='ai_gateway_mcp_server' && resource_ref=='{{ .vars.conversion_listener_server_ref }}'] | [0]
            expect:
              fields:
                action: CREATE
                fields.name: "{{ .vars.conversion_listener_server_name }}"
                fields.type: conversion-listener
                fields.display_name: "{{ .vars.conversion_listener_server_display_name }}"
                fields.config.url: https://support-conversion-listener.example.com
                fields.config.route.paths[0]: /support-conversion-listener
                fields.access.acl_attribute_type: consumer
          - select: >-
              changes[?resource_type=='ai_gateway_mcp_server' && resource_ref=='{{ .vars.listener_server_ref }}'] | [0]
            expect:
              fields:
                action: CREATE
                fields.name: "{{ .vars.listener_server_name }}"
                fields.type: listener
                fields.display_name: "{{ .vars.listener_server_display_name }}"
                fields.config.route.paths[0]: /support-listener
                fields.access.acl_attribute_type: oauth_access_token
                fields.access.access_token_claim_field: sub
                fields.access.default_tool_acls.allow[0]: support-subject
          - select: >-
              changes[?resource_type=='ai_gateway_mcp_server' && resource_ref=='{{ .vars.upstream_server_ref }}'] | [0]
            expect:
              fields:
                action: CREATE
                fields.name: "{{ .vars.upstream_server_name }}"
                fields.type: upstream-server
                fields.display_name: "{{ .vars.upstream_server_display_name }}"
                fields.config.url: https://support-upstream.example.com/mcp
                fields.config.tools_cache_ttl_seconds: 60
                fields.config.route.paths[0]: /support-upstream
                fields.access.acl_attribute_type: consumer
      - name: 001-apply-create
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-create.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 7
                failed: 0
                status: success
      - name: 002-list-policies
        run:
          - get
          - ai-gateway
          - policies
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - -o
          - json
        recordVar:
          name: policy_id
          responsePath: "[?name=='{{ .vars.policy_name }}'] | [0].id"
        assertions:
          - select: "[?name=='{{ .vars.policy_name }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.policy_name }}"
                display_name: "{{ .vars.policy_display_name }}"
                type: ai-sanitizer
                enabled: true
                global: false
                config.anonymize[0]: email
      - name: 003-get-policy-by-name
        run:
          - get
          - ai-gateway
          - policies
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - "{{ .vars.policy_name }}"
          - -o
          - json
        assertions:
          - select: name
            expect:
              fields:
                "@": "{{ .vars.policy_name }}"
          - select: type
            expect:
              fields:
                "@": ai-sanitizer
      - name: 004-get-policy-by-id
        run:
          - get
          - ai-gateway
          - policies
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - "{{ .vars.policy_id }}"
          - -o
          - json
        assertions:
          - select: name
            expect:
              fields:
                "@": "{{ .vars.policy_name }}"
          - select: type
            expect:
              fields:
                "@": ai-sanitizer
      - name: 005-list-mcp-servers
        run:
          - get
          - ai-gateway
          - mcp-servers
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - -o
          - json
        recordVar:
          name: mcp_server_id
          responsePath: "[?name=='{{ .vars.server_name }}'] | [0].id"
        assertions:
          - select: "[?name=='{{ .vars.server_name }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.server_name }}"
                display_name: "{{ .vars.server_display_name }}"
                type: conversion-only
                enabled: true
                config.url: https://support-tools.example.com
                config.route.paths[0]: /support-tools
                tools[0].name: lookup-customer
                tools[0].annotations.title: "Lookup customer"
                tools[0].annotations.read_only_hint: true
                tools[0].parameters[0].name: customer_id
                tools[0].parameters[0].in: path
                tools[0].parameters[0].schema.type: string
                tools[0].query.key: fake-weather-api-key
                policies[0]: "{{ .vars.policy_name }}"
          - select: "[?name=='{{ .vars.passthrough_server_name }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.passthrough_server_name }}"
                display_name: "{{ .vars.passthrough_server_display_name }}"
                type: passthrough-listener
                enabled: true
                config.url: https://mcp.context7.com/mcp
                config.route.paths[0]: /mcp
                config.route.methods[0]: GET
                config.route.methods[1]: POST
                access:
                  acl_attribute_type: oauth_access_token
                  access_token_claim_field: sub
          - select: "[?name=='{{ .vars.conversion_listener_server_name }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.conversion_listener_server_name }}"
                display_name: "{{ .vars.conversion_listener_server_display_name }}"
                type: conversion-listener
                enabled: true
                config.url: https://support-conversion-listener.example.com
                config.route.paths[0]: /support-conversion-listener
                access:
                  acl_attribute_type: consumer
          - select: "[?name=='{{ .vars.listener_server_name }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.listener_server_name }}"
                display_name: "{{ .vars.listener_server_display_name }}"
                type: listener
                enabled: true
                config.route.paths[0]: /support-listener
                access:
                  acl_attribute_type: oauth_access_token
                  access_token_claim_field: sub
                  default_tool_acls:
                    allow:
                      - support-subject
          - select: "[?name=='{{ .vars.upstream_server_name }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.upstream_server_name }}"
                display_name: "{{ .vars.upstream_server_display_name }}"
                type: upstream-server
                enabled: true
                config.url: https://support-upstream.example.com/mcp
                config.tools_cache_ttl_seconds: 60
                config.route.paths[0]: /support-upstream
                access:
                  acl_attribute_type: consumer
      - name: 006-get-mcp-server-by-name
        run:
          - get
          - ai-gateway
          - mcp-server
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - "{{ .vars.server_name }}"
          - -o
          - json
        assertions:
          - select: name
            expect:
              fields:
                "@": "{{ .vars.server_name }}"
      - name: 007-get-passthrough-mcp-server-by-name
        run:
          - get
          - ai-gateway
          - mcp-server
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - "{{ .vars.passthrough_server_name }}"
          - -o
          - json
        assertions:
          - select: "@"
            expect:
              fields:
                name: "{{ .vars.passthrough_server_name }}"
                type: passthrough-listener
                config.route.paths[0]: /mcp
                access:
                  acl_attribute_type: oauth_access_token
                  access_token_claim_field: sub
      - name: 008-get-conversion-listener-mcp-server-by-name
        run:
          - get
          - ai-gateway
          - mcp-server
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - "{{ .vars.conversion_listener_server_name }}"
          - -o
          - json
        assertions:
          - select: "@"
            expect:
              fields:
                name: "{{ .vars.conversion_listener_server_name }}"
                type: conversion-listener
                config.route.paths[0]: /support-conversion-listener
                access:
                  acl_attribute_type: consumer
      - name: 009-get-listener-mcp-server-by-name
        run:
          - get
          - ai-gateway
          - mcp-server
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - "{{ .vars.listener_server_name }}"
          - -o
          - json
        assertions:
          - select: "@"
            expect:
              fields:
                name: "{{ .vars.listener_server_name }}"
                type: listener
                config.route.paths[0]: /support-listener
                access:
                  acl_attribute_type: oauth_access_token
                  access_token_claim_field: sub
                  default_tool_acls:
                    allow:
                      - support-subject
      - name: 010-get-upstream-mcp-server-by-name
        run:
          - get
          - ai-gateway
          - mcp-server
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - "{{ .vars.upstream_server_name }}"
          - -o
          - json
        assertions:
          - select: "@"
            expect:
              fields:
                name: "{{ .vars.upstream_server_name }}"
                type: upstream-server
                config.route.paths[0]: /support-upstream
                access:
                  acl_attribute_type: consumer
      - name: 011-get-mcp-server-by-id
        run:
          - get
          - ai-gateway
          - mcp-servers
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - "{{ .vars.mcp_server_id }}"
          - -o
          - json
        assertions:
          - select: name
            expect:
              fields:
                "@": "{{ .vars.server_name }}"

  - name: 004-plan-apply-update
    inputOverlayDirs:
      - overlays/001-update
    commands:
      - name: 000-plan-update
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-update.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.UPDATE: 1
          - select: >-
              changes[?resource_type=='ai_gateway_mcp_server' && resource_ref=='{{ .vars.server_ref }}'] | [0]
            expect:
              fields:
                action: UPDATE
                fields.display_name: "{{ .vars.server_updated_display_name }}"
                fields.enabled: false
                fields.labels.phase: update
                fields.tools[0].query.key: __ENV__:KONGCTL_E2E_WEATHERAPI_API_KEY
      - name: 001-apply-update
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-update.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 002-verify-update
        run:
          - get
          - ai-gateway
          - mcp-servers
          - --gateway-name
          - "{{ .vars.gateway_name }}"
          - "{{ .vars.server_name }}"
          - -o
          - json
        assertions:
          - select: "@"
            expect:
              fields:
                display_name: "{{ .vars.server_updated_display_name }}"
                enabled: false
                labels.phase: update
                config.url: https://support-tools-updated.example.com
                config.route.paths[0]: /support-tools
                tools[0].annotations.title: "Lookup customer"
                tools[0].parameters[0].name: customer_id
                tools[0].query.key: fake-weather-api-key
      - name: 003-diff-no-changes
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, 'No changes detected. Konnect is up to date.')": true

  - name: 005-dump-round-trip
    skipInputs: true
    commands:
      - name: 000-dump-ai-gateway-with-children
        run:
          - dump
          - declarative
          - "--resources=ai_gateways"
          - "--include-child-resources"
          - "--default-namespace={{ .vars.namespace }}"
        outputFormat: none
        parseAs: yaml
        stdoutFile: "{{ .workdir }}/dump-ai-gateway.yaml"
        assertions:
          - select: >-
              ai_gateways[?display_name=='{{ .vars.gateway_name }}'] | [0].mcp_servers[?name=='{{ .vars.server_name }}'] | [0]
            expect:
              fields:
                name: "{{ .vars.server_name }}"
                display_name: "{{ .vars.server_updated_display_name }}"
                type: conversion-only
                policies[0]: "{{ .vars.policy_name }}"
                tools[0].annotations.title: "Lookup customer"
                tools[0].parameters[0].name: customer_id
                tools[0].query.key: fake-weather-api-key
          - select: >-
              ai_gateways[?display_name=='{{ .vars.gateway_name }}'] | [0].mcp_servers[?name=='{{ .vars.passthrough_server_name }}'] | [0]
            expect:
              fields:
                name: "{{ .vars.passthrough_server_name }}"
                display_name: "{{ .vars.passthrough_server_display_name }}"
                type: passthrough-listener
                access:
                  acl_attribute_type: oauth_access_token
                  access_token_claim_field: sub
          - select: >-
              ai_gateways[?display_name=='{{ .vars.gateway_name }}'] | [0].mcp_servers[?name=='{{ .vars.conversion_listener_server_name }}'] | [0]
            expect:
              fields:
                name: "{{ .vars.conversion_listener_server_name }}"
                display_name: "{{ .vars.conversion_listener_server_display_name }}"
                type: conversion-listener
                access:
                  acl_attribute_type: consumer
          - select: >-
              ai_gateways[?display_name=='{{ .vars.gateway_name }}'] | [0].mcp_servers[?name=='{{ .vars.listener_server_name }}'] | [0]
            expect:
              fields:
                name: "{{ .vars.listener_server_name }}"
                display_name: "{{ .vars.listener_server_display_name }}"
                type: listener
                access:
                  acl_attribute_type: oauth_access_token
                  access_token_claim_field: sub
                  default_tool_acls:
                    allow:
                      - support-subject
          - select: >-
              ai_gateways[?display_name=='{{ .vars.gateway_name }}'] | [0].mcp_servers[?name=='{{ .vars.upstream_server_name }}'] | [0]
            expect:
              fields:
                name: "{{ .vars.upstream_server_name }}"
                display_name: "{{ .vars.upstream_server_display_name }}"
                type: upstream-server
                access:
                  acl_attribute_type: consumer
          - select: >-
              ai_gateways[?display_name=='{{ .vars.gateway_name }}'] | [0].policies[?name=='{{ .vars.policy_name }}'] | [0]
            expect:
              fields:
                name: "{{ .vars.policy_name }}"
                display_name: "{{ .vars.policy_display_name }}"
                type: ai-sanitizer
                config.anonymize[0]: email
      - name: 001-plan-from-ai-gateway-dump
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/dump-ai-gateway.yaml"
          - --mode
          - sync
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0
      - name: 002-dump-root-mcp-servers
        run:
          - dump
          - declarative
          - "--resources=ai_gateway_mcp_servers"
          - "--filter-name={{ .vars.server_name }}"
          - "--default-namespace={{ .vars.namespace }}"
        outputFormat: none
        parseAs: yaml
        assertions:
          - select: "ai_gateway_mcp_servers[0]"
            expect:
              fields:
                name: "{{ .vars.server_name }}"
          - select: "ai_gateway_mcp_servers[0].ai_gateway != ''"
            expect:
              fields:
                "@": true
      - name: 003-dump-root-policies
        run:
          - dump
          - declarative
          - "--resources=ai_gateway_policies"
          - "--filter-name={{ .vars.policy_name }}"
          - "--default-namespace={{ .vars.namespace }}"
        outputFormat: none
        parseAs: yaml
        assertions:
          - select: "ai_gateway_policies[0]"
            expect:
              fields:
                name: "{{ .vars.policy_name }}"
                display_name: "{{ .vars.policy_display_name }}"
                type: ai-sanitizer
          - select: "ai_gateway_policies[0].ai_gateway != ''"
            expect:
              fields:
                "@": true

  - name: 006-sync-delete-mcp-server
    inputOverlayDirs:
      - overlays/002-sync-delete-mcp
    commands:
      - name: 000-sync-delete-mcp-server
        outputFormat: json
        run:
          - sync
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: plan.summary
            expect:
              fields:
                total_changes: 5
                by_action.DELETE: 5
          - select: >-
              plan.changes[?resource_type=='ai_gateway_mcp_server' && action=='DELETE' && resource_ref=='{{ .vars.server_name }}'] | [0]
            expect:
              fields:
                resource_ref: "{{ .vars.server_name }}"
          - select: >-
              plan.changes[?resource_type=='ai_gateway_mcp_server' && action=='DELETE' && resource_ref=='{{ .vars.passthrough_server_name }}'] | [0]
            expect:
              fields:
                resource_ref: "{{ .vars.passthrough_server_name }}"
          - select: >-
