_defaults:
  kongctl:
    namespace: ai-gateway-mcp-server-e2e

ai_gateways:
  - ref: ai-gateway-mcp-e2e
    display_name: "AI Gateway MCP Server E2E"
    description: "AI Gateway MCP Server e2e"
    proxy_urls:
      - host: ai-gateway-mcp-e2e.example.com
        port: 443
        protocol: https
    labels:
      owner: platform
      lifecycle: dev
    policies:
      - ref: mask-sensitive-data
        name: mask-sensitive-data
        type: ai-sanitizer
        display_name: "Mask Sensitive Data"
        enabled: true
        global: false
        labels:
          team: support
          phase: create
        config:
          anonymize:
            - email
    mcp_servers:
      - ref: support-tools
        type: conversion-only
        name: support-tools
        display_name: "Support Tools"
        enabled: true
        labels:
          team: support
          phase: create
        config:
          url: https://support-tools.example.com
          route:
            paths:
              - /support-tools
        tools:
          - name: lookup-customer
            description: "Look up a customer profile"
            method: GET
            path: /customers/{customer_id}
        policies:
          - mask-sensitive-data
