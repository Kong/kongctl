_defaults:
  kongctl:
    namespace: ai-gateway-model-e2e

ai_gateways:
  - ref: ai-gateway-model-e2e
    name: ai-gateway-model-e2e
    display_name: "AI Gateway Model E2E"
    description: "AI Gateway Model e2e"
    proxy_urls:
      - host: ai-gateway-model-e2e.example.com
        port: 443
        protocol: https
    labels:
      owner: platform
      lifecycle: dev
    providers:
      - ref: support-openai
        name: support-openai
        type: openai
        display_name: "Support OpenAI"
        config:
          auth:
            type: basic
            headers:
              - name: Authorization
                value: placeholder
    models:
      - ref: support-gpt
        type: model
        name: support-gpt
        display_name: "Support GPT"
        enabled: true
        config:
          route: {}
          model: {}
        formats:
          - type: openai
        target_models:
          - name: gpt-4o
            provider: support-openai
            config:
              type: openai
          - name: gpt-4o-mini
            provider: support-openai
            config:
              type: openai
        policies: []
        capabilities:
          - generate
