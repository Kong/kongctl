_defaults:
  kongctl:
    namespace: ai-gateway-vault-e2e

ai_gateways:
  - ref: ai-gateway-vault-e2e
    display_name: "AI Gateway Vault E2E"
    description: "AI Gateway Vault e2e"
    proxy_urls:
      - host: ai-gateway-vault-e2e.example.com
        port: 443
        protocol: https
    labels:
      owner: platform
      lifecycle: dev
    vaults:
      - ref: support-env
        type: env
        name: support-env
        description: "Support environment variables"
        labels:
          team: support
          phase: create
        config:
          prefix: SUPPORT_
          base64_decode: false
