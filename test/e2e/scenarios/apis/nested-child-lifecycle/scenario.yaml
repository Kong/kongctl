baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  controlPlaneName: "nested-control-plane"
  gatewayServiceName: "nested-gateway-service"

defaults:
  mask:
    dropKeys:
      - resource_id
      - change_id
      - created_at
      - updated_at
      - api_spec_ids

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-create-external-core-entities
    skipInputs: true
    commands:
      - name: 000-create-control-plane
        create:
          resource: control_plane
          payload:
            inline:
              name: "{{ .vars.controlPlaneName }}"
              description: "Nested scenario control plane"
              cluster_type: "CLUSTER_TYPE_SERVERLESS"
          recordVar:
            name: controlPlaneID
            responsePath: id
      - name: 001-create-gateway-service
        create:
          resource: gateway_service
          endpointParams:
            controlPlaneId: "{{ .vars.controlPlaneID }}"
          payload:
            inline:
              name: "{{ .vars.gatewayServiceName }}"
              url: https://nested-api.kongctl-e2e.test/
          recordVar:
            name: gatewayServiceID
            responsePath: id

  - name: 002-apply-create
    commands:
      - name: 000-apply-create
        run:
          - apply
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: plan.summary
            expect:
              fields:
                total_changes: 8
                by_action.CREATE: 8
          - select: summary
            expect:
              fields:
                applied: 8
                failed: 0
                status: success
          - select: "plan.changes[?resource_ref=='api-nested'] | [0]"
            expect:
              fields:
                action: CREATE
                fields.name: "API Nested"
                fields.version: "1.0.0"
                "fields.attributes.domains[?@=='web'] | length(@)": 1
          - select: "plan.changes[?resource_ref=='api-nested-v1'] | [0]"
            expect:
              fields:
                action: CREATE
                fields.version: "1.0.0"
          - select: "plan.changes[?resource_ref=='api-nested-pub1'] | [0]"
            expect:
              fields:
                action: CREATE
                fields.visibility: "private"
                fields.auto_approve_registrations: false
          - select: "plan.changes[?resource_ref=='api-nested-impl1'] | [0]"
            expect:
              fields:
                action: CREATE
          - select: "plan.changes[?resource_ref=='api-nested-doc-root'] | [0]"
            expect:
              fields:
                action: CREATE
                fields.title: "Root Document"
          - select: "plan.changes[?resource_ref=='api-nested-doc-child'] | [0]"
            expect:
              fields:
                action: CREATE
                fields.title: "Child Document"
          - select: "plan.changes[?resource_ref=='portal-nested'] | [0]"
            expect:
              fields:
                action: CREATE
          - select: "plan.changes[?resource_ref=='auth-strategy-nested'] | [0]"
            expect:
              fields:
                action: CREATE
      - name: 001-get-api
        run: ["get", "apis", "-o", "json"]
        assertions:
          - select: "[?name=='API Nested'] | [0]"
            expect:
              fields:
                version: "1.0.0"
                "labels.owner": "platform"
                "labels.\"KONGCTL-namespace\"": "apis-nested"
      - name: 002-get-versions
        run: ["get", "api", "versions", "--api-name", "API Nested", "-o", "json"]
        recordVar:
          name: v1VersionID
          responsePath: "[?version=='1.0.0'] | [0].id"
        assertions:
          - select: "[?version=='1.0.0'] | [0]"
            expect:
              fields:
                version: "1.0.0"
                "spec.type": "oas3"
      - name: 003-get-version-by-string
        run: ["get", "api", "versions", "--api-name", "API Nested", "1.0.0", "-o", "json"]
        assertions:
          - select: "@"
            expect:
              fields:
                version: "1.0.0"
                "spec.type": "oas3"
      - name: 004-get-version-by-uuid
        run: ["get", "api", "versions", "--api-name", "API Nested", "{{ .vars.v1VersionID }}", "-o", "json"]
        assertions:
          - select: "@"
            expect:
              fields:
                version: "1.0.0"
                "spec.type": "oas3"
      - name: 005-get-version-not-found
        run: ["get", "api", "versions", "--api-name", "API Nested", "nonexistent-99.0.0", "-o", "json"]
        expectFailure:
          exitCode: 1
          contains: "not found"
      - name: 006-get-documents
        run: ["get", "api", "documents", "--api-name", "API Nested", "-o", "json"]
        recordVar:
          name: rootDocID
          responsePath: "[?title=='Root Document'] | [0].id"
        assertions:
          - select: "[?title=='Root Document'] | [0]"
            expect:
              fields:
                title: "Root Document"
                slug: "root-document"
                status: "published"
                "length(id) > `0`": true
          - select: "[?title=='Child Document'] | [0]"
            expect:
              fields:
                title: "Child Document"
                status: "unpublished"
      - name: 007-get-document-by-title
        run: ["get", "api", "documents", "--api-name", "API Nested", "Root Document", "-o", "json"]
        assertions:
          - select: "@"
            expect:
              fields:
                id: "{{ .vars.rootDocID }}"
                title: "Root Document"
                slug: "root-document"
                status: "published"
      - name: 008-get-document-by-slug
        run: ["get", "api", "documents", "--api-name", "API Nested", "root-document", "-o", "json"]
        assertions:
          - select: "@"
            expect:
              fields:
                id: "{{ .vars.rootDocID }}"
                title: "Root Document"
                slug: "root-document"
                status: "published"
      - name: 009-get-document-by-uuid
        run: ["get", "api", "documents", "--api-name", "API Nested", "{{ .vars.rootDocID }}", "-o", "json"]
        assertions:
          - select: "@"
            expect:
              fields:
                id: "{{ .vars.rootDocID }}"
                title: "Root Document"
                slug: "root-document"
                status: "published"
      - name: 010-get-document-not-found
        run: ["get", "api", "documents", "--api-name", "API Nested", "nonexistent-document", "-o", "json"]
        expectFailure:
          exitCode: 1
          contains: "not found"

  - name: 003-apply-update
    inputOverlayDirs:
      - overlays/002-update
    commands:
      - name: 000-apply-update
        run:
          - apply
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: plan.summary
            expect:
              fields:
                total_changes: 6
                by_action.UPDATE: 4
                by_action.CREATE: 2
          - select: summary
            expect:
              fields:
                applied: 6
                failed: 0
                status: success
          - select: "plan.changes[?resource_ref=='api-nested'] | [0]"
            expect:
              fields:
                action: UPDATE
                fields.version: "2.0.0"
                fields.labels.owner: "platform-eng"
                fields.labels.lifecycle: "stage"
          - select: "plan.changes[?resource_ref=='api-nested-v2'] | [0]"
            expect:
              fields:
                action: CREATE
          - select: "plan.changes[?resource_ref=='api-nested-pub1'] | [0]"
            expect:
              fields:
                action: UPDATE
                fields.visibility: "public"
                fields.auto_approve_registrations: true
          - select: "plan.changes[?resource_ref=='api-nested-doc-root'] | [0]"
            expect:
              fields:
                action: UPDATE
                "contains(fields.content, 'Updated overview for version 2.0.0')": true
          - select: "plan.changes[?resource_ref=='api-nested-doc-child'] | [0]"
            expect:
              fields:
                action: UPDATE
                fields.status: "published"
          - select: "plan.changes[?resource_ref=='api-nested-doc-new'] | [0]"
            expect:
              fields:
                action: CREATE
                fields.status: "unpublished"
      - name: 001-get-versions
        run: ["get", "api", "versions", "--api-name", "API Nested", "-o", "json"]
        assertions:
          - select: "[?version=='2.0.0'] | [0]"
            expect:
              fields:
                version: "2.0.0"
                "spec.type": "oas3"
          - select: "[?version=='1.0.0'] | [0]"
            expect:
              fields:
                version: "1.0.0"
      - name: 002-get-documents
        run: ["get", "api", "documents", "--api-name", "API Nested", "-o", "json"]
        assertions:
          - select: "[?title=='New Document'] | [0]"
            expect:
              fields:
                title: "New Document"
                status: "unpublished"
          - select: "[?title=='Child Document'] | [0]"
            expect:
              fields:
                title: "Child Document"
                status: "published"
      - name: 003-get-publications
        run: ["get", "api", "publications", "--api-name", "API Nested", "-o", "json"]
        assertions:
          - select: "[0]"
            expect:
              fields:
                visibility: "public"
                auto_approve_registrations: true

  - name: 004-sync-delete
    inputOverlayDirs:
      - overlays/003-sync-delete
    commands:
      - name: 000-sync-delete
        run:
          - sync
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: plan.summary
            expect:
              fields:
                total_changes: 3
                by_action.DELETE: 3
          - select: summary
            expect:
              fields:
                applied: 3
                failed: 0
                status: success
      - name: 001-get-apis
        run: ["get", "apis", "-o", "json"]
        assertions:
          - select: "[?name=='API Nested']"
            expect:
              fields:
                "length(@)": 0

  - name: 005-final-reset
    skipInputs: true
    commands:
      - resetOrg: true
