baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  portalRef: e2e-portal
  portalName: "E2E Root-Level Publication Portal"
  apiRef: sms
  apiName: "E2E SMS API"
  publicationRef: sms-to-e2e-portal

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - updated_at
      - resource_id
      - change_id

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-apply-omitted-visibility
    commands:
      - name: 000-apply
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - -f
          - "{{ .workdir }}/publications.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 4
                failed: 0
                skipped: 0
                status: "success"
                total_changes: 4
          - select: >-
              plan.changes[?resource_type=='api_publication' &&
                            resource_ref=='{{ .vars.publicationRef }}'] | [0]
            expect:
              fields:
                action: "CREATE"
      - name: 001-get-api-publications
        run:
          - get
          - api
          - publications
          - --api-name
          - "{{ .vars.apiName }}"
          - -o
          - json
        assertions:
          - select: "[0]"
            expect:
              fields:
                visibility: "private"
                "length(portal_id)": 36
      - name: 002-plan-no-op
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - -f
          - "{{ .workdir }}/publications.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0
          - select: "changes[?resource_type=='api_publication']"
            expect:
              fields:
                "length(@)": 0

  - name: 002-set-explicit-public
    inputOverlayDirs:
      - overlays/002-set-public
    commands:
      - name: 000-apply
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - -f
          - "{{ .workdir }}/publications.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
          - select: >-
              plan.changes[?resource_type=='api_publication' &&
                            resource_ref=='{{ .vars.publicationRef }}'] | [0]
            expect:
              fields:
                action: "UPDATE"
                "fields.visibility": "public"
      - name: 001-get-api-publications
        run:
          - get
          - api
          - publications
          - --api-name
          - "{{ .vars.apiName }}"
          - -o
          - json
        assertions:
          - select: "[0]"
            expect:
              fields:
                visibility: "public"
      - name: 002-plan-no-op
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - -f
          - "{{ .workdir }}/publications.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0
          - select: "changes[?resource_type=='api_publication']"
            expect:
              fields:
                "length(@)": 0

  - name: 003-omit-visibility-after-public
    commands:
      - name: 000-apply-no-op
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - -f
          - "{{ .workdir }}/publications.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 0
                failed: 0
                skipped: 0
                status: "success"
                total_changes: 0
          - select: "plan.changes[?resource_type=='api_publication']"
            expect:
              fields:
                "length(@)": 0
      - name: 001-get-api-publications
        run:
          - get
          - api
          - publications
          - --api-name
          - "{{ .vars.apiName }}"
          - -o
          - json
        assertions:
          - select: "[0]"
            expect:
              fields:
                visibility: "public"
      - name: 002-plan-no-op
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - -f
          - "{{ .workdir }}/publications.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0
          - select: "changes[?resource_type=='api_publication']"
            expect:
              fields:
                "length(@)": 0

  - name: 004-delete-cleanup
    inputOverlayDirs:
      - overlays/002-set-public
    commands:
      - name: 000-delete
        run:
          - delete
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - -f
          - "{{ .workdir }}/publications.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: delete
          - select: summary
            expect:
              fields:
                failed: 0
                status: success
