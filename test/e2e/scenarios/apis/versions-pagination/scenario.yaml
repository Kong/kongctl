baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  apiName: "API Pagination"

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-apply-api-versions
    commands:
      - name: 000-apply
        run:
          - apply
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 3
                failed: 0

      - name: 001-get-versions-with-small-page
        run:
          - get
          - api
          - versions
          - --api-name
          - "{{ .vars.apiName }}"
          - --page-size
          - "1"
          - -o
          - json
        assertions:
          - select: "@"
            expect:
              fields:
                "length(@)": 2
                "[?version=='1.0.0'] | length(@)": 1
                "[?version=='2.0.0'] | length(@)": 1
