baseInputsPath: testdata

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-initial-sync
    commands:
      - name: 001-sync
        run:
          - sync
          - -f
          - "{{ .workdir }}/control-plane.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: sync
          - select: "summary"
            expect:
              fields:
                total_changes: 3
      - name: 002-record-staging-id
        run:
          - get
          - konnect
          - gateway
          - control-plane
          - groups-staging-runtime
          - -o
          - json
        recordVar:
          name: stagingRuntimeID
          responsePath: id

  - name: 002-update-group-members
    inputOverlayDirs:
      - overlays/002-update-members
    commands:
      - name: 002-sync
        run:
          - sync
          - -f
          - "{{ .workdir }}/control-plane.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: sync
          - select: "summary"
            expect:
              fields:
                total_changes: 3
          - select: >-
              plan.changes[?resource_type=='control_plane' &&
                            resource_ref=='groups-staging-runtime'] | [0]
            expect:
              fields:
                action: DELETE
          - select: >-
              plan.changes[?resource_type=='control_plane' &&
                            resource_ref=='groups-emea-runtime'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='control_plane' &&
                            resource_ref=='groups-shared-group'] | [0]
            expect:
              fields:
                action: UPDATE
      - name: 003-record-emea-id
        run:
          - get
          - konnect
          - gateway
          - control-plane
          - groups-emea-runtime
          - -o
          - json
        recordVar:
          name: emeaRuntimeID
          responsePath: id

  - name: 003-verify-members-after-sync
    skipInputs: true
    commands:
      - name: 000-dump-group-members
        run:
          - dump
          - declarative
          - "--resources=control_planes"
          - "--filter-name=groups-shared-group"
        outputFormat: none
        parseAs: yaml
        assertions:
          - select: "control_planes[?name=='groups-shared-group'] | [0]"
            expect:
              fields:
                name: "groups-shared-group"
                cluster_type: "CLUSTER_TYPE_CONTROL_PLANE_GROUP"
          - select: "control_planes[?name=='groups-shared-group'] | [0].members"
            expect:
              fields:
                "length(@)": 2
                "length([?id=='{{ .vars.stagingRuntimeID }}'])": 0
                "length([?id=='{{ .vars.emeaRuntimeID }}'])": 1
          - select: "control_planes[?name=='groups-shared-group'] | [0].members[?id=='{{ .vars.emeaRuntimeID }}'] | [0]"
            expect:
              fields:
                id: "{{ .vars.emeaRuntimeID }}"

  - name: 004-plan-idempotent
    inputOverlayDirs:
      - overlays/002-update-members
    commands:
      - name: 004-plan
        outputFormat: disable
        run:
          - plan
          - --mode
          - sync
          - -f
          - "{{ .workdir }}/control-plane.yaml"
        assertions:
          - select: "summary"
            expect:
              fields:
                total_changes: 0

  - name: 005-delete-cleanup
    inputOverlayDirs:
      - overlays/002-update-members
    commands:
      - name: 000-delete
        maxConcurrency: 1
        run:
          - delete
          - -f
          - "{{ .workdir }}/control-plane.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: delete
          - select: "plan.summary"
            expect:
              fields:
                total_changes: 3
                by_action.DELETE: 3
          - select: "summary"
            expect:
              fields:
                failed: 0
                status: success
