baseInputsPath: testdata

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-initial-sync
    commands:
      - name: 000-001-sync
        run:
          - sync
          - -f
          - "{{ .workdir }}/control-plane.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: sync
          - select: >-
              plan.changes[?resource_type=='control_plane' && 
                            resource_ref=='e2e-cp'] | [0]
            expect:
              fields:
                action: CREATE

  - name: 002-sync-with-delete
    inputOverlayDirs:
      - overlays/002-sync-with-delete
    commands:
      - name: 000-002-sync
        run:
          - sync
          - -f
          - "{{ .workdir }}/control-plane.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: sync
          - select: "summary"
            expect:
              fields:
                total_changes: 2
          - select: >-
              plan.changes[?resource_type=='control_plane' &&
                            resource_ref=='e2e-cp'] | [0]
            expect:
              fields:
                action: DELETE
          - select: >-
              plan.changes[?resource_type=='control_plane' &&
                            resource_ref=='e2e-cp-2'] | [0]
            expect:
              fields:
                action: CREATE

      - name: 001-002-verify-post-sync
        run:
          - get
          - konnect
          - gateway
          - control-planes
          - -o
          - json
        assertions:
          - select: "[?name=='kongctl-e2e-cp']"
            expect:
              fields:
                "length(@)": 0
          - select: "[?name=='kongctl-e2e-cp-2'] | [0]"
            expect:
              fields:
                name: "kongctl-e2e-cp-2"
