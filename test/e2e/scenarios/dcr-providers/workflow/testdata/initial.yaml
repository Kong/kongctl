_defaults:
  kongctl:
    namespace: dcr-workflow

dcr_providers:
  - ref: e2e-dcr-okta
    name: e2e-dcr-okta
    provider_type: okta
    issuer: https://e2e-okta.example.com/oauth2/default
    dcr_config:
      dcr_token: e2e_okta_token
    labels:
      team: platform
      provider: okta

  - ref: e2e-dcr-http
    name: e2e-dcr-http
    provider_type: http
    issuer: https://e2e-http-issuer.example.com
    dcr_config:
      dcr_base_url: https://e2e-http.example.com/v1/dcr
      api_key: e2e_http_api_key
    labels:
      team: platform
      provider: http

application_auth_strategies:
  - ref: e2e-oidc-dcr-auth
    name: e2e-oidc-dcr-auth
    display_name: E2E OIDC Strategy With DCR Provider
    strategy_type: openid_connect
    dcr_provider_id: !ref e2e-dcr-http
    configs:
      openid_connect:
        issuer: https://e2e-http-issuer.example.com
        credential_claim:
          - sub
        auth_methods:
          - bearer
        scopes:
          - openid
          - profile
    labels:
      team: platform
      strategy: oidc
