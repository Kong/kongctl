_defaults:
  kongctl:
    namespace: dcr-workflow

dcr_providers:
  - ref: e2e-dcr-http
    name: e2e-dcr-http
    provider_type: http
    issuer: https://e2e-http-issuer.example.com
    dcr_config:
      dcr_base_url: https://e2e-http.example.com/v1/dcr
      api_key: e2e_http_api_key
      disable_event_hooks: true
    labels:
      team: platform
      provider: http
