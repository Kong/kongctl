_format_version: "3.0"

_info:
  select_tags:
    - "kongctl-e2e-gw"

services:
  - name: "e2e-gw-svc"
    url: "https://api.kong-air.com/"
    tags:
      - "kongctl-e2e-gw"
    routes:
      - name: "e2e-route"
        paths:
          - "/e2e"
        tags:
          - "kongctl-e2e-gw"

consumers:
  - username: "e2e-consumer"
    tags:
      - "kongctl-e2e-gw"
