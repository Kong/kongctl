_defaults:
  kongctl:
    namespace: team-commerce

control_planes:
  - ref: diff-cp
    name: "diff-coverage-cp"
    description: "Updated description for diff test"
    cluster_type: "CLUSTER_TYPE_CONTROL_PLANE"

portals:
  - ref: commerce-portal
    name: commerce-portal
    display_name: "Commerce Portal (New UI)"
    description: "Developer portal for commerce APIs"
    authentication_enabled: false
    default_api_visibility: public
    default_page_visibility: private

apis:
  - ref: orders-api
    name: orders-api
    description: "Orders API"
    labels:
      team: commerce
  - ref: analytics-api
    name: analytics-api
    description: "Analytics API"
    labels:
      team: insights

application_auth_strategies:
  - ref: diff-key-auth
    name: diff-key-auth
    display_name: "Diff Key Auth (Updated)"
    strategy_type: key_auth
    configs:
      key-auth:
        key_names:
          - X-API-Key

dcr_providers:
  - ref: diff-dcr-http
    name: diff-dcr-http
    provider_type: http
    issuer: https://e2ediffissuer-updated.example.com/oauth2/default
    dcr_config:
      dcr_base_url: https://e2ediff.example.com/v1/dcr
      api_key: e2e_diff_token
