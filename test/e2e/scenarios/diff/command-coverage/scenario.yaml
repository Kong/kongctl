baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  portalRef: commerce-portal
  portalName: "Commerce Portal"
  portalUpdatedName: "Commerce Portal (New UI)"
  namespace: team-commerce
  existingAPIName: orders-api
  removedAPIName: legacy-api
  newAPIRef: analytics-api
  existingAPIVersionRef: orders-api-v1
  removedAPIVersionRef: orders-api-v2
  removedAPIVersion: "2.0.0"
  apiVersionUpdatedInfoVersion: "1.0.1"
  apiDocumentRef: orders-api-overview-doc
  apiDocumentUpdatedText: "change history"
  cpRef: diff-cp
  cpName: "diff-coverage-cp"
  cpDesc: "Control plane for diff coverage E2E"
  cpUpdatedDesc: "Updated description for diff test"
  authStrategyRef: diff-key-auth
  authStrategyUpdatedDisplayName: "Diff Key Auth (Updated)"
  dcrProviderRef: diff-dcr-http
  dcrProviderUpdatedIssuer: "https://e2ediffissuer-updated.example.com/oauth2/default"
  teamRef: diff-backend-team
  teamName: diff-backend-team-name
  teamUpdatedDesc: "Backend team for diff coverage (updated)"

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - updated_at
      - resource_id
      - change_id
      - generated_at

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-bootstrap-state
    commands:
      - name: 000-sync-initial
        run:
          - sync
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: "plan.summary"
            expect:
              fields:
                total_changes: 10
                by_action.CREATE: 10
          - select: "summary"
            expect:
              fields:
                applied: 10
                failed: 0
          - select: >-
              plan.changes[?resource_type=='portal' &&
                            resource_ref=='{{ .vars.portalRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: "plan.changes[?resource_type=='api_version']"
            expect:
              fields:
                "length(@)": 2
          - select: >-
              plan.changes[?resource_type=='api_version' &&
                            resource_ref=='{{ .vars.existingAPIVersionRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
          - select: >-
              plan.changes[?resource_type=='api_version' &&
                            resource_ref=='{{ .vars.removedAPIVersionRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                fields.version: "{{ .vars.removedAPIVersion }}"
                namespace: "{{ .vars.namespace }}"
          - select: >-
              plan.changes[?resource_type=='api_document' &&
                            resource_ref=='{{ .vars.apiDocumentRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                fields.status: published
                namespace: "{{ .vars.namespace }}"

      - name: 001-get-portals
        run: ["get", "portals"]
        assertions:
          - select: "[?name=='{{ .vars.portalRef }}'] | [0]"
            expect:
              fields:
                display_name: "{{ .vars.portalName }}"

      - name: 002-get-apis
        run: ["get", "apis"]
        assertions:
          - select: "[?name=='{{ .vars.existingAPIName }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.existingAPIName }}"
          - select: "[?name=='{{ .vars.removedAPIName }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.removedAPIName }}"

  - name: 002-diff-noop
    commands:
      - name: 000-diff
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
          - -o
          - json
        assertions:
          - select: "summary"
            expect:
              fields:
                total_changes: 0
          - select: "changes"
            expect:
              fields:
                "length(@)": 0
          - select: "changes[?resource_type=='api_version']"
            expect:
              fields:
                "length(@)": 0
          - select: "changes[?resource_type=='api_document']"
            expect:
              fields:
                "length(@)": 0

  - name: 003-diff-with-modifications
    inputOverlayDirs:
      - overlays/003-diff
    commands:
      - name: 000-diff-apply-mode
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
          - -o
          - json
        assertions:
          - select: "metadata"
            expect:
              fields:
                mode: apply
          - select: "summary"
            expect:
              fields:
                total_changes: 8
                by_action.CREATE: 1
                by_action.UPDATE: 7
          - expect:
              fields:
                "length(changes[?action=='DELETE'])": 0
          - select: >-
              changes[?resource_type=='control_plane' &&
                       resource_ref=='{{ .vars.cpRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.description.new, fields.description)": "{{ .vars.cpUpdatedDesc }}"
          - select: >-
              changes[?resource_type=='portal' &&
                       resource_ref=='{{ .vars.portalRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.display_name.new, fields.display_name)": "{{ .vars.portalUpdatedName }}"
          - select: >-
              changes[?resource_type=='api' &&
                       resource_ref=='{{ .vars.newAPIRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
          - select: >-
              changes[?resource_type=='api_version' &&
                       resource_ref=='{{ .vars.existingAPIVersionRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "contains(changed_fields.spec.new, '{{ .vars.apiVersionUpdatedInfoVersion }}')": true
          - select: >-
              changes[?resource_type=='api_document' &&
                       resource_ref=='{{ .vars.apiDocumentRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "contains(changed_fields.content.new, '{{ .vars.apiDocumentUpdatedText }}')": true
          - select: >-
              changes[?resource_type=='application_auth_strategy' &&
                       resource_ref=='{{ .vars.authStrategyRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.display_name.new, fields.display_name)": "{{ .vars.authStrategyUpdatedDisplayName }}"
          - select: >-
              changes[?resource_type=='dcr_provider' &&
                       resource_ref=='{{ .vars.dcrProviderRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.issuer.new, fields.issuer)": "{{ .vars.dcrProviderUpdatedIssuer }}"
          - select: >-
              changes[?resource_type=='organization_team' &&
                       resource_ref=='{{ .vars.teamRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.description.new, fields.description)": "{{ .vars.teamUpdatedDesc }}"

      - name: 001-diff-delete-mode
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - delete
          - -o
          - json
        assertions:
          - select: "metadata"
            expect:
              fields:
                mode: delete
          - select: "summary"
            expect:
              fields:
                total_changes: 6
                by_action.DELETE: 6
          - expect:
              fields:
                "length(changes[?action=='CREATE'])": 0
                "length(changes[?action=='UPDATE'])": 0
          - select: >-
              changes[?resource_type=='control_plane' &&
                       resource_ref=='{{ .vars.cpName }}'] | [0]
            expect:
              fields:
                action: DELETE
          - select: >-
              changes[?resource_type=='portal' &&
                       resource_ref=='{{ .vars.portalRef }}'] | [0]
            expect:
              fields:
                action: DELETE
          - select: >-
              changes[?resource_type=='api' &&
                       resource_ref=='{{ .vars.existingAPIName }}'] | [0]
            expect:
              fields:
                action: DELETE
          - select: >-
              changes[?resource_type=='application_auth_strategy' &&
                       resource_ref=='{{ .vars.authStrategyRef }}'] | [0]
            expect:
              fields:
                action: DELETE
          - select: >-
              changes[?resource_type=='dcr_provider' &&
                       resource_ref=='{{ .vars.dcrProviderRef }}'] | [0]
            expect:
              fields:
                action: DELETE
          - select: >-
              changes[?resource_type=='organization_team' &&
                       resource_ref=='{{ .vars.teamName }}'] | [0]
            expect:
              fields:
                action: DELETE

      - name: 002-diff-plan-sync-mode
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - sync
          - -o
          - json
        stdoutFile: "{{ .workdir }}/plan.json"
        assertions:
          - select: "metadata"
            expect:
              fields:
                mode: sync
          - select: "summary"
            expect:
              fields:
                total_changes: 10
                by_action.CREATE: 1
                by_action.UPDATE: 7
                by_action.DELETE: 2
          - select: >-
              changes[?resource_type=='control_plane' &&
                       resource_ref=='{{ .vars.cpRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.description.new, fields.description)": "{{ .vars.cpUpdatedDesc }}"
          - select: >-
              changes[?resource_type=='portal' &&
                       resource_ref=='{{ .vars.portalRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.display_name.new, fields.display_name)": "{{ .vars.portalUpdatedName }}"
          - select: >-
              changes[?resource_type=='api' &&
                       resource_ref=='{{ .vars.newAPIRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
          - select: >-
              changes[?resource_type=='api' &&
                       resource_ref=='{{ .vars.removedAPIName }}'] | [0]
            expect:
              fields:
                action: DELETE
                namespace: "{{ .vars.namespace }}"
          - select: >-
              changes[?resource_type=='api_version' &&
                       resource_ref=='{{ .vars.existingAPIVersionRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "contains(changed_fields.spec.new, '{{ .vars.apiVersionUpdatedInfoVersion }}')": true
          - select: >-
              changes[?resource_type=='api_document' &&
                       resource_ref=='{{ .vars.apiDocumentRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "contains(changed_fields.content.new, '{{ .vars.apiDocumentUpdatedText }}')": true
          - select: >-
              changes[?resource_type=='api_version' &&
                       action=='DELETE' &&
                       fields.version=='{{ .vars.removedAPIVersion }}'] | [0]
            expect:
              fields:
                action: DELETE
                resource_monikers.parent_api: "{{ .vars.existingAPIName }}"
                namespace: "{{ .vars.namespace }}"
          - select: >-
              changes[?resource_type=='application_auth_strategy' &&
                       resource_ref=='{{ .vars.authStrategyRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.display_name.new, fields.display_name)": "{{ .vars.authStrategyUpdatedDisplayName }}"
          - select: >-
              changes[?resource_type=='dcr_provider' &&
                       resource_ref=='{{ .vars.dcrProviderRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.issuer.new, fields.issuer)": "{{ .vars.dcrProviderUpdatedIssuer }}"
          - select: >-
              changes[?resource_type=='organization_team' &&
                       resource_ref=='{{ .vars.teamRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.description.new, fields.description)": "{{ .vars.teamUpdatedDesc }}"

      - name: 003-diff-plan-file
        run:
          - diff
          - --plan
          - "{{ .workdir }}/plan.json"
          - -o
          - json
        assertions:
          - select: "summary"
            expect:
              fields:
                total_changes: 10
          - select: >-
              changes[?resource_ref=='{{ .vars.newAPIRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              changes[?resource_type=='api_version' &&
                       action=='DELETE' &&
                       fields.version=='{{ .vars.removedAPIVersion }}'] | [0]
            expect:
              fields:
                action: DELETE

      - name: 004-get-portals
        run: ["get", "portals"]
        assertions:
          - select: "[?name=='{{ .vars.portalRef }}'] | [0]"
            expect:
              fields:
                display_name: "{{ .vars.portalName }}"

      - name: 005-get-apis
        run: ["get", "apis"]
        assertions:
          - select: "[?name=='{{ .vars.removedAPIName }}']"
            expect:
              fields:
                "length(@)": 1
          - select: "[?name=='{{ .vars.newAPIRef }}']"
            expect:
              fields:
                "length(@)": 0

      - name: 006-get-control-planes
        run: ["get", "gateway", "control-planes"]
        assertions:
          - select: "[?name=='{{ .vars.cpName }}'] | [0]"
            expect:
              fields:
                description: "{{ .vars.cpDesc }}"
