_defaults:
  kongctl:
    namespace: team-commerce

control_planes:
  - ref: diff-cp
    name: "diff-coverage-cp"
    description: "Control plane for diff coverage E2E"
    cluster_type: "CLUSTER_TYPE_CONTROL_PLANE"

portals:
  - ref: commerce-portal
    name: commerce-portal
    display_name: "Commerce Portal"
    description: "Developer portal for commerce APIs"
    authentication_enabled: false
    default_api_visibility: public
    default_page_visibility: private

apis:
  - ref: orders-api
    name: orders-api
    description: "Orders API"
    labels:
      team: commerce
    versions:
      - ref: orders-api-v1
        version: "1.0.0"
        spec:
          content: |
            openapi: 3.0.0
            info:
              title: Orders API
              version: 1.0.0
            paths: {}
      - ref: orders-api-v2
        version: "2.0.0"
        spec:
          content: |
            openapi: 3.0.0
            info:
              title: Orders API
              version: 2.0.0
            paths: {}
    documents:
      - ref: orders-api-overview-doc
        title: "Orders Overview"
        status: published
        content: |
          # Orders Overview
          Use the Orders API to manage purchase flows.
  - ref: legacy-api
    name: legacy-api
    description: "Legacy API slated for removal"
    labels:
      team: migration

application_auth_strategies:
  - ref: diff-key-auth
    name: diff-key-auth
    display_name: "Diff Key Auth"
    strategy_type: key_auth
    configs:
      key-auth:
        key_names:
          - X-API-Key

dcr_providers:
  - ref: diff-dcr-http
    name: diff-dcr-http
    provider_type: http
    issuer: https://e2ediffissuer.example.com/oauth2/default
    dcr_config:
      dcr_base_url: https://e2ediff.example.com/v1/dcr
      api_key: e2e_diff_token

organization:
  teams:
    - ref: diff-backend-team
      name: diff-backend-team-name
      description: "Backend team for diff coverage"
      labels:
        department: engineering
