_defaults:
  kongctl:
    namespace: team-commerce

control_planes:
  - ref: diff-cp
    name: "diff-coverage-cp"
    description: "Control plane for diff coverage E2E"
    cluster_type: "CLUSTER_TYPE_CONTROL_PLANE"

portals:
  - ref: commerce-portal
    name: commerce-portal
    display_name: "Commerce Portal"
    description: "Developer portal for commerce APIs"
    authentication_enabled: false
    default_api_visibility: public
    default_page_visibility: private

apis:
  - ref: orders-api
    name: orders-api
    description: "Orders API"
    labels:
      team: commerce
  - ref: legacy-api
    name: legacy-api
    description: "Legacy API slated for removal"
    labels:
      team: migration
