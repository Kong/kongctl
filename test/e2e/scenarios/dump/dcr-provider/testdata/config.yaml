_defaults:
  kongctl:
    namespace: dump-dcr-provider-e2e

dcr_providers:
  - ref: dump-dcr-http
    name: e2e-dump-dcr-http
    provider_type: http
    issuer: https://e2e-dump-dcr.example.com/oauth2/default
    dcr_config:
      dcr_base_url: https://e2e-dump-dcr.example.com/v1/dcr
      api_key: e2e_dump_dcr_token
