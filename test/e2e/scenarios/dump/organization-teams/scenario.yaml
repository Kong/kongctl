baseInputsPath: ./testdata

env:
  KONGCTL_LOG_LEVEL: info

test:
  assignedEnvironment: kongctl-acceptance
  requiredEnvVars:
    - KONGCTL_E2E_ORG_USER_EMAIL_1
  info: >-
    Organization teams dump E2E requires one existing Konnect user via
    KONGCTL_E2E_ORG_USER_EMAIL_1; the user is a lookup selector (not a managed
    resource) and is added as a member of the alpha team to exercise
    collectOrganizationUsersFromTeamMemberships in the dump code path.

vars:
  teamAlphaName: e2e-dump-org-team-alpha
  teamBetaName: e2e-dump-org-team-beta

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-sync-bootstrap
    commands:
      - name: 000-sync-bootstrap
        outputFormat: json
        run:
          - sync
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: sync
          - select: plan.summary
            expect:
              fields:
                total_changes: 5
                by_action.CREATE: 5
          - select: summary
            expect:
              fields:
                applied: 5
                failed: 0
                status: success

  - name: 002-dump-and-round-trip
    skipInputs: true
    commands:
      - name: 000-dump-org-teams
        run:
          - dump
          - declarative
          - "--resources=organization.teams"
          - --include-child-resources
        outputFormat: none
        parseAs: yaml
        stdoutFile: "{{ .workdir }}/dump.yaml"
        assertions:
          - name: org-teams-key-present
            select: organization.teams
            expect:
              fields:
                "length(@)": 2
          - name: alpha-team-present
            select: "organization.teams[?name=='{{ .vars.teamAlphaName }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.teamAlphaName }}"
          - name: beta-team-present
            select: "organization.teams[?name=='{{ .vars.teamBetaName }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.teamBetaName }}"
          - name: alpha-team-role-present
            select: >-
              organization.teams[?name=='{{ .vars.teamAlphaName }}'] |
              [0].roles[?role_name=='Viewer'] | [0]
            expect:
              fields:
                role_name: Viewer
                entity_id: "*"
                entity_type_name: APIs
                entity_region: us
          - name: org-users-present
            select: organization.users
            expect:
              fields:
                "length(@)": 1
          - name: user-team-membership-present
            select: "organization.users[0].teams"
            expect:
              fields:
                "length(@)": 1

      - name: 001-plan-from-dump
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/dump.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

      - name: 002-reset-before-round-trip
        resetOrg: true

      - name: 003-sync-dumped-config
        outputFormat: json
        run:
          - sync
          - -f
          - "{{ .workdir }}/dump.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: sync
          - select: summary
            expect:
              fields:
                applied: 5
                failed: 0
                status: success

      - name: 004-get-teams
        run:
          - get
          - org
          - teams
          - -o
          - json
        assertions:
          - select: "[?name=='{{ .vars.teamAlphaName }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.teamAlphaName }}"
          - select: "[?name=='{{ .vars.teamBetaName }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.teamBetaName }}"

      - name: 005-get-alpha-team-roles
        run:
          - get
          - org
          - team
          - roles
          - --team-name
          - "{{ .vars.teamAlphaName }}"
          - -o
          - json
        assertions:
          - select: "[?role_name=='Viewer' && entity_type_name=='APIs'] | [0]"
            expect:
              fields:
                role_name: Viewer
                entity_id: "*"
                entity_type_name: APIs
                entity_region: us

      - name: 006-dump-verify-user-membership
        run:
          - dump
          - declarative
          - "--resources=organization.teams"
          - --include-child-resources
        outputFormat: none
        parseAs: yaml
        assertions:
          - name: org-users-present-after-roundtrip
            select: organization.users
            expect:
              fields:
                "length(@)": 1
          - name: user-team-membership-preserved
            select: "organization.users[0].teams"
            expect:
              fields:
                "length(@)": 1

  - name: 003-reset-cleanup
    skipInputs: true
    commands:
      - resetOrg: true
