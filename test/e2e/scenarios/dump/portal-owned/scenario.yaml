baseInputsPath: ./testdata

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-apply-portal
    commands:
      - name: 000-apply
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - -f
          - "{{ .workdir }}/auth-strategies.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: apply

  - name: 002-dump-and-plan
    skipInputs: true
    commands:
      - name: 000-dump
        run:
          - dump
          - declarative
          - "--resources=portals,apis,application_auth_strategies"
          - --include-child-resources
        outputFormat: none
        parseAs: yaml
        stdoutFile: "{{ .workdir }}/dump.yaml"
        assertions:
          - select: "portals[?name=='My First Portal'] | [0]"
            expect:
              fields:
                display_name: "A Getting Started Portal"
          - select: "portals[?name=='My First Portal'] | [0].teams[?name=='Platform Team'] | [0]"
            expect:
              fields:
                name: "Platform Team"
          - select: "portals[?name=='My First Portal'] | [0].pages[?title=='Kong API'] | [0]"
            expect:
              fields:
                slug: "/"
          - select: "portals[?name=='My First Portal'] | [0].pages[?title=='APIs'] | [0]"
            expect:
              fields:
                slug: "apis"
          - select: "portals[?name=='My First Portal'] | [0].pages[?title=='Guides'] | [0].children[?title=='Document APIs'] | [0]"
            expect:
              fields:
                slug: "document-apis"
          - select: "portals[?name=='My First Portal'] | [0].teams[?name=='Platform Team'] | [0].roles[?role_name=='API Viewer'] | [0]"
            expect:
              fields:
                role_name: "API Viewer"
                entity_type_name: "Services"
                entity_region: "us"
          - select: "application_auth_strategies[?strategy_type=='key_auth'] | [0]"
            expect:
              fields:
                strategy_type: key_auth
                name: key-auth
                'configs."key-auth".key_names[0]': X-API-Key
          # SMS API has 2 versions defined in testdata
          - name: sms-api-versions
            select: "apis[?name=='SMS API'] | [0].versions"
            expect:
              fields:
                "length(@)": 2
                "[?version=='1.0.11'] | length(@)": 1
          # SMS API has 4 documents defined in testdata
          - name: sms-api-documents
            select: "apis[?name=='SMS API'] | [0].documents"
            expect:
              fields:
                "length(@)": 4
          # Voice API has 1 version defined in testdata
          - name: voice-api-versions
            select: "apis[?name=='Voice API'] | [0].versions"
            expect:
              fields:
                "length(@)": 1
                "[?version=='1.3.7'] | length(@)": 1
          # Voice API has 4 documents defined in testdata
          - name: voice-api-documents
            select: "apis[?name=='Voice API'] | [0].documents"
            expect:
              fields:
                "length(@)": 4

      - name: 001-plan-from-dump
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/dump.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 003-delete-cleanup
    commands:
      - name: 000-delete
        run:
          - delete
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - -f
          - "{{ .workdir }}/auth-strategies.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: delete
          - select: summary
            expect:
              fields:
                failed: 0
                status: success
