baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

defaults:
  mask:
    dropKeys:
      - id
      - change_id
      - resource_id
      - generated_at
      - created_at
      - updated_at

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-field-typo-error
    inputOverlayDirs:
      - overlays/001-field-typo
    commands:
      - name: 000-apply-field-typo
        run:
          - apply
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        expectFailure:
          exitCode: 1
          contains: "unknown field 'lables'"

  - name: 002-invalid-ref-extract
    inputOverlayDirs:
      - overlays/002-invalid-ref
    commands:
      - name: 000-plan-invalid-ref
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        expectFailure:
          exitCode: 1
          contains: "resource not found: missing-auth"

  - name: 003-missing-ref
    inputOverlayDirs:
      - overlays/003-missing-ref
    commands:
      - name: 000-apply-missing-ref
        run:
          - apply
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        expectFailure:
          exitCode: 1
          contains: "failed to extract 'portal.tagline'"

  # - name: 004-circular-ref
  #   inputOverlayDirs:
  #     - overlays/004-circular-ref
  #   commands:
  #     - name: 000-apply-circular-ref
  #       run:
  #         - apply
  #         - -f
  #         - "{{ .workdir }}/config.yaml"
  #         - --auto-approve
  #       expectFailure:
  #         exitCode: 1
  #         contains: "circular reference"

  - name: 005-oversized-file
    inputOverlayDirs:
      - overlays/005-oversized-file
    commands:
      - name: 000-apply-oversized-file
        run:
          - apply
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        expectFailure:
          exitCode: 1
          contains: "is too large"

  - name: 006-bare-apply-no-file
    skipInputs: true
    commands:
      - name: 000-bare-apply
        outputFormat: disable
        run:
          - apply
        expectFailure:
          exitCode: 1
          contains: "no configuration sources specified"

  - name: 007-bare-sync-no-file
    skipInputs: true
    commands:
      - name: 000-bare-sync
        outputFormat: disable
        run:
          - sync
        expectFailure:
          exitCode: 1
          contains: "no configuration sources specified"

  - name: 008-bare-plan-no-file
    skipInputs: true
    commands:
      - name: 000-bare-plan
        outputFormat: disable
        run:
          - plan
        expectFailure:
          exitCode: 1
          contains: "no configuration sources specified"

  - name: 009-bare-diff-no-file
    skipInputs: true
    commands:
      - name: 000-bare-diff
        outputFormat: disable
        run:
          - diff
        expectFailure:
          exitCode: 1
          contains: "no configuration sources specified"

  - name: 010-mode-plan-conflict
    skipInputs: true
    commands:
      - name: 000-diff-mode-and-plan
        run:
          - diff
          - --mode
          - apply
          - --plan
          - /dev/null
        expectFailure:
          exitCode: 1
          contains: "--mode cannot be used together with --plan"

      - name: 001-plan-mode-and-plan
        run:
          - plan
          - --mode
          - sync
          - --plan
          - /dev/null
        expectFailure:
          exitCode: 1
          contains: "--mode cannot be used together with --plan"

  - name: 011-require-namespace-plan-conflict
    skipInputs: true
    commands:
      - name: 000-diff-require-ns-and-plan
        run:
          - diff
          - --require-namespace
          - my-ns
          - --plan
          - /dev/null
        expectFailure:
          exitCode: 1
          contains: "--require-namespace cannot be used together with --plan"
