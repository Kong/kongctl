_defaults:
  kongctl:
    namespace: event-gateways-vc-cluster-policy-comprehensive-test

event_gateways:
  - ref: egw-cp-for-vc-cluster-policy-test
    name: egw-cp-for-vc-cluster-policy-test
    description: "EGW CP for Virtual Cluster Policy Test"
    backend_clusters:
      - ref: default-backend-cluster
        name: default-backend-cluster
        description: "Backend Cluster for Test"
        bootstrap_servers:
          - "egw-backend-1.example.com:9092"
          - "egw-backend-2.example.com:9092"
        authentication:
          type: anonymous
        tls:
          enabled: true
          skip_verify: false
          tls_versions:
            - tls12
            - tls13
    virtual_clusters:
      - ref: default-virtual-cluster-for-cluster-policy-test
        name: default-virtual-cluster-name-for-cluster-policy-test
        description: "Virtual Cluster for Cluster Policy Test"
        destination:
          name: default-backend-cluster
        authentication:
         - type: anonymous
        acl_mode: enforce_on_gateway
        dns_label: vc-default
event_gateway_cluster_policies:
  - ref: default-cluster-policy
    name: default-cluster-policy-name-for-test
    description: Default Cluster Policy description
    event_gateway: egw-cp-for-vc-cluster-policy-test
    virtual_cluster: default-virtual-cluster-for-cluster-policy-test
    type: acls
    enabled: true
    labels:
      env: staging
      team: payments
    config:
      rules:
        - action: "deny"
          operations:
          - name: "describe_configs"
          resource_names:
          - match: "*"
          resource_type: "transactional_id"