baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

test:
  enabledByEnvVar: KONGCTL_ENABLE_EVENT_GATEWAY

vars:
  egwName: egw-cp-for-vc-cluster-policy-test
  egwRef: egw-cp-for-vc-cluster-policy-test
  backendClusterRef: default-backend-cluster
  backendClusterName: default-backend-cluster
  virtualClusterRef: default-virtual-cluster-for-cluster-policy-test
  virtualClusterName: default-virtual-cluster-name-for-cluster-policy-test
  clusterPolicyRef: default-cluster-policy
  clusterPolicyName: default-cluster-policy-name-for-test
  clusterPolicyDescription: Default Cluster Policy description

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - updated_at

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true
  - name: 001-plan-apply-create
    commands:
      - name: 001-plan-create
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-create.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                total_changes: 4
                by_action.CREATE: 4
          - select: >-
              changes[?resource_type=='event_gateway' && resource_ref=='{{ .vars.egwRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                resource_ref: "{{ .vars.egwRef }}"
          - select: >-
              changes[?resource_type=='event_gateway_backend_cluster' && resource_ref=='{{ .vars.backendClusterRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                resource_ref: "{{ .vars.backendClusterRef }}"
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster' && resource_ref=='{{ .vars.virtualClusterRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                resource_ref: "{{ .vars.virtualClusterRef }}"
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster_cluster_policy' && resource_ref=='{{ .vars.clusterPolicyRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                resource_ref: "{{ .vars.clusterPolicyRef }}"
      - name: 002-apply-create
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-create.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 4
                failed: 0

      - name: 003-verify-create
        run:
          - get
          - event-gateway
          - virtual-cluster
          - cluster-policies
          - --gateway-name
          - "{{ .vars.egwName }}"
          - --virtual-cluster-name
          - "{{ .vars.virtualClusterName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.clusterPolicyName }}"
                description: "Default Cluster Policy description"
  - name: 002-plan-apply-update
    inputOverlayDirs:
      - overlays/001-update-fields
    commands:
      - name: 001-plan-update
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-update.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.UPDATE: 1
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster_cluster_policy' && resource_ref=='{{ .vars.clusterPolicyRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                resource_ref: "{{ .vars.clusterPolicyRef }}"
      - name: 002-apply-update
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-update.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 003-verify-update
        run:
          - get
          - event-gateway
          - virtual-cluster
          - cluster-policies
          - --gateway-name
          - "{{ .vars.egwName }}"
          - --virtual-cluster-name
          - "{{ .vars.virtualClusterName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.clusterPolicyName }}"
                type: acls
                description: Default Cluster Policy description updated
                enabled: false
                labels:
                  env: staging
                  version: v2
                config:
                  rules:
                    - action: "allow"
                      operations:
                      - name: "describe_configs"
                      resource_names:
                      - match: "*updated"
                      resource_type: "transactional_id"
                
  - name: 003-sync-delete
    inputOverlayDirs:
      - overlays/002-sync-delete
    commands:
      - name: 001-plan-sync-delete
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-sync-delete.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - sync
        assertions:
          - select: metadata
            expect:
              fields:
                mode: sync
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.DELETE: 1
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster_cluster_policy' && resource_ref=='{{ .vars.clusterPolicyName }}'] | [0]
            expect:
              fields:
                action: DELETE
                resource_ref: "{{ .vars.clusterPolicyName }}"
      - name: 002-sync-delete
        outputFormat: json
        run:
          - sync
          - --plan
          - "{{ .workdir }}/plan-sync-delete.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 003-verify-delete
        run:
          - get
          - event-gateway
          - virtual-cluster
          - cluster-policies
          - --gateway-name
          - "{{ .vars.egwName }}"
          - --virtual-cluster-name
          - "{{ .vars.virtualClusterName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 0

  - name: 004-root-level-cluster-policy
    inputOverlayDirs:
      - overlays/003-root-level-declaration
    commands:
      - name: 001-plan-create
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-root-level.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.CREATE: 1
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster_cluster_policy' && resource_ref=='{{ .vars.clusterPolicyRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                resource_ref: "{{ .vars.clusterPolicyRef }}"
      - name: 002-apply-create
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-root-level.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 003-verify-create
        run:
          - get
          - event-gateway
          - virtual-cluster
          - cluster-policies
          - --gateway-name
          - "{{ .vars.egwName }}"
          - --virtual-cluster-name
          - "{{ .vars.virtualClusterName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.clusterPolicyName }}"
                description: "{{ .vars.clusterPolicyDescription }}"
                enabled: true
                labels:
                  env: staging
                  team: payments
  - name: 005-sync-delete-root-level
    inputOverlayDirs:
      - overlays/004-sync-delete-root-level-declaration
    commands:
      - name: 001-plan-sync-delete-root-level
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-sync-delete-root-level.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - sync
        assertions:
          - select: metadata
            expect:
              fields:
                mode: sync
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.DELETE: 1
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster_cluster_policy' && resource_ref=='{{ .vars.clusterPolicyName }}'] | [0]
            expect:
              fields:
                action: DELETE
                resource_ref: "{{ .vars.clusterPolicyName }}"
      - name: 002-sync-delete-root-level
        outputFormat: json
        run:
          - sync
          - --plan
          - "{{ .workdir }}/plan-sync-delete-root-level.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 003-verify-delete-root-level
        run:
          - get
          - event-gateway
          - virtual-cluster
          - cluster-policies
          - --gateway-name
          - "{{ .vars.egwName }}"
          - --virtual-cluster-name
          - "{{ .vars.virtualClusterName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 0