_defaults:
  kongctl:
    namespace: event-gateways-diff-test

event_gateways:
  - ref: egw-diff-test
    name: egw-diff-test
    description: "Updated EGW description for diff test"
    backend_clusters:
      - ref: diff-backend-cluster
        name: diff-backend-cluster
        description: "Backend Cluster for diff test"
        bootstrap_servers:
          - "egw-backend-1.example.com:9092"
        authentication:
          type: anonymous
        tls:
          enabled: true
          skip_verify: false
          tls_versions:
            - tls12
            - tls13
      - ref: diff-backend-cluster-2
        name: diff-backend-cluster-2
        description: "New Backend Cluster for diff test"
        bootstrap_servers:
          - "egw-backend-2.example.com:9092"
        authentication:
          type: anonymous
        tls:
          enabled: true
          skip_verify: false
          tls_versions:
            - tls12
            - tls13
    virtual_clusters:
      - ref: diff-virtual-cluster
        name: diff-virtual-cluster
        description: "Virtual Cluster for diff test"
        destination:
          id: !ref diff-backend-cluster#id
        authentication:
          - type: anonymous
        acl_mode: enforce_on_gateway
        dns_label: vc-diff
        produce_policies:
          - ref: diff-produce-policy
            name: diff-produce-policy
            type: modify_headers
            enabled: false
            config:
              actions:
                - op: set
                  key: x-diff-test
                  value: modified
        cluster_policies:
          - ref: diff-cluster-policy
            name: diff-cluster-policy
            type: acls
            enabled: false
            config:
              rules:
                - action: "allow"
                  operations:
                    - name: "describe_configs"
                  resource_names:
                    - match: "*updated"
                  resource_type: "transactional_id"
        consume_policies:
          - ref: diff-consume-policy
            name: diff-consume-policy
            type: modify_headers
            enabled: false
            config:
              actions:
                - op: set
                  key: x-diff-consume-test
                  value: modified
    listeners:
      - ref: diff-listener
        name: diff-listener
        description: "Listener for diff test"
        ports:
          - 9092
        addresses:
          - localhost
        policies:
          - ref: diff-listener-policy
            name: diff-listener-policy
            type: forward_to_virtual_cluster
            enabled: false
            config:
              type: sni
              sni_suffix: ".updated.example.com"
