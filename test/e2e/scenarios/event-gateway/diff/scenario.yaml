baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  egwRef: egw-diff-test
  egwName: egw-diff-test
  egwDesc: "EGW for diff scenario test"
  egwUpdatedDesc: "Updated EGW description for diff test"
  bcRef: diff-backend-cluster
  bcName: diff-backend-cluster
  bc2Ref: diff-backend-cluster-2
  bc2Name: diff-backend-cluster-2
  vcRef: diff-virtual-cluster
  vcName: diff-virtual-cluster
  schemaRegistryRef: diff-schema-registry-ref
  schemaRegistryName: diff-schema-registry-name
  schemaRegistryDesc: "Default Schema Registry description"
  schemaRegistryUpdatedDesc: "Updated Schema Registry description for diff test"
  staticKeyRef: diff-static-key-ref
  staticKeyName: diff-static-key-name
  staticKeyDesc: "Default Static Key description"
  staticKeyUpdatedDesc: "Updated Static Key description for diff test"
  trustBundleRef: diff-tls-trust-bundle-ref
  trustBundleName: diff-tls-trust-bundle-name
  trustBundleDesc: "Default TLS Trust Bundle description"
  trustBundleUpdatedDesc: "Updated TLS Trust Bundle description for diff test"
  dataplaneCertRef: diff-dataplane-certificate-ref
  dataplaneCertName: diff-dataplane-certificate-name
  dataplaneCertDesc: "Default Dataplane Certificate description"
  dataplaneCertUpdatedDesc: "Updated Dataplane Certificate description for diff test"
  clusterPolicyRef: diff-cluster-policy
  clusterPolicyName: diff-cluster-policy
  consumePolicyRef: diff-consume-policy
  consumePolicyName: diff-consume-policy
  listenerRef: diff-listener
  listenerName: diff-listener
  listenerPolicyRef: diff-listener-policy
  listenerPolicyName: diff-listener-policy
  namespace: event-gateways-diff-test

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - updated_at
      - resource_id
      - change_id
      - generated_at

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-bootstrap-state
    commands:
      - name: 000-sync-initial
        run:
          - sync
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: "plan.summary"
            expect:
              fields:
                total_changes: 12
                by_action.CREATE: 12
          - select: "summary"
            expect:
              fields:
                applied: 12
                failed: 0
          - select: >-
              plan.changes[?resource_type=='event_gateway' &&
                            resource_ref=='{{ .vars.egwRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_backend_cluster' &&
                            resource_ref=='{{ .vars.bcRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_virtual_cluster' &&
                            resource_ref=='{{ .vars.vcRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_listener' &&
                            resource_ref=='{{ .vars.listenerRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_virtual_cluster_produce_policy' &&
                            resource_ref=='diff-produce-policy'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_virtual_cluster_cluster_policy' &&
                            resource_ref=='{{ .vars.clusterPolicyRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_virtual_cluster_consume_policy' &&
                            resource_ref=='{{ .vars.consumePolicyRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_listener_policy' &&
                            resource_ref=='{{ .vars.listenerPolicyRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_schema_registry' &&
                            resource_ref=='{{ .vars.schemaRegistryRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_static_key' &&
                            resource_ref=='{{ .vars.staticKeyRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_tls_trust_bundle' &&
                            resource_ref=='{{ .vars.trustBundleRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='event_gateway_data_plane_certificate' &&
                            resource_ref=='{{ .vars.dataplaneCertRef }}'] | [0]
            expect:
              fields:
                action: CREATE

  - name: 002-diff-noop
    commands:
      - name: 000-diff
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
          - -o
          - json
        assertions:
          - select: "summary"
            expect:
              fields:
                total_changes: 0
          - select: "changes"
            expect:
              fields:
                "length(@)": 0

  - name: 003-diff-with-modifications
    inputOverlayDirs:
      - overlays/003-diff
    commands:
      - name: 000-diff-apply-mode
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
          - -o
          - json
        assertions:
          - select: "metadata"
            expect:
              fields:
                mode: apply
          - select: "summary"
            expect:
              fields:
                total_changes: 11
                by_action.UPDATE: 8
                by_action.CREATE: 2
                by_action.DELETE: 1
          - expect:
              fields:
                "length(changes[?action=='DELETE'])": 1
          - select: >-
              changes[?resource_type=='event_gateway' &&
                       resource_ref=='{{ .vars.egwRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.description.new, fields.description)": "{{ .vars.egwUpdatedDesc }}"
          - select: >-
              changes[?resource_type=='event_gateway_backend_cluster' &&
                       resource_ref=='{{ .vars.bc2Ref }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster_produce_policy' &&
                       resource_ref=='diff-produce-policy'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.enabled.new, fields.enabled)": false
                "not_null(changed_fields.config.new.actions[0].value, fields.config.actions[0].value)": "modified"
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster_cluster_policy' &&
                       resource_ref=='{{ .vars.clusterPolicyRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.enabled.new, fields.enabled)": false
                "not_null(changed_fields.config.new.rules[0].action, fields.config.rules[0].action)": "allow"
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster_consume_policy' &&
                       resource_ref=='{{ .vars.consumePolicyRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.enabled.new, fields.enabled)": false
                "not_null(changed_fields.config.new.actions[0].value, fields.config.actions[0].value)": "modified"
          - select: >-
              changes[?resource_type=='event_gateway_listener_policy' &&
                       resource_ref=='{{ .vars.listenerPolicyRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.enabled.new, fields.enabled)": false
                "not_null(changed_fields.config.new.sni_suffix, fields.config.sni_suffix)": ".updated.example.com"
          - select: >-
              changes[?resource_type=='event_gateway_schema_registry' &&
                       resource_ref=='{{ .vars.schemaRegistryRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.description.new, fields.description)": "{{ .vars.schemaRegistryUpdatedDesc }}"
          - select: >-
              changes[?resource_type=='event_gateway_static_key' &&
                       action=='DELETE' &&
                       resource_ref=='{{ .vars.staticKeyName }}'] | [0]
            expect:
              fields:
                action: DELETE
          - select: >-
              changes[?resource_type=='event_gateway_static_key' &&
                       action=='CREATE' &&
                       resource_ref=='{{ .vars.staticKeyRef }}'] | [0]
            expect:
              fields:
                action: CREATE
          - select: >-
              changes[?resource_type=='event_gateway_tls_trust_bundle' &&
                       resource_ref=='{{ .vars.trustBundleRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.description.new, fields.description)": "{{ .vars.trustBundleUpdatedDesc }}"
          - select: >-
              changes[?resource_type=='event_gateway_data_plane_certificate' &&
                       resource_ref=='{{ .vars.dataplaneCertRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "not_null(changed_fields.description.new, fields.description)": "{{ .vars.dataplaneCertUpdatedDesc }}"

      # Verify Konnect state was NOT modified (diff is read-only)
      - name: 001-verify-state-unchanged
        run:
          - get
          - event-gateways
          - -o
          - json
        assertions:
          - select: "[?name=='{{ .vars.egwName }}'] | [0]"
            expect:
              fields:
                description: "{{ .vars.egwDesc }}"

      - name: 002-verify-backend-clusters-unchanged
        run: ["get", "event-gateway", "backend-clusters", "--gateway-name", "{{ .vars.egwName }}", "-o", "json"]
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0].name"
            expect:
              fields:
                "@": "{{ .vars.bcName }}"

      - name: 003-verify-produce-policy-unchanged
        run:
          - get
          - event-gateway
          - virtual-cluster
          - produce-policies
          - --gateway-name
          - "{{ .vars.egwName }}"
          - --virtual-cluster-name
          - "{{ .vars.vcName }}"
          - -o
          - json
        assertions:
          - select: "[?name=='diff-produce-policy'] | [0]"
            expect:
              fields:
                enabled: true
                "config.actions[0].value": "initial"
      - name: 004-verify-cluster-policy-unchanged
        run:
          - get
          - event-gateway
          - virtual-cluster
          - cluster-policies
          - --gateway-name
          - "{{ .vars.egwName }}"
          - --virtual-cluster-name
          - "{{ .vars.vcName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.clusterPolicyName }}"
                enabled: true
                "config.rules[0].action": deny

      - name: 005-verify-consume-policy-unchanged
        run:
          - get
          - event-gateway
          - virtual-cluster
          - consume-policies
          - --gateway-name
          - "{{ .vars.egwName }}"
          - --virtual-cluster-name
          - "{{ .vars.vcName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.consumePolicyName }}"
                enabled: true
                "config.actions[0].value": initial

      - name: 006-verify-listener-policy-unchanged
        run:
          - get
          - event-gateway
          - listener-policies
          - --gateway-name
          - "{{ .vars.egwName }}"
          - --listener-name
          - "{{ .vars.listenerName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.listenerPolicyName }}"
                enabled: true
                "config.sni_suffix": ".example.com"

      - name: 007-verify-virtual-cluster-unchanged
        run:
          - get
          - event-gateway
          - virtual-clusters
          - --gateway-name
          - "{{ .vars.egwName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[?name=='{{ .vars.vcName }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.vcName }}"
                dns_label: vc-diff
                acl_mode: enforce_on_gateway
      - name: 008-verify-schema-registry-unchanged
        run:
          - get
          - event-gateway
          - schema-registries
          - --gateway-name
          - "{{ .vars.egwName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.schemaRegistryName }}"
                description: "{{ .vars.schemaRegistryDesc }}"

      - name: 009-verify-static-key-unchanged
        run:
          - get
          - event-gateway
          - static-keys
          - --gateway-name
          - "{{ .vars.egwName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.staticKeyName }}"
                description: "{{ .vars.staticKeyDesc }}"

      - name: 010-verify-tls-trust-bundle-unchanged
        run:
          - get
          - event-gateway
          - tls-trust-bundles
          - --gateway-name
          - "{{ .vars.egwName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.trustBundleName }}"
                description: "{{ .vars.trustBundleDesc }}"

      - name: 011-verify-data-plane-certificate-unchanged
        run:
          - get
          - event-gateway
          - data-plane-certificates
          - --gateway-name
          - "{{ .vars.egwName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.dataplaneCertName }}"
                description: "{{ .vars.dataplaneCertDesc }}"
  - name: 004-diff-sync-mode
    inputOverlayDirs:
      - overlays/004-diff-sync
    commands:
      - name: 000-diff-sync-mode
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - sync
          - -o
          - json
        assertions:
          - select: "metadata"
            expect:
              fields:
                mode: sync
          - select: "summary"
            expect:
              fields:
                total_changes: 1
                by_action.DELETE: 1
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster' &&
                       resource_ref=='{{ .vars.vcRef }}'] | [0]
            expect:
              fields:
                action: DELETE

      # Verify Konnect state was NOT modified (diff is read-only)
      - name: 001-verify-state-unchanged
        run:
          - get
          - event-gateway
          - virtual-clusters
          - --gateway-name
          - "{{ .vars.egwName }}"
          - -o
          - json
        assertions:
          - select: "[?name=='{{ .vars.vcName }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.vcName }}"

  - name: 005-delete
    commands:
      - name: 000-delete
        run:
          - delete
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: delete
          - select: "plan.summary"
            expect:
              fields:
                total_changes: 1
                by_action.DELETE: 1
                by_resource.event_gateway: 1
          - select: >-
              plan.changes[?resource_type=='event_gateway' &&
                            resource_ref=='{{ .vars.egwRef }}'] | [0]
            expect:
              fields:
                action: DELETE
          - select: "summary"
            expect:
              fields:
                failed: 0
                status: success
