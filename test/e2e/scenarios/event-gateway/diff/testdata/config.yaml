_defaults:
  kongctl:
    namespace: event-gateways-diff-test

event_gateways:
  - ref: egw-diff-test
    name: egw-diff-test
    description: "EGW for diff scenario test"
    backend_clusters:
      - ref: diff-backend-cluster
        name: diff-backend-cluster
        description: "Backend Cluster for diff test"
        bootstrap_servers:
          - "egw-backend-1.example.com:9092"
        authentication:
          type: anonymous
        tls:
          enabled: true
          skip_verify: false
          tls_versions:
            - tls12
            - tls13
    virtual_clusters:
      - ref: diff-virtual-cluster
        name: diff-virtual-cluster
        description: "Virtual Cluster for diff test"
        destination:
          id: !ref diff-backend-cluster#id
        authentication:
          - type: anonymous
        acl_mode: passthrough
        dns_label: vc-diff
        produce_policies:
          - ref: diff-produce-policy
            name: diff-produce-policy
            type: modify_headers
            enabled: true
            config:
              actions:
                - op: set
                  key: x-diff-test
                  value: initial
        cluster_policies:
          - ref: diff-cluster-policy
            name: diff-cluster-policy
            type: acls
            enabled: true
            config:
              rules:
                - action: "deny"
                  operations:
                    - name: "describe_configs"
                  resource_names:
                    - match: "*"
                  resource_type: "transactional_id"
        consume_policies:
          - ref: diff-consume-policy
            name: diff-consume-policy
            type: modify_headers
            enabled: true
            config:
              actions:
                - op: set
                  key: x-diff-consume-test
                  value: initial
    listeners:
      - ref: diff-listener
        name: diff-listener
        description: "Listener for diff test"
        ports:
          - 9092
        addresses:
          - localhost
        policies:
          - ref: diff-listener-policy
            name: diff-listener-policy
            type: tls_server
            enabled: true
            config:
              certificates:
              - certificate: "-----BEGIN CERTIFICATE-----\\n-----END CERTIFICATE-----"
                key: "-----BEGIN PRIVATE KEY-----\nMIG2AgEAMBAGByqGSM49AgEGBSuBBAAiBIGeMIGbAgEBBDDLuRX+uzSbstvLWsQrWwuGK4AdjLU/tN9A/fn03gxNvppKw++SBtnLyB+9YZ29YA+hZANiAARwyd0Ki1fN5n28YAx8N9ntTFS4/ltwivDBQ4jxiWkx28HXYe+O1Ls7T842vd8F4JZqBG6K08Sp3hvcQm4PyS4VQy37YDT03opjVgMlaAod6LuvMqCt5/NW3XVeAGIOxQE=\n-----END PRIVATE KEY-----"
              versions:
                min: TLSv1.2
                max: TLSv1.3
              allow_plaintext: true
