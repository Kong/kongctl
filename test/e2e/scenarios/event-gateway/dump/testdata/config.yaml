    listeners:
      - ref: default-listener-for-dump-test-ref
        name: default-listener-for-dump-test-name
        description: "Listener for Dump Test"
        ports:
          - 9092
        addresses:
          - localhost
        policies:
          - ref: default-listener-policy-for-dump-test-ref
            name: default-listener-policy-for-dump-test-name
            description: "Listener Policy for Dump Test"
            type: forward_to_virtual_cluster
            enabled: true
            config:
              type: sni
              sni_suffix: ".example.com"
          - ref: default-listener-policy-for-dump-test-ref-2
            name: default-listener-policy-for-dump-test-name-2
            type: tls_server
            description: "Default Listener Policy 2 for Dump Test"
            enabled: true
            config:
              certificates:
              - certificate: "-----BEGIN CERTIFICATE-----\\n-----END CERTIFICATE-----"
                key: "-----BEGIN PRIVATE KEY-----\nMIG2AgEAMBAGByqGSM49AgEGBSuBBAAiBIGeMIGbAgEBBDDLuRX+uzSbstvLWsQrWwuGK4AdjLU/tN9A/fn03gxNvppKw++SBtnLyB+9YZ29YA+hZANiAARwyd0Ki1fN5n28YAx8N9ntTFS4/ltwivDBQ4jxiWkx28HXYe+O1Ls7T842vd8F4JZqBG6K08Sp3hvcQm4PyS4VQy37YDT03opjVgMlaAod6LuvMqCt5/NW3XVeAGIOxQE=\n-----END PRIVATE KEY-----"
              versions:
                min: TLSv1.2
              allow_plaintext: true
    virtual_clusters:
      - ref: default-virtual-cluster
        name: default-virtual-cluster
        description: "Virtual Cluster for Dump Test"
        destination:
          id: !ref default-backend-cluster
        authentication:
         - type: anonymous
        acl_mode: enforce_on_gateway
        dns_label: vc-default
        cluster_policies:
          - ref: default-cluster-policy-for-dump-test-ref
            name: default-cluster-policy-for-dump-test-name
            description: "Cluster Policy for Dump Test"
            type: acls
            enabled: true
            config:
              rules:
                - action: "deny"
                  operations:
                  - name: "describe_configs"
                  resource_names:
                  - match: "*"
                  resource_type: "transactional_id"
        produce_policies:
          - ref: default-produce-policy
            name: default-produce-policy-name-for-dump-test
            description: Default Produce Policy description
            type: modify_headers
            enabled: true
            config:
              actions:
                  - op: set
                    key: x-producer-id
                    value: "${client_id}"
                  - op: remove
                    key: x-original-header
        consume_policies:
          - condition: ""
            config:
              key_validation_action: mark
              type: json
              value_validation_action: skip
            description: ""
            enabled: true
            name: default-consume-policy-name-for-dump-test
            ref: default-consume-policy
            type: schema_validation
    schema_registries:
      - ref: default-schema-registry
        name: default-schema-registry-name-for-dump-test
        description: "Default Schema Registry description for Dump Test"
        type: confluent
        config:
          schema_type: json
          endpoint: https://schema-registry.example.com
          timeout_seconds: 30
          authentication:
            type: basic
            username: testuser
            password: "${env[\"KAFKA_PASSWORD\"]}"
    static_keys:
      - ref: default-static-key
        name: default-static-key-name-for-dump-test
        description: "Default Static Key description for Dump Test"
        value: "${env[\"STATIC_KEY_VALUE\"]}"
    tls_trust_bundles:
