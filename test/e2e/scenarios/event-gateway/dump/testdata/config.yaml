_defaults:
  kongctl:
    namespace: event-gateways-dump-test

event_gateways:
  - ref: egw-cp-for-dump-test
    name: egw-cp-for-dump-test
    description: "EGW CP for Dump Test"
    backend_clusters:
      - ref: default-backend-cluster
        name: default-backend-cluster
        description: "Backend Cluster for Dump Test"
        bootstrap_servers:
          - "egw-backend-1.example.com:9092"
          - "egw-backend-2.example.com:9092"
        authentication:
          type: anonymous
        tls:
          enabled: true
          skip_verify: false
          tls_versions:
            - tls12
            - tls13
    data_plane_certificates:
      - ref: default-dataplane-certificate-ref-dump
        name: default-dataplane-certificate-name-dump
        description: "Data Plane Certificate for Dump Test"
