_defaults:
  kongctl:
    namespace: event-gateways-dump-test

event_gateways:
  - ref: egw-cp-for-dump-test
    name: egw-cp-for-dump-test
    description: "EGW CP for Dump Test"
    backend_clusters:
      - ref: default-backend-cluster
        name: default-backend-cluster
        description: "Backend Cluster for Dump Test"
        bootstrap_servers:
          - "egw-backend-1.example.com:9092"
          - "egw-backend-2.example.com:9092"
        authentication:
          type: anonymous
        tls:
          enabled: true
          skip_verify: false
          tls_versions:
            - tls12
            - tls13
    virtual_clusters:
      - ref: default-virtual-cluster
        name: default-virtual-cluster
        description: "Virtual Cluster for Dump Test"
        destination:
          name: default-backend-cluster
        authentication:
         - type: anonymous
        acl_mode: passthrough
        dns_label: vc-default
        produce_policies:
          - ref: default-produce-policy
            name: default-produce-policy-name-for-dump-test
            description: Default Produce Policy description
            type: modify_headers
            enabled: true
            config:
              actions:
                  - op: set
                    key: x-producer-id
                    value: "${client_id}"
                  - op: remove
                    key: x-original-header
        consume_policies:
          - condition: ""
            config:
              key_validation_action: mark
              type: json
              value_validation_action: skip
            description: ""
            enabled: true
            name: default-consume-policy-name-for-dump-test
            ref: default-consume-policy
            type: schema_validation
    schema_registries:
      - ref: default-schema-registry
        name: default-schema-registry-name-for-dump-test
        description: "Default Schema Registry description for Dump Test"
        type: confluent
        config:
          schema_type: json
          endpoint: https://schema-registry.example.com
          timeout_seconds: 30
          authentication:
            type: basic
            username: testuser
            password: "${env[\"KAFKA_PASSWORD\"]}"
    static_keys:
      - ref: default-static-key
        name: default-static-key-name-for-dump-test
        description: "Default Static Key description for Dump Test"
        value: "${env[\"STATIC_KEY_VALUE\"]}"
