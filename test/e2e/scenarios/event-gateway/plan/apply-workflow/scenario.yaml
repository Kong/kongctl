baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info


vars:
  egwRef: plan-apply-egw
  egwName: plan-apply-egw
  egwInitialDesc: "Initial description for plan apply workflow"
  egwUpdatedDesc: "Updated description for plan apply workflow"
  bcRef: plan-apply-backend-cluster
  bcName: plan-apply-backend-cluster
  bcDesc: "Updated description for plan apply backend cluster"
  vcRef: plan-apply-virtual-cluster
  vcName: plan-apply-virtual-cluster
  vcDesc: "Virtual cluster for plan apply workflow"
  listenerRef: plan-apply-listener
  listenerName: plan-apply-listener
  listenerDesc: "Listener for plan apply workflow"
  listenerPolicyRef: plan-apply-listener-1-policy-1-ref
  listenerPolicyName: plan-apply-listener-1-policy-1-name
  listenerPolicyDesc: "Plan Apply Listener 1 Policy 1"
  clusterPolicyRef: plan-apply-cluster-policy
  clusterPolicyName: plan-apply-cluster-policy-name-for-test
  clusterPolicyDesc: "Plan Apply Cluster Policy description"
  dataplaneCertRef: plan-apply-dataplane-certificate-ref
  dataplaneCertName: plan-apply-dataplane-certificate-name
  dataplaneCertDesc: "Plan Apply Dataplane Certificate description"
  producePolicyRef: plan-apply-produce-policy
  producePolicyName: plan-apply-produce-policy-name-for-test
  producePolicyDesc: "Plan Apply Produce Policy description"
  consumePolicyRef: plan-apply-consume-policy
  consumePolicyName: skip-record-policy
  schemaRegistryRef: plan-apply-schema-registry
  schemaRegistryName: plan-apply-schema-registry-name
  schemaRegistryDesc: "Plan Apply Schema Registry description"
  staticKeyRef: plan-apply-static-key
  staticKeyName: plan-apply-static-key-name
  staticKeyDesc: "Plan Apply Static Key description"
  trustBundleRef: default-tls-trust-bundle-ref
  trustBundleName: default-tls-trust-bundle-name
  trustBundleDesc: "Default TLS Trust Bundle description"

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - updated_at

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-plan-apply-create
    commands:
      - name: 000-plan-create
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-create.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.CREATE: 1
      - name: 001-diff-plan-text
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - --plan
          - "{{ .workdir }}/plan-create.json"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, 'Plan: 1 to add')": true
                "contains(@, 'event_gateway \"plan-apply-egw\" will be created')": true
      - name: 002-apply-plan
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-create.json"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 003-get-event-gateways
        run: ["get", "event-gateways", "-o", "json"]
        assertions:
          - select: "[?name=='{{ .vars.egwRef }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.egwName }}"
                description: "{{ .vars.egwInitialDesc }}"
  - name: 002-plan-apply-update
    inputOverlayDirs:
      - overlays/001-update
    commands:
      - name: 000-plan-update
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-update.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.UPDATE: 1
      - name: 001-diff-plan-text
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - --plan
          - "{{ .workdir }}/plan-update.json"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, 'event_gateway \"plan-apply-egw\" will be updated')": true
      - name: 002-apply-plan
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-update.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
          - select: plan.summary
            expect:
              fields:
                by_action.UPDATE: 1
      - name: 003-get-event-gateways
        run: ["get", "event-gateways", "-o", "json"]
        assertions:
          - select: "[?name=='{{ .vars.egwRef }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.egwName }}"
                description: "{{ .vars.egwUpdatedDesc }}"

