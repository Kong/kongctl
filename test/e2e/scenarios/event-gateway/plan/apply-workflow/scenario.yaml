          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.bcName }}"
                description: "{{ .vars.bcDesc }}"
                bootstrap_servers:
                  - "egw-backend-1-updated.example.com:9092"
