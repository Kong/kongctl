      - name: 003-verify-virtual-cluster
        run:
          - get
          - event-gateway
          - virtual-clusters
          - --gateway-name
          - "{{ .vars.egwName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.vcName }}"
                description: "{{ .vars.vcDesc }}"
                destination.name: "{{ .vars.bcName }}"
                acl_mode: "enforce_on_gateway"
                "length(authentication)": 1
                authentication[0].type: "anonymous"
      - name: 004-diff-no-changes
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, 'No changes detected. Konnect is up to date.')": true

  - name: 005-plan-sync-listener
