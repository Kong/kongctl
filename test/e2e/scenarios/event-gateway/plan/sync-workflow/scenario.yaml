          - "{{ .workdir }}/plan-listener.json"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, 'Plan: 1 to add')": true
                "contains(@, 'event_gateway_listener \"plan-sync-listener\" will be created')": true
      - name: 002-sync-plan
        outputFormat: json
        run:
          - sync
          - --plan
          - "{{ .workdir }}/plan-listener.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 003-verify-listener
        run:
          - get
          - event-gateway
