            expect:
              fields:
                "@": 1
          - select: "[0]"
            expect:
              fields:
                name: "{{ .vars.listenerName }}"
                description: "{{ .vars.listenerDesc }}"
                "length(ports)": 1
                ports[0]: "9092"
                "length(addresses)": 1
                addresses[0]: "localhost"
      - name: 004-diff-no-changes
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
        assertions:
