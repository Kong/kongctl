_defaults:
  kongctl:
    namespace: event-gateways-vc-produce-policy-comprehensive-test

event_gateways:
  - ref: egw-cp-for-vc-produce-policy-test
    name: egw-cp-for-vc-produce-policy-test
    description: "EGW CP for Virtual Cluster Produce Policy Test"
    backend_clusters:
      - ref: default-backend-cluster
        name: default-backend-cluster
        description: "Backend Cluster for Test"
        bootstrap_servers:
          - "egw-backend-1.example.com:9092"
          - "egw-backend-2.example.com:9092"
        authentication:
          type: anonymous
        tls:
          enabled: true
          skip_verify: false
          tls_versions:
            - tls12
            - tls13
    virtual_clusters:
      - ref: default-virtual-cluster-for-produce-policy-test
        name: default-virtual-cluster-name-for-produce-policy-test
        description: "Virtual Cluster for Produce Policy Test"
        destination:
          name: default-backend-cluster
        authentication:
         - type: anonymous
        acl_mode: enforce_on_gateway
        dns_label: vc-default
        # produce_policies declared at root level

event_gateway_virtual_cluster_produce_policies:
  - ref: root-level-produce-policy
    name: root-level-produce-policy-name
    description: Root Level Produce Policy description
    type: encrypt
    enabled: true
    virtual_cluster: default-virtual-cluster-for-produce-policy-test
    event_gateway: egw-cp-for-vc-produce-policy-test
    labels:
      env: production
      team: platform
    config:
      failure_mode: passthrough
      part_of_record:
      - value
      encryption_key:
        type: aws
        arn: arn:aws:kms:us-east-1:123456789012:key/abcd-1234-efgh-5678
