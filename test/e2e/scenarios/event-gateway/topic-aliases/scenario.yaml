test:
  enabledByEnvVar: KONGCTL_E2E_RUN_EGW_TOPIC_ALIASES
  info: >-
    Requires a Konnect environment with Event Gateway runtime 1.2 topic_aliases
    support. Set KONGCTL_E2E_RUN_EGW_TOPIC_ALIASES=1 to include it.

baseInputsPath: ./testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  egwName: egw-topic-aliases
  vcRef: topic-aliases-virtual-cluster

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - updated_at

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-plan-apply-create
    commands:
      - name: 001-plan-create
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-create.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 3
                by_action.CREATE: 3
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster' && resource_ref=='{{ .vars.vcRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                "fields.topic_aliases[0].alias": public-orders
                "fields.topic_aliases[0].topic": tenant-a.orders
                "fields.topic_aliases[0].condition": "context.auth.type == 'anonymous'"
                "fields.topic_aliases[0].conflict": warn
      - name: 002-apply-create
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-create.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 3
                failed: 0
      - name: 003-verify-create
        run:
          - get
          - event-gateway
          - virtual-clusters
          - --gateway-name
          - "{{ .vars.egwName }}"
          - -o
          - json
        assertions:
          - select: "[?name=='{{ .vars.vcRef }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.vcRef }}"
                "topic_aliases[0].alias": public-orders
                "topic_aliases[0].topic": tenant-a.orders
                "topic_aliases[0].condition": "context.auth.type == 'anonymous'"
                "topic_aliases[0].conflict": warn

  - name: 002-plan-apply-update
    inputOverlayDirs:
      - overlays/001-update-aliases
    commands:
      - name: 001-plan-update
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-update.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.UPDATE: 1
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster' && resource_ref=='{{ .vars.vcRef }}'] | [0]
            expect:
              fields:
                action: UPDATE
                "fields.topic_aliases[0].topic": tenant-b.orders
                "fields.topic_aliases[0].conflict": ignore
      - name: 002-apply-update
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-update.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 003-verify-update
        run:
          - get
          - event-gateway
          - virtual-clusters
          - --gateway-name
          - "{{ .vars.egwName }}"
          - -o
          - json
        assertions:
          - select: "[?name=='{{ .vars.vcRef }}'] | [0]"
            expect:
              fields:
                "topic_aliases[0].alias": public-orders
                "topic_aliases[0].topic": tenant-b.orders
                "topic_aliases[0].condition": "context.auth.type == 'anonymous'"
                "topic_aliases[0].conflict": ignore
      - name: 004-idempotency-check
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 003-dump-round-trip
    skipInputs: true
    commands:
      - name: 001-dump
        run:
          - dump
          - declarative
          - "--resources=event_gateways"
          - --include-child-resources
          - "--filter-name={{ .vars.egwName }}"
        outputFormat: none
        parseAs: yaml
        stdoutFile: "{{ .workdir }}/dump.yaml"
        assertions:
          - select: >-
              event_gateways[?name=='{{ .vars.egwName }}'] | [0].virtual_clusters[?name=='{{ .vars.vcRef }}'] | [0]
            expect:
              fields:
                "topic_aliases[0].alias": public-orders
                "topic_aliases[0].topic": tenant-b.orders
                "topic_aliases[0].condition": "context.auth.type == 'anonymous'"
                "topic_aliases[0].conflict": ignore
      - name: 002-plan-from-dump
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/dump.yaml"
          - --mode
          - sync
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 004-sync-delete
    inputOverlayDirs:
      - overlays/003-sync-delete
    commands:
      - name: 001-plan-sync-delete
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-sync-delete.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - sync
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.DELETE: 1
          - select: >-
              changes[?resource_type=='event_gateway_virtual_cluster' && resource_ref=='{{ .vars.vcRef }}'] | [0]
            expect:
              fields:
                action: DELETE
      - name: 002-sync-delete
        outputFormat: json
        run:
          - sync
          - --plan
          - "{{ .workdir }}/plan-sync-delete.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
