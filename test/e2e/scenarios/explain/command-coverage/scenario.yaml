test:
  requiresPAT: false

steps:
  - name: 001-explain-portal-json
    skipInputs: true
    commands:
      - name: 000-explain-portal-json
        run:
          - explain
          - portal
        outputFormat: json
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: portal"
                "required[0]": ref
          - select: properties.pages.items.properties.children.items
            expect:
              fields:
                type: object
                "contains(description, 'Recursive')": true
          - select: '"x-kongctl-maturity"'
            expect:
              fields:
                level: ga
                "length(operations)": 0

  - name: 002-explain-nested-child-yaml
    skipInputs: true
    commands:
      - name: 000-explain-api-versions-yaml
        run:
          - explain
          - api.versions
        outputFormat: yaml
        parseAs: yaml
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: api.versions"
                "required[0]": spec
          - select: properties.version
            expect:
              fields:
                "type[0]": string
          - select: '"x-kongctl-maturity"'
            expect:
              fields:
                level: ga
                "length(operations)": 0

  - name: 003-explain-field-text
    skipInputs: true
    commands:
      - name: 000-explain-publication-portal-id-text
        run:
          - explain
          - api.publications.portal_id
        outputFormat: text
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'FIELD')": true
                "contains(stdout, 'PATH: api.publications.portal_id')": true
                "contains(stdout, 'OPTIONAL: false')": true
                "contains(stdout, 'ROOT YAML PATH: api_publications[].portal_id')": true
                "contains(stdout, 'RESOURCE')": true
                "contains(stdout, 'MATURITY: GA')": true
                "contains(stdout, 'RESOURCE CLASS: child')": true
                "contains(stdout, 'ROOT KEY: api_publications[]')": true
                "contains(stdout, 'ACCEPTS kongctl metadata: no')": true

  - name: 004-explain-resource-text-summary
    skipInputs: true
    commands:
      - name: 000-explain-portal-text-summary
        run:
          - explain
          - portal
        outputFormat: text
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'RESOURCE')": true
                "contains(stdout, 'MATURITY: GA')": true
                "contains(stdout, 'RESOURCE CLASS: top-level')": true
                "contains(stdout, 'ROOT KEY: portals[]')": true
                "contains(stdout, 'SUPPORTS NESTED DECLARATION: false')": true
                "contains(stdout, 'CHILD RESOURCES: audit_log_webhook, auth_settings, custom_domain, customization, email_config, identity_providers, integrations, ip_allow_list, pages, snippets, teams')": true
                "contains(stdout, 'FIELD DETAILS: use --extended')": true
                "contains(stdout, 'FIELDS')": false

  - name: 005-explain-resource-text-extended
    skipInputs: true
    commands:
      - name: 000-explain-portal-text-extended
        run:
          - explain
          - portal
          - --extended
        outputFormat: text
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'FIELDS')": true
                "contains(stdout, '- ref: string required')": true
                "contains(stdout, 'FIELD DETAILS: use --extended')": false

  - name: 006-explain-portal-pages-text-summary
    skipInputs: true
    commands:
      - name: 000-explain-portal-pages-text-summary
        run:
          - explain
          - portal.pages
        outputFormat: text
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'RESOURCE CLASS: child')": true
                "contains(stdout, 'ROOT KEY: portal_pages[]')": true
                "contains(stdout, 'SUPPORTS ROOT: true')": true
                "contains(stdout, 'SUPPORTS NESTED DECLARATION: true')": true
                "contains(stdout, 'CHILD RESOURCES: children')": true

  - name: 007-explain-control-plane-data-plane-certificate-json
    skipInputs: true
    commands:
      - name: 000-explain-control-plane-data-plane-certificate-json
        run:
          - explain
          - control_plane_data_plane_certificate
        outputFormat: json
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: control_plane_data_plane_certificate"
                '"x-kongctl-resource"': control_plane_data_plane_certificate
                '"x-kongctl-root-key"': control_plane_data_plane_certificates
                '"x-kongctl-resource-class"': child
                '"x-kongctl-supports-root"': true
                '"x-kongctl-supports-nested-declaration"': true
          - select: properties.cert
            expect:
              fields:
                type: string
                '"x-kongctl-preferred-tag"': "!file"

  - name: 008-explain-control-plane-data-plane-certificate-nested-yaml
    skipInputs: true
    commands:
      - name: 000-explain-control-plane-data-plane-certificate-nested-yaml
        run:
          - explain
          - control_plane.data_plane_certificates
        outputFormat: yaml
        parseAs: yaml
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: control_plane.data_plane_certificates"
                '"x-kongctl-resource"': control_plane_data_plane_certificate
                '"x-kongctl-path"': control_plane.data_plane_certificates

  - name: 009-explain-control-plane-data-plane-certificate-field-text
    skipInputs: true
    commands:
      - name: 000-explain-control-plane-data-plane-certificate-cert-text
        run:
          - explain
          - control_plane_data_plane_certificate.cert
        outputFormat: text
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'FIELD')": true
                "contains(stdout, 'PATH: control_plane_data_plane_certificate.cert')": true
                "contains(stdout, 'PREFERRED TAG: !file')": true
                "contains(stdout, 'ROOT YAML PATH: control_plane_data_plane_certificates[].cert')": true
                "contains(stdout, 'NESTED YAML PATH: control_planes[].data_plane_certificates[].cert')": true

  - name: 010-explain-event-gateway-virtual-cluster-topic-aliases-json
    skipInputs: true
    commands:
      - name: 000-explain-event-gateway-virtual-cluster
        run:
          - explain
          - event_gateway_virtual_cluster
        outputFormat: json
        assertions:
          - select: properties.topic_aliases.items
            expect:
              fields:
                type: object
                "required[0]": alias
                "required[1]": topic
                "properties.alias.type": string
                "properties.topic.type": string
                "properties.condition.type[0]": string
                "properties.conflict.type[0]": string

  - name: 011-explain-ai-gateway-consumers-nested-yaml
    skipInputs: true
    commands:
      - name: 000-explain-ai-gateway-consumers-yaml
        run:
          - explain
          - ai_gateway.consumers
        outputFormat: yaml
        parseAs: yaml
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: ai_gateway.consumers"
                '"x-kongctl-resource"': ai_gateway_consumer
                '"x-kongctl-root-key"': ai_gateway_consumers
                '"x-kongctl-resource-class"': child
                '"x-kongctl-supports-root"': true
                '"x-kongctl-supports-nested-declaration"': true
          - select: properties
            expect:
              fields:
                type.type: string
                custom_id.type: string
                policies.items.type: string

  - name: 012-explain-ai-gateway-models-nested-yaml
    skipInputs: true
    commands:
      - name: 000-explain-ai-gateway-models-yaml
        run:
          - explain
          - ai_gateway.models
        outputFormat: yaml
        parseAs: yaml
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: ai_gateway.models"
                '"x-kongctl-resource"': ai_gateway_model
                '"x-kongctl-root-key"': ai_gateway_models
                '"x-kongctl-resource-class"': child
                '"x-kongctl-supports-root"': true
                '"x-kongctl-supports-nested-declaration"': true
          - select: oneOf[0].properties
            expect:
              fields:
                type.const: model
                formats.items.properties.type.type: string
                target_models.items.properties.config.properties.type.type: string

  - name: 013-explain-ai-gateway-mcp-servers-nested-yaml
    skipInputs: true
    commands:
      - name: 000-explain-ai-gateway-mcp-servers-yaml
        run:
          - explain
          - ai_gateway.mcp_servers
        outputFormat: yaml
        parseAs: yaml
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: ai_gateway.mcp_servers"
                '"x-kongctl-resource"': ai_gateway_mcp_server
                '"x-kongctl-root-key"': ai_gateway_mcp_servers
                '"x-kongctl-resource-class"': child
                '"x-kongctl-supports-root"': true
                '"x-kongctl-supports-nested-declaration"': true
          - select: oneOf[0].properties
            expect:
              fields:
                type.const: conversion-only
                config.properties.url.type: string
                tools.items.properties.method.type: string

  - name: 014-explain-ai-gateway-vaults-nested-yaml
    skipInputs: true
    commands:
      - name: 000-explain-ai-gateway-vaults-yaml
        run:
          - explain
          - ai_gateway.vaults
        outputFormat: yaml
        parseAs: yaml
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: ai_gateway.vaults"
                '"x-kongctl-resource"': ai_gateway_vault
                '"x-kongctl-root-key"': ai_gateway_vaults
                '"x-kongctl-resource-class"': child
                '"x-kongctl-supports-root"': true
                '"x-kongctl-supports-nested-declaration"': true
          - select: oneOf[0].properties
            expect:
              fields:
                type.const: env
                config.properties.prefix.type: string

  - name: 014-explain-ai-gateway-data-plane-certificates-nested-yaml
    skipInputs: true
    commands:
      - name: 000-explain-ai-gateway-data-plane-certificates-yaml
        run:
          - explain
          - ai_gateway.data_plane_certificates
        outputFormat: yaml
        parseAs: yaml
        assertions:
          - select: "@"
            expect:
              fields:
                type: object
                title: "kongctl declarative schema: ai_gateway.data_plane_certificates"
                '"x-kongctl-resource"': ai_gateway_data_plane_certificate
                '"x-kongctl-root-key"': ai_gateway_data_plane_certificates
                '"x-kongctl-resource-class"': child
                '"x-kongctl-supports-root"': true
                '"x-kongctl-supports-nested-declaration"': true
          - select: properties.cert
            expect:
              fields:
                type: string
                '"x-kongctl-preferred-tag"': "!file"
