baseInputsPath: testdata

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-setup-cp-svc
    skipInputs: true
    commands:
      - name: 000-create-cp
        create:
          resource: control_plane
          payload:
            inline:
              name: "e2e-cp"
              description: "E2E Control Plane"
              cluster_type: "CLUSTER_TYPE_SERVERLESS"
              cloud_gateway: false
          recordVar:
            name: cp_id
            responsePath: id
      - name: 001-create-gw-svc
        create:
          resource: gateway_service
          endpointParams:
              controlPlaneId: "{{ .vars.cp_id }}"
          payload:
            inline:
              name: "e2e-gw-svc"
              url: https://api.kong-air.com/
          recordVar:
            name: gw_svc_id
            responsePath: id
      - name: 002-adopt-cp
        run:
          - adopt
          - control-plane
          - "{{ .vars.cp_id }}"
          - --namespace
          - default
        assertions:
          - expect:
              fields:
                id: "{{ .vars.cp_id }}"
                namespace: default
                resource_type: control_plane

  - name: 002-sync-external-references
    commands:
      - name: 000-sync
        run:
          - sync
          - -f
          - "{{ .workdir }}/api.yaml"
          - -f
          - "{{ .workdir }}/control-plane-with-gw-svc.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: sync
          - select: >-
              plan.changes[?resource_type=='api_implementation' && 
                            resource_ref=='e2e-api-implementation'] | [0]
            expect:
             fields:
                action: CREATE
          - select: >-
              plan.changes[?resource_type=='control_plane' ||
                           resource_type=='gateway_service' ||
                           resource_type=='_deck']
            expect:
              fields:
                "length(@)": 0

  - name: 003-get-implementations
    skipInputs: true
    commands:
      - name: 000-list-implementations
        run: ["get", "api", "implementations", "--api-name", "e2e-api", "-o", "json"]
        recordVar:
          name: implID
          responsePath: "[0].id"
        assertions:
          - select: "@"
            expect:
              fields:
                "length(@)": 1
          - select: "[0]"
            expect:
              fields:
                service.control_plane_id: "{{ .vars.cp_id }}"
                service.id: "{{ .vars.gw_svc_id }}"
      - name: 001-get-control-plane
        run:
          - get
          - gateway
          - control-plane
          - "{{ .vars.cp_id }}"
          - -o
          - json
        assertions:
          - select: id
            expect:
              fields:
                "@": "{{ .vars.cp_id }}"
          - select: name
            expect:
              fields:
                "@": e2e-cp
      - name: 002-get-gateway-service
        run:
          - get
          - gateway
          - control-plane
          - services
          - --control-plane-name
          - e2e-cp
          - -o
          - json
        assertions:
          - select: "[?id=='{{ .vars.gw_svc_id }}'] | [0]"
            expect:
              fields:
                id: "{{ .vars.gw_svc_id }}"
                name: e2e-gw-svc

  - name: 004-get-implementation-by-id
    skipInputs: true
    commands:
      - name: 000-get-by-id
        run: ["get", "api", "implementations", "--api-name", "e2e-api", "{{ .vars.implID }}", "-o", "json"]
        assertions:
          - select: "[0]"
            expect:
              fields:
                id: "{{ .vars.implID }}"
                service.control_plane_id: "{{ .vars.cp_id }}"
                service.id: "{{ .vars.gw_svc_id }}"

  - name: 004b-sync-delete-implementation
    inputOverlayDirs:
      - overlays/001-remove-impl
    commands:
      - name: 000-sync-delete
        run:
          - sync
          - -f
          - "{{ .workdir }}/api.yaml"
          - --auto-approve
        assertions:
          - select: plan.summary
            expect:
              fields:
                total_changes: 1
                by_action.DELETE: 1
          - select: "plan.changes[?resource_type=='api_implementation'] | [0]"
            expect:
              fields:
                action: DELETE
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
                status: success

  - name: 004c-verify-implementation-removed
    skipInputs: true
    commands:
      - name: 000-get-implementations
        run: ["get", "api", "implementations", "--api-name", "e2e-api", "-o", "json"]
        assertions:
          - select: "@"
            expect:
              fields:
                "length(@)": 0
      - name: 001-get-api
        run: ["get", "apis", "-o", "json"]
        assertions:
          - select: "[?name=='e2e-api']"
            expect:
              fields:
                "length(@)": 1

  - name: 005-delete-cleanup
    commands:
      - name: 000-delete
        run:
          - delete
          - -f
          - "{{ .workdir }}/api.yaml"
          - -f
          - "{{ .workdir }}/control-plane-with-gw-svc.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: delete
          - select: plan.summary
            expect:
              fields:
                total_changes: 1
                by_action.DELETE: 1
          - select: "plan.changes[?resource_type=='api'] | [0]"
            expect:
              fields:
                action: DELETE
                resource_ref: e2e-api
          - select: summary
            expect:
              fields:
                failed: 0
                status: success
