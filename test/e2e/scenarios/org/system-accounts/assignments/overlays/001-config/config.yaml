_defaults:
  kongctl:
    namespace: org-system-account-assignments-e2e

apis:
  - ref: org-system-account-assignments-api
    name: org-system-account-assignments-api
    description: API used by the organization system account assignments E2E scenario

organization:
  teams:
    - ref: org-system-account-assignments-team
      name: Organization System Account Assignments Team
      description: Team used by the organization system account assignments E2E scenario
      labels:
        scenario: org-system-account-assignments
  system-accounts:
    - ref: e2e-system-account
      id: "{{ .vars.system_account_id }}"
      teams:
        - ref: e2e-system-account-org-system-account-assignments-team
          team: org-system-account-assignments-team
      roles:
        - ref: org-system-account-assignments-api-viewer
          role_name: Viewer
          entity_id: !ref org-system-account-assignments-api#id
          entity_type_name: APIs
          entity_region: us
