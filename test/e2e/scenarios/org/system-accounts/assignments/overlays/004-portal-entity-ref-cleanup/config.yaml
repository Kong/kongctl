_defaults:
  kongctl:
    namespace: "{{ .vars.portalRoleNamespace }}"

portals:
  - ref: "{{ .vars.portalRef }}"
    name: "{{ .vars.portalName }}"
    display_name: "{{ .vars.portalName }}"
    description: Portal used by the organization system account role entity ref E2E scenario
    authentication_enabled: false
    rbac_enabled: false
    auto_approve_developers: false
    auto_approve_applications: false
    default_api_visibility: public
    default_page_visibility: private

organization:
  system-accounts:
    - ref: e2e-system-account
      id: "{{ .vars.system_account_id }}"
