_defaults:
  kongctl:
    namespace: sa-plan-apply

apis:
  - ref: sa-plan-apply-api
    name: sa-plan-apply-api
    description: API used by the system account plan apply workflow E2E scenario

organization:
  teams:
    - ref: sa-plan-apply-team
      name: SA Plan Apply Team
      description: Team used by the system account plan apply workflow E2E scenario
      labels:
        scenario: sa-plan-apply
      kongctl:
        namespace: sa-plan-apply
        protected: false
  system-accounts:
    - ref: e2e-system-account
      id: "{{ .vars.system_account_id }}"
