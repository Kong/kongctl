baseInputsPath: ./testdata

env:
  KONGCTL_LOG_LEVEL: info

test:
  assignedEnvironment: kongctl-acceptance
  info: >-
    Organization system account plan apply-workflow E2E creates a temporary
    Konnect system account through the harness, then exercises the plan →
    apply workflow to verify that role and team assignments are applied
    correctly from a saved plan file.

vars:
  namespace: sa-plan-apply
  systemAccountName: e2e-sa-plan-apply
  systemAccountDescription: E2E system account used for plan apply workflow tests
  apiRef: sa-plan-apply-api
  teamRef: sa-plan-apply-team
  teamName: SA Plan Apply Team
  teamRoleRef: sa-plan-apply-team-role
  saRoleRef: sa-plan-apply-sa-role

defaults:
  mask:
    dropKeys:
      - id
      - change_id
      - resource_id
      - generated_at
      - created_at
      - updated_at
      - system_account_id

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-create-system-account
    skipInputs: true
    commands:
      - name: 000-create-system-account
        create:
          resource: system-account
          payload:
            inline:
              name: "{{ .vars.systemAccountName }}"
              description: "{{ .vars.systemAccountDescription }}"
          recordVar:
            name: system_account_id
            responsePath: id

  - name: 002-plan-apply-create
    inputOverlayDirs:
      - overlays/001-config
    commands:
      - name: 000-plan-create
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-create.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                total_changes: 5
                by_action.CREATE: 5
          - select: changes[?resource_type=='organization_system_account_team_membership']
            expect:
              fields:
                "length(@)": 1
          - select: changes[?resource_type=='organization_system_account_role']
            expect:
              fields:
                "length(@)": 1
          - select: >-
              changes[?resource_type=='organization_system_account_role' &&
                      resource_ref=='{{ .vars.saRoleRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
                fields.role_name: Viewer
                fields.entity_type_name: APIs
                fields.entity_region: us
          - select: >-
              changes[?resource_type=='organization_team_role' &&
                      resource_ref=='{{ .vars.teamRoleRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
                fields.role_name: Viewer
                fields.entity_type_name: APIs
                fields.entity_region: us

      - name: 001-diff-plan-text
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - --plan
          - "{{ .workdir }}/plan-create.json"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, 'Plan: 5 to add')": true
                "contains(@, 'organization_team \"sa-plan-apply-team\" will be created')": true
                "contains(@, 'organization_system_account_team_membership \"sa-plan-apply-sa-team\" will be created')": true
                "contains(@, 'organization_system_account_role \"sa-plan-apply-sa-role\" will be created')": true

      - name: 002-apply-plan
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-create.json"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                applied: 5
                failed: 0

      - name: 003-diff-noop
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
          - -o
          - json
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 003-delete-cleanup
    inputOverlayDirs:
      - overlays/002-cleanup
    commands:
      - name: 000-sync-remove-assignments
        outputFormat: json
        run:
          - sync
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                failed: 0
                status: success

      - name: 001-delete-managed-resources
        outputFormat: json
        run:
          - delete
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                failed: 0
                status: success
