baseInputsPath: ./testdata

env:
  KONGCTL_LOG_LEVEL: info

test:
  assignedEnvironment: kongctl-acceptance
  info: >-
    Organization system account plan sync-workflow E2E creates a temporary
    Konnect system account through the harness, bootstraps initial state with
    sync, then exercises the plan → sync workflow to verify that incremental
    role assignment updates are applied correctly from a saved plan file.

vars:
  namespace: sa-plan-sync
  systemAccountName: e2e-sa-plan-sync
  systemAccountDescription: E2E system account used for plan sync workflow tests
  apiRef: sa-plan-sync-api
  teamRef: sa-plan-sync-team
  teamName: SA Plan Sync Team
  teamRoleRef: sa-plan-sync-team-role
  saRoleRef: sa-plan-sync-sa-role

defaults:
  mask:
    dropKeys:
      - id
      - change_id
      - resource_id
      - generated_at
      - created_at
      - updated_at
      - system_account_id

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-create-system-account
    skipInputs: true
    commands:
      - name: 000-create-system-account
        create:
          resource: system-account
          payload:
            inline:
              name: "{{ .vars.systemAccountName }}"
              description: "{{ .vars.systemAccountDescription }}"
          recordVar:
            name: system_account_id
            responsePath: id

  - name: 002-bootstrap-sync-state
    commands:
      - name: 000-sync-initial
        outputFormat: json
        run:
          - sync
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: sync
          - select: summary
            expect:
              fields:
                applied: 5
                failed: 0
          - select: >-
              plan.changes[?resource_type=='organization_system_account_team_membership'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
          - select: >-
              plan.changes[?resource_type=='organization_system_account_role' &&
                            resource_ref=='{{ .vars.saRoleRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
                fields.role_name: Viewer
                fields.entity_type_name: APIs
                fields.entity_region: us

      - name: 001-diff-noop
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
          - -o
          - json
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 003-plan-sync-update
    inputOverlayDirs:
      - overlays/002-plan-sync
    commands:
      - name: 000-plan-sync
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-sync.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - sync
        assertions:
          - select: metadata
            expect:
              fields:
                mode: sync
          - select: summary
            expect:
              fields:
                total_changes: 2
                by_action.CREATE: 1
                by_action.DELETE: 1
          - select: changes[?resource_type=='organization_system_account_role' && action=='CREATE'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
          - select: changes[?resource_type=='organization_system_account_role' && action=='DELETE'] | [0]
            expect:
              fields:
                action: DELETE
                namespace: "{{ .vars.namespace }}"

      - name: 001-diff-plan-text
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - --plan
          - "{{ .workdir }}/plan-sync.json"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, 'Plan: 1 to add, 0 to change, 1 to destroy')": true
                "contains(@, 'organization_system_account_role \"sa-plan-sync-sa-wildcard-admin\" will be created')": true
                "contains(@, 'organization_system_account_role \"e2e-system-account|Viewer|')": true

      - name: 002-sync-plan
        outputFormat: json
        run:
          - sync
          - --plan
          - "{{ .workdir }}/plan-sync.json"
          - --auto-approve
        assertions:
          - select: plan.summary
            expect:
              fields:
                by_action.CREATE: 1
                by_action.DELETE: 1
          - select: summary
            expect:
              fields:
                applied: 2
                failed: 0

      - name: 003-diff-no-changes
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, 'No changes detected. Konnect is up to date.')": true

      - name: 004-plan-post-sync
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - sync
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 004-delete-cleanup
    inputOverlayDirs:
      - overlays/003-cleanup
    commands:
      - name: 000-sync-remove-assignments
        outputFormat: json
        run:
          - sync
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                failed: 0
                status: success

      - name: 001-delete-managed-resources
        outputFormat: json
        run:
          - delete
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                failed: 0
                status: success
