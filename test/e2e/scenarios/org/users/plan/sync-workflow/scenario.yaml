baseInputsPath: ./testdata

env:
  KONGCTL_LOG_LEVEL: info

test:
  assignedEnvironment: kongctl-acceptance
  requiredEnvVars:
    - KONGCTL_E2E_ORG_USER_EMAIL_1
    - KONGCTL_E2E_ORG_USER_EMAIL_2
  info: >-
    Organization user plan sync-workflow E2E requires two existing Konnect
    users via KONGCTL_E2E_ORG_USER_EMAIL_1 and KONGCTL_E2E_ORG_USER_EMAIL_2;
    users are lookup selectors, not managed resources.

vars:
  namespace: user-plan-sync
  apiRef: user-plan-sync-api
  teamRef: user-plan-sync-team
  teamName: User Plan Sync Team
  teamRoleRef: user-plan-sync-team-role
  userRoleRef: user-plan-sync-user-role-1

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - updated_at
      - resource_id
      - change_id
      - generated_at
      - email

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-bootstrap-sync-state
    commands:
      - name: 000-sync-initial
        outputFormat: json
        run:
          - sync
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: sync
          - select: summary
            expect:
              fields:
                applied: 5
                failed: 0
          - select: >-
              plan.changes[?resource_type=='organization_user_team_membership'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
          - select: >-
              plan.changes[?resource_type=='organization_user_role' &&
                            resource_ref=='{{ .vars.userRoleRef }}'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
                fields.role_name: Viewer
                fields.entity_type_name: APIs
                fields.entity_region: us

      - name: 001-diff-noop
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
          - -o
          - json
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 002-plan-sync-update
    inputOverlayDirs:
      - overlays/002-plan-sync
    commands:
      - name: 000-plan-sync
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-sync.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - sync
        assertions:
          - select: metadata
            expect:
              fields:
                mode: sync
          - select: summary
            expect:
              fields:
                total_changes: 2
                by_action.CREATE: 1
                by_action.DELETE: 1
          - select: changes[?resource_type=='organization_user_team_membership' && action=='CREATE'] | [0]
            expect:
              fields:
                action: CREATE
                namespace: "{{ .vars.namespace }}"
          - select: changes[?resource_type=='organization_user_role' && action=='DELETE'] | [0]
            expect:
              fields:
                action: DELETE
                namespace: "{{ .vars.namespace }}"

      - name: 001-diff-plan-text
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - --plan
          - "{{ .workdir }}/plan-sync.json"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, 'Plan: 1 to add, 0 to change, 1 to destroy')": true
                "contains(@, 'organization_user_team_membership \"')": true
                "contains(@, 'organization_user_team_membership \"user-plan-sync-user-2-team\" will be created')": true
                "contains(@, 'organization_user_role \"user-plan-sync-user-1|Viewer|')": true

      - name: 002-sync-plan
        outputFormat: json
        run:
          - sync
          - --plan
          - "{{ .workdir }}/plan-sync.json"
          - --auto-approve
        assertions:
          - select: plan.summary
            expect:
              fields:
                by_action.CREATE: 1
                by_action.DELETE: 1
          - select: summary
            expect:
              fields:
                applied: 2
                failed: 0

      - name: 003-diff-no-changes
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - -f
          - "{{ .workdir }}/config.yaml"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, 'No changes detected. Konnect is up to date.')": true

      - name: 004-plan-post-sync
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - sync
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 003-delete-cleanup
    inputOverlayDirs:
      - overlays/003-cleanup
    commands:
      - name: 000-sync-remove-assignments
        outputFormat: json
        run:
          - sync
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                failed: 0
                status: success

      - name: 001-delete-managed-resources
        outputFormat: json
        run:
          - delete
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                failed: 0
                status: success
