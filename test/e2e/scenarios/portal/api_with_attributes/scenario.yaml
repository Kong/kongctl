baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  apiName: "Simple API"

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - resource_id
      - change_id
      - updated_at

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-apply-with-attributes
    inputOverlayOps:
      - file: "api.yaml"
        match: "apis[?ref=='simple-api'] | [0]"
        set:
          attributes:
            owner:
              - "Portal Team"
            lifecycle:
              - "ga"
          slug: "simple-api-with-attributes"
    commands:
      - name: 000-apply
        run:
          - apply
          - -f
          - "{{ .workdir }}/api.yaml"
          - --auto-approve
        assertions:
          - name: api-plan-change
            select: "plan.changes[?resource_type=='api' && resource_ref=='simple-api'] | [0]"
            expect:
              fields:
                "fields.attributes.owner": ["Portal Team"]
                "fields.attributes.lifecycle": ["ga"]
                "fields.slug": "simple-api-with-attributes"
          - name: api-applied-change
            select: "execution.applied_changes[?resource_type=='api' && resource_ref=='simple-api'] | [0]"
            expect:
              fields:
                action: "CREATE"
                resource_name: "Simple API"
      - name: 001-get-apis
        run:
          - get
          - apis
        assertions:
          - select: "[?name=='{{ .vars.apiName }}'] | [0]"
            expect:
              fields:
                "attributes.owner": ["Portal Team"]
                "attributes.lifecycle": ["ga"]
                "slug": "simple-api-with-attributes"

  - name: 002-update-attributes
    inputOverlayDirs:
      - overlays/002-update-attributes
    commands:
      - name: 000-plan-update
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-update.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/api.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.UPDATE: 1
          - select: >-
              changes[?resource_type=='api' && resource_ref=='simple-api'] | [0]
            expect:
              fields:
                action: UPDATE
                "fields.attributes.lifecycle": ["deprecated"]
                "fields.attributes.owner": ["Platform Team"]
                "fields.slug": "simple-api-deprecated"
      - name: 001-apply-update
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-update.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 002-get-apis
        run:
          - get
          - apis
        assertions:
          - select: "[?name=='{{ .vars.apiName }}'] | [0]"
            expect:
              fields:
                "attributes.owner": ["Platform Team"]
                "attributes.lifecycle": ["deprecated"]
                "slug": "simple-api-deprecated"

  - name: 003-sync-remove-attributes
    inputOverlayDirs:
      - overlays/003-sync-remove-attributes
    commands:
      - name: 000-sync-remove
        run:
          - sync
          - -f
          - "{{ .workdir }}/api.yaml"
          - --auto-approve
        assertions:
          - select: plan.summary
            expect:
              fields:
                total_changes: 1
                by_action.UPDATE: 1
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
          - select: >-
              plan.changes[?resource_type=='api' && resource_ref=='simple-api'] | [0]
            expect:
              fields:
                action: UPDATE
      - name: 001-get-apis
        run:
          - get
          - apis
        assertions:
          - select: "[?name=='{{ .vars.apiName }}'] | [0]"
            expect:
              fields:
                name: "Simple API"
                slug: "simple-api-deprecated"
