baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: debug

vars:
  namespace: portal-auth-settings
  portalRef: portal-auth
  authSettingsRef: portal-auth-settings

defaults:
  mask:
    dropKeys:
      - id
      - change_id
      - resource_id
      - generated_at
      - created_at
      - updated_at

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-plan-apply-auth-settings
    commands:
      - name: 000-plan-auth-settings
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-auth-settings.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                total_changes: 2
                by_action.CREATE: 1
                by_action.UPDATE: 1
          - select: >-
              changes[?resource_type=='portal_auth_settings' && resource_ref=='{{ .vars.authSettingsRef }}'] | [0].fields
            expect:
              fields:
                basic_auth_enabled: true
                idp_mapping_enabled: false
                konnect_mapping_enabled: true
      - name: 001-apply-auth-settings
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-auth-settings.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 2
                failed: 0
      - name: 002-get-auth-settings
        run:
          - get
          - portal
          - auth-settings
          - --portal-name
          - "{{ .vars.portalRef }}"
          - -o
          - json
        assertions:
          - expect:
              fields:
                basic_auth_enabled: true
                idp_mapping_enabled: false
                konnect_mapping_enabled: true

  - name: 002-delete-cleanup
    commands:
      - name: 000-delete
        outputFormat: json
        run:
          - delete
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: delete
          - select: summary
            expect:
              fields:
                failed: 0
                status: success
