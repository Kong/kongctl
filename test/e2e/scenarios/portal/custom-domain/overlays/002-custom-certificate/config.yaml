_defaults:
  kongctl:
    namespace: portal-custom-domain

portals:
  - ref: portal-1
    name: "portal-1"
    display_name: "Portal 1"
    description: "Portal using HTTP verification for its custom domain"
    kongctl:
      namespace: portal-custom-domain
    custom_domain:
      ref: portal-1-custom-domain
      hostname: "{{ .vars.portal1Hostname }}"
      enabled: true
      ssl:
        domain_verification_method: http

  - ref: portal-2
    name: "portal-2"
    display_name: "Portal 2"
    description: "Portal using a self-managed certificate and Skip CA Check"
    kongctl:
      namespace: portal-custom-domain
    custom_domain:
      ref: portal-2-custom-domain
      hostname: "{{ .vars.portal2Hostname }}"
      enabled: true
      ssl:
        domain_verification_method: custom_certificate
        custom_certificate: !env KONGCTL_E2E_PORTAL_CUSTOM_CERT
        custom_private_key: !env KONGCTL_E2E_PORTAL_CUSTOM_KEY
        skip_ca_check: true
