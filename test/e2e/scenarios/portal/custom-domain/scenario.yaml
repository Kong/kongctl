baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  namespace: portal-custom-domain
  portal1Ref: portal-1
  portal1DomainRef: portal-1-custom-domain
  portal1Hostname: ""
  portal2Ref: portal-2
  portal2DomainRef: portal-2-custom-domain
  portal2Hostname: ""

defaults:
  mask:
    dropKeys:
      - id
      - change_id
      - resource_id
      - generated_at
      - created_at
      - updated_at

steps:
  - name: 000-init
    skipInputs: true
    commands:
      - name: 000-generate-portal1-hostname
        parseAs: raw
        exec:
          - bash
          - -c
          - |
            set -euo pipefail
            printf 'portal1-http-%s.kongctl-e2e.io' "$(date +%s%N | sha256sum | cut -c1-10)"
        recordVar:
          name: portal1Hostname
          responsePath: stdout

      - name: 001-generate-portal2-hostname
        parseAs: raw
        exec:
          - bash
          - -c
          - |
            set -euo pipefail
            printf 'portal2-cert-%s.kongctl-e2e.io' "$(date +%s%N | sha256sum | cut -c1-10)"
        recordVar:
          name: portal2Hostname
          responsePath: stdout

  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-plan-apply-http-domain
    inputOverlayOpsFiles:
      - overlays/001-randomize-http-domain/ops.yaml
    commands:
      - name: 000-plan-http-domain
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-http-domain.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: metadata
            expect:
              fields:
                mode: apply
          - select: summary
            expect:
              fields:
                total_changes: 2
                by_action.CREATE: 2
          - select: >-
              changes[?resource_type=='portal_custom_domain' && resource_ref=='{{ .vars.portal1DomainRef }}'] | [0].fields
            expect:
              fields:
                hostname: "{{ .vars.portal1Hostname }}"
                enabled: true
                "ssl.domain_verification_method": http
      - name: 001-apply-http-domain
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-http-domain.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 2
                failed: 0
      - name: 002-get-portals-http
        run:
          - get
          - portals
          - -o
          - json
        assertions:
          - select: "[?name=='{{ .vars.portal1Ref }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.portal1Ref }}"
                canonical_domain: "{{ .vars.portal1Hostname }}"

  - name: 002-plan-apply-custom-certificate
    inputOverlayDirs:
      - overlays/002-custom-certificate
    commands:
      - name: 000-plan-custom-cert
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-custom-cert.json"
        exec:
          - python3
          - "{{ .repo_dir }}/test/e2e/scenarios/portal/custom-domain/testdata/load_custom_cert_env.py"
          - "{{ .bin }}"
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 2
                by_action.CREATE: 2
          - select: >-
              changes[?resource_type=='portal_custom_domain' && resource_ref=='{{ .vars.portal2DomainRef }}'] | [0].fields
            expect:
              fields:
                hostname: "{{ .vars.portal2Hostname }}"
                enabled: true
                "ssl.domain_verification_method": custom_certificate
                "ssl.skip_ca_check": true
                "ssl.custom_certificate": __ENV__:KONGCTL_E2E_PORTAL_CUSTOM_CERT
                "ssl.custom_private_key": __ENV__:KONGCTL_E2E_PORTAL_CUSTOM_KEY
      - name: 001-diff-custom-cert-text
        outputFormat: text
        parseAs: raw
        run:
          - diff
          - --plan
          - "{{ .workdir }}/plan-custom-cert.json"
        assertions:
          - select: stdout
            expect:
              fields:
                "contains(@, '[redacted from !env]')": true
                "contains(@, '[REDACTED]')": true
                "contains(@, 'BEGIN CERTIFICATE')": false
                "contains(@, 'BEGIN PRIVATE KEY')": false
                "contains(@, '__ENV__:KONGCTL_E2E_PORTAL_CUSTOM_CERT')": false
      - name: 002-apply-custom-cert
        outputFormat: json
        exec:
          - python3
          - "{{ .repo_dir }}/test/e2e/scenarios/portal/custom-domain/testdata/load_custom_cert_env.py"
          - "{{ .bin }}"
          - apply
          - --plan
          - "{{ .workdir }}/plan-custom-cert.json"
          - --auto-approve
          - -o
          - json
        assertions:
          - select: summary
            expect:
              fields:
                applied: 2
                failed: 0
      - name: 003-get-portals-custom
        run: ["get", "portals", "-o", "json"]
        assertions:
          - select: "[?name=='{{ .vars.portal2Ref }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.portal2Ref }}"
                canonical_domain: "{{ .vars.portal2Hostname }}"

  - name: 003-sync-remove-custom-domain
    inputOverlayDirs:
      - overlays/003-remove-custom-domain
    commands:
      - name: 000-plan-remove-custom
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-remove-custom.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/config.yaml"
          - --mode
          - sync
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.DELETE: 1
      - name: 001-sync-remove-custom
        outputFormat: json
        run:
          - sync
          - --plan
          - "{{ .workdir }}/plan-remove-custom.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 002-get-portals-post-sync
        run: ["get", "portals", "-o", "json"]
        assertions:
          - select: "[?name=='{{ .vars.portal2Ref }}']"
            expect:
              fields:
                "length(@)": 0
          - select: "[?name=='{{ .vars.portal1Ref }}'] | [0]"
            expect:
              fields:
                canonical_domain: "{{ .vars.portal1Hostname }}"
