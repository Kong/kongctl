
application_auth_strategies:
  - ref: apikey-app-auth-strategy
    name: apikey-app-auth-strategy
    display_name: API Key Authentication
    strategy_type: key_auth
    configs:
      key-auth:
        key_names:
          - X-API-Key
          - Api-Key
  - ref: apikey-app-auth-strategy-v2
    name: apikey-app-auth-strategy-v2
    display_name: API Key Authentication V2
    strategy_type: key_auth
    configs:
      key-auth:
        key_names:
          - X-API-Key-V2
