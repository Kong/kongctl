_defaults:
  kongctl:
    namespace: portal-identity-providers

portals:
  - ref: portal-idp
    name: portal-idp
    display_name: Portal Identity Providers
    description: Portal with nested identity providers
    kongctl:
      namespace: portal-identity-providers
    auth_settings:
      ref: portal-idp-auth-settings
      idp_mapping_enabled: true
    identity_providers:
      - ref: portal-oidc
        type: oidc
        enabled: true
        config:
          issuer_url: !env KONGCTL_E2E_PORTAL_IDP_ISSUER_URL
          client_id: !env KONGCTL_E2E_PORTAL_IDP_CLIENT_ID
          client_secret: !env KONGCTL_E2E_PORTAL_IDP_CLIENT_SECRET
          scopes:
            - openid
            - profile
          claim_mappings:
            name: name
            email: email
            groups: groups
    teams:
      - ref: portal-developers
        name: Portal Developers
        description: Developers mapped from IdP groups
        group_mappings:
          - ref: portal-developers-idp-groups
            groups:
              - Portal Developers
