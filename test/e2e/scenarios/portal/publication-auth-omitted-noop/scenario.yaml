baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: debug

vars:
  portalRef: e2e-portal
  portalName: "E2E Publication Portal"
  apiRef: sms
  apiName: "E2E SMS API"
  authStrategyRef: key-auth
  publicationRef: sms-to-e2e-portal

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - updated_at
      - resource_id
      - change_id

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-apply-managed-publication
    commands:
      - name: 000-apply
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/auth-strategies.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 5
                failed: 0
                skipped: 0
                status: "success"
                total_changes: 5
          - select: >-
              plan.changes[?resource_type=='api_publication' &&
                            resource_ref=='{{ .vars.publicationRef }}'] | [0]
            expect:
              fields:
                action: "CREATE"
                "fields.auth_strategy_ids | length(@)": 1
      - name: 001-get-api-publications
        run:
          - get
          - api
          - publications
          - --api-name
          - "{{ .vars.apiName }}"
        assertions:
          - select: "[0]"
            expect:
              fields:
                visibility: "public"
                "length(auth_strategy_ids)": 1
                "contains(auth_strategy_ids[0], '-')": true

  - name: 002-omit-auth-strategy-ids
    inputOverlayDirs:
      - overlays/002-omit-auth-strategy-ids
    commands:
      - name: 000-apply-no-op
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/auth-strategies.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 0
                failed: 0
                skipped: 0
                status: "success"
                total_changes: 0
      - name: 001-get-api-publications
        run:
          - get
          - api
          - publications
          - --api-name
          - "{{ .vars.apiName }}"
        assertions:
          - select: "[0]"
            expect:
              fields:
                visibility: "public"
                "length(auth_strategy_ids)": 1
                "contains(auth_strategy_ids[0], '-')": true
      - name: 002-plan-no-op
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/auth-strategies.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0
          - select: "changes[?resource_type=='api_publication']"
            expect:
              fields:
                "length(@)": 0
