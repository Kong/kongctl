baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  portalRef: portal-snippets-pagination

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-apply-portal-snippets
    commands:
      - name: 000-apply
        run:
          - apply
          - -f
          - "{{ .workdir }}/config.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 12
                failed: 0

      - name: 001-get-snippets-default-page-size
        env:
          KONNECT_SDK_HTTP_DUMP_REQUEST: "true"
          KONNECT_SDK_HTTP_DUMP_RESPONSE: "true"
        run:
          - get
          - portal
          - snippets
          - --portal-name
          - "{{ .vars.portalRef }}"
          - -o
          - json
        assertions:
          - select: "@"
            expect:
              fields:
                "length(@)": 11
                "[?name=='snippet-banner'] | length(@)": 1
                "[?name=='snippet-nav'] | length(@)": 1
                "[?name=='snippet-toc'] | length(@)": 1
                "[?name=='snippet-11'] | length(@)": 1
          - source:
              artifact:
                glob: http-dumps/request-*.txt
            expect:
              fields:
                count: 3
