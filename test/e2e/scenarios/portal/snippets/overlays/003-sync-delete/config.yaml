_defaults:
  kongctl:
    namespace: portal-snippets

portals:
  - ref: portal-snippets
    name: portal-snippets
    display_name: Portal Snippets E2E
    description: Portal for testing snippet declarative lifecycle
    kongctl:
      namespace: portal-snippets
    snippets:
      - ref: snippet-banner
        name: snippet-banner
        title: "Welcome Banner"
        description: "A welcome banner shown on the portal home page."
        visibility: "public"
        status: "published"
        content: !file ./snippets/banner.md

      - ref: snippet-nav
        name: snippet-nav
        title: "Navigation"
        description: "A navigation snippet for the guides section."
        visibility: "public"
        status: "published"
        content: !file ./snippets/nav.md
