baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-initial-sync
    commands:
      - name: 000-sync
        run:
          - sync
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: sync
          - select: >-
              plan.changes[?resource_type=='portal' && 
                            resource_ref=='getting-started-portal'] | [0]
            expect:
              fields:
                action: CREATE

      - name: 001-get-portals
        run: ["get", "portals"]
        assertions:
          - select: "[?name=='My First Portal'] | [0]"
            expect:
              fields:
                display_name: "A Getting Started Portal"

      - name: 002-get-apis
        run: ["get", "apis"]
        assertions:
          - select: "[?name=='SMS API'] | [0]"
            expect:
              fields:
                version: "3.2.0"

  - name: 002-apply-preserves-publication
    inputOverlayDirs:
      - overlays/003-remove-sms-publication
    commands:
      - name: 000-apply-no-pub-changes
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: apply
          - select: "plan.summary"
            expect:
              fields:
                total_changes: 0

  - name: 003-remove-sms-publication
    inputOverlayDirs:
      - overlays/003-remove-sms-publication
    commands:
      - name: 000-sync-remove-publication
        run:
          - sync
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: sync
          - select: "plan.changes"
            expect:
              fields:
                "length(@)": 1
          - select: >-
              plan.changes[?resource_type=='api_publication'
              && action=='DELETE'] | [0]
            expect:
              fields:
                resource_type: api_publication
                action: DELETE
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0

      - name: 001-get-apis-sms-still-exists
        run: ["get", "apis"]
        assertions:
          - select: "[?name=='SMS API'] | [0]"
            expect:
              fields:
                name: "SMS API"
          - select: "[?name=='SMS API'] | [0].portals"
            expect:
              fields:
                "length(@)": 0

      - name: 002-idempotency
        run:
          - sync
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: plan.summary
            expect:
              fields:
                total_changes: 0

  - name: 004-dump-and-plan-round-trip
    skipInputs: true
    commands:
      - name: 000-dump-portals-and-apis
        run:
          - dump
          - declarative
          - "--resources=portals,apis"
          - --include-child-resources
        outputFormat: none
        parseAs: yaml
        stdoutFile: "{{ .workdir }}/dump.yaml"
        assertions:
          # Portal is present in dump
          - select: "portals[?name=='My First Portal'] | [0]"
            expect:
              fields:
                name: "My First Portal"
          # SMS API is present in dump (not yet deleted at this step)
          - select: "apis[?name=='SMS API'] | [0]"
            expect:
              fields:
                name: "SMS API"
          # No publications in dump (removed in step 003)
          - select: "apis[?name=='SMS API'] | [0].publications[0]"
            expect:
              fields:
                portal_id: null

      - name: 001-plan-from-dump
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/dump.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 005-delete-api
    inputOverlayDirs:
      - overlays/002-delete-api
    commands:
      - name: 000-sync
        run:
          - sync
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: "plan.metadata"
            expect:
              fields:
                mode: sync
          - select: "plan.changes"
            expect:
              fields:
                "length(@)": 1
          - select: "plan.changes[0]"
            expect:
              fields:
                resource_type: api
                resource_ref: "SMS API"
                action: DELETE
          - select: "execution.applied_changes"
            expect:
              fields:
                "length(@)": 1
          - select: "execution.applied_changes[0]"
            expect:
              fields:
                resource_type: api
                resource_ref: "SMS API"
                action: DELETE
                change_id: "1:d:api:SMS API"

      - name: 001-get-apis
        run: ["get", "apis"]
        assertions:
          - select: "[?name=='SMS API']"
            expect:
              fields:
                "length(@)": 0

  - name: 006-delete-cleanup
    inputOverlayDirs:
      - overlays/002-delete-api
    commands:
      - name: 000-delete
        run:
          - delete
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: delete
          - select: summary
            expect:
              fields:
                failed: 0
                status: success
