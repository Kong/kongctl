baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  portalName: "My First Portal"
  smsAPIName: "SMS API"

defaults:
  mask:
    dropKeys: 
      - id
      - created_at
      - resource_id 
      - change_id
      - updated_at

steps:
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  - name: 001-initial-apply
    commands:
      - name: 000-apply
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: "plan.changes[?resource_type=='portal' && resource_ref=='getting-started-portal'] | [0]"
            expect:
              file: "expect/initial-apply/portal-create-change.json"
          - select: "execution.applied_changes[?resource_type=='portal' && resource_ref=='getting-started-portal'] | [0]"
            expect:
              file: "expect/initial-apply/portal-create-applied-change.json"

      - name: 001-get-portals
        run: ["get", "portals"]
        assertions:
          - select: "[?name=='{{ .vars.portalName }}'] | [0]"
            expect:
              fields:
                authentication_enabled: false
                auto_approve_applications: false
                auto_approve_developers: false
                default_api_visibility: "public"
                default_application_auth_strategy_id: null
                default_page_visibility: "public"
                description: "A comprehensive developer portal with guides, API documentation, and getting started content"
                display_name: "A Getting Started Portal"
                'labels."KONGCTL-namespace"': "default"
                name: "{{ .vars.portalName }}"
                rbac_enabled: false

      - name: 002-get-apis
        run: ["get", "apis"]
        assertions:
          - select: "[?name=='{{ .vars.smsAPIName }}'] | [0]"
            expect:
              file: "expect/initial-apply/get-apis.json"
            mask:
              dropKeys:
                - api_spec_ids
      - name: 003-apply-no-op-after-create
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 0
                failed: 0
                skipped: 0
                status: "success"
                total_changes: 0
          - select: "plan.changes[?resource_type=='api_publication']"
            expect:
              fields:
                "length(@)": 0

  - name: 002-update-portal-settings
    inputOverlayOps:
      - file: "portal.yaml"
        match: "portals[?ref=='getting-started-portal'] | [0]"
        set:
          auto_approve_applications: true
          default_api_visibility: "private"
      - name: 000-plan-portal-update
        outputFormat: disable
        stdoutFile: "{{ .workdir }}/plan-portal-update.json"
        run:
          - plan
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 1
                by_action.UPDATE: 1
          - select: >-
              changes[?resource_type=='portal' && resource_ref=='getting-started-portal'] | [0]
            expect:
              fields:
                action: UPDATE
                "fields.auto_approve_applications": true
                "fields.default_api_visibility": "private"
      - name: 001-apply-portal-update
        outputFormat: json
        run:
          - apply
          - --plan
          - "{{ .workdir }}/plan-portal-update.json"
          - --auto-approve
        assertions:
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 002-get-portals-after-update
        run: ["get", "portals"]
        assertions:
          - select: "[?name=='{{ .vars.portalName }}'] | [0]"
            expect:
              fields:
                auto_approve_applications: true
                default_api_visibility: "private"
      - name: 003-plan-no-op-after-update
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 003-mutate-publication-visibility
    inputOverlayOps:
      - file: "apis.yaml"
        match: "apis[?ref=='sms'].publications[?ref=='sms-api-to-getting-started'] | [0]"
        set:
          visibility: "private"
    commands:
      - name: 000-apply
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: >-
              plan.changes[?resource_type=='api_publication' &&
                            resource_ref=='sms-api-to-getting-started'] | [0]
            expect:
              fields:
                action: "UPDATE"
                "fields.visibility": "private"
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 001-get-api-publications
        run:
          - get
          - api
          - publications
          - --api-name
          - "{{ .vars.smsAPIName }}"
        assertions:
          - select: "[0]"
            expect:
              fields:
                visibility: "private"

  - name: 004-restore-public-visibility
    commands:
      - name: 000-apply-restore
        run:
          - apply
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: >-
              plan.changes[?resource_type=='api_publication' &&
                            resource_ref=='sms-api-to-getting-started'] | [0]
            expect:
              fields:
                action: "UPDATE"
                "fields.visibility": "public"
          - select: summary
            expect:
              fields:
                applied: 1
                failed: 0
      - name: 001-get-api-publications
        run:
          - get
          - api
          - publications
          - --api-name
          - "{{ .vars.smsAPIName }}"
        assertions:
          - select: "[0]"
            expect:
              fields:
                visibility: "public"
      - name: 002-plan-no-op-after-restore
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0
          - select: "changes[?resource_type=='api_publication']"
            expect:
              fields:
                "length(@)": 0

  - name: 005-dump-and-plan-round-trip
    skipInputs: true
    commands:
      - name: 000-dump-api-with-publications
        run:
          - dump
          - declarative
          - "--resources=apis"
          - --include-child-resources
          - "--filter-name={{ .vars.smsAPIName }}"
        outputFormat: none
        parseAs: yaml
        stdoutFile: "{{ .workdir }}/dump.yaml"
        assertions:
          - name: api-present
            select: "apis[?name=='{{ .vars.smsAPIName }}'] | [0]"
            expect:
              fields:
                name: "{{ .vars.smsAPIName }}"
          - name: publication-visibility-public
            select: "apis[0].publications[0]"
            expect:
              fields:
                visibility: "public"
      - name: 001-plan-from-dump
        outputFormat: disable
        run:
          - plan
          - -f
          - "{{ .workdir }}/dump.yaml"
          - --mode
          - apply
        assertions:
          - select: summary
            expect:
              fields:
                total_changes: 0

  - name: 006-delete-cleanup
    commands:
      - name: 000-delete
        run:
          - delete
          - -f
          - "{{ .workdir }}/portal.yaml"
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: plan.metadata
            expect:
              fields:
                mode: delete
          - select: summary
            expect:
              fields:
                failed: 0
                status: success
