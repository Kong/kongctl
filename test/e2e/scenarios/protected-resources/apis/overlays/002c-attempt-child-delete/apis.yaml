# Overlay: Delete api_version child while parent API is protected
# Sync mode with no versions listed causes DELETE plan for the child
# This should fail because the parent API has the protected label

_defaults:
  kongctl:
    namespace: default

apis:
  - ref: customer-api
    name: "Customer API"
    description: "Production API for customer data"
    version: "1.0.0"
    kongctl:
      protected: true
      namespace: default

  - ref: test-api
    name: "Test API"
    description: "Non-critical test API"
    version: "1.0.0"
    kongctl:
      protected: false
      namespace: default
