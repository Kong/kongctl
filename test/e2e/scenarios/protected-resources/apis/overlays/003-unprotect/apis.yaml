# Overlay: Set protected: false on Customer API
# This should allow the protection label to be removed
# Version child is kept with original spec so it persists unchanged

_defaults:
  kongctl:
    namespace: default

apis:
  - ref: customer-api
    name: "Customer API"
    description: "Production API for customer data"
    version: "1.0.0"
    kongctl:
      protected: false
      namespace: default
    versions:
      - ref: customer-api-v1
        version: "1.0.0"
        deprecated: false
        spec:
          content: |
            openapi: 3.0.0
            info:
              title: Customer API
              version: 1.0.0
            paths: {}

  - ref: test-api
    name: "Test API"
    description: "Non-critical test API"
    version: "1.0.0"
    kongctl:
      protected: false
      namespace: default
