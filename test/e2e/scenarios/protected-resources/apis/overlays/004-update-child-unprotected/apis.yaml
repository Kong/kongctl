# Overlay: Update api_version child after parent API is unprotected
# This should succeed now that the parent is no longer protected

_defaults:
  kongctl:
    namespace: default

apis:
  - ref: customer-api
    name: "Customer API"
    description: "Production API for customer data"
    version: "1.0.0"
    kongctl:
      protected: false
      namespace: default
    versions:
      - ref: customer-api-v1
        version: "1.0.0"
        publish_status: "published"
        deprecated: false

  - ref: test-api
    name: "Test API"
    description: "Non-critical test API"
    version: "1.0.0"
    kongctl:
      protected: false
      namespace: default
