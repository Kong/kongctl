baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  protectedAPIName: "Customer API"
  unprotectedAPIName: "Test API"

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - resource_id
      - change_id
      - updated_at
      - api_spec_ids

steps:
  # Step 0: Clean environment
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  # Step 1: Initial sync - create protected API (with version child) and unprotected API
  - name: 001-initial-sync
    commands:
      - name: 000-sync
        run:
          - sync
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          # Verify sync mode
          - select: "plan.metadata"
            expect:
              fields:
                mode: sync

          # Verify protected API created
          - select: >-
              plan.changes[?resource_type=='api' &&
                            resource_ref=='customer-api'] | [0]
            expect:
              fields:
                action: CREATE

          # Verify api_version child created
          - select: >-
              plan.changes[?resource_type=='api_version' &&
                            resource_ref=='customer-api-v1'] | [0]
            expect:
              fields:
                action: CREATE

          # Verify unprotected API created
          - select: >-
              plan.changes[?resource_type=='api' &&
                            resource_ref=='test-api'] | [0]
            expect:
              fields:
                action: CREATE

          # Verify protection changes
          - select: "plan.summary.protection_changes"
            expect:
              fields:
                protecting: 1
                unprotecting: 0

      # Verify resources exist with proper labels
      - name: 001-get-apis
        run: ["get", "apis", "-o", "json"]
        assertions:
          # Verify Customer API has protected label
          - select: "[?name=='{{ .vars.protectedAPIName }}'] | [0]"
            expect:
              fields:
                name: "Customer API"
                labels."KONGCTL-protected": "true"
                labels."KONGCTL-namespace": "default"

          # Verify Test API does NOT have protected label
          - select: "[?name=='{{ .vars.unprotectedAPIName }}'] | [0]"
            expect:
              fields:
                name: "Test API"
                labels."KONGCTL-namespace": "default"

      # Verify api_version child exists
      - name: 002-get-api-versions
        run:
          - get
          - api
          - versions
          - --api-name
          - "{{ .vars.protectedAPIName }}"
          - -o
          - json
        assertions:
          - select: "[?version=='1.0.0'] | [0]"
            expect:
              fields:
                version: "1.0.0"

  # Step 2: Attempt to delete protected resource (should fail)
  - name: 002-attempt-delete-protected
    inputOverlayDirs:
      - overlays/002-attempt-delete
    commands:
      - name: 000-sync-should-fail
        run:
          - sync
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        expectFailure:
          exitCode: 1
          contains: "protected"

      # Verify protected resource still exists
      - name: 001-verify-protected-exists
        run: ["get", "apis", "-o", "json"]
        assertions:
          - select: "[?name=='{{ .vars.protectedAPIName }}']"
            expect:
              fields:
                "length(@)": 1

          # Verify it still has protected label
          - select: "[?name=='{{ .vars.protectedAPIName }}'] | [0]"
            expect:
              fields:
                labels."KONGCTL-protected": "true"

  # Step 2b: Attempt to update protected child resource (should fail)
  - name: 002b-attempt-child-update
    inputOverlayDirs:
      - overlays/002b-attempt-child-update
    commands:
      - name: 000-sync-should-fail
        run:
          - sync
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        expectFailure:
          exitCode: 1
          contains: "protected"

      # Verify child resource is unchanged
      - name: 001-verify-child-unchanged
        run:
          - get
          - api
          - versions
          - --api-name
          - "{{ .vars.protectedAPIName }}"
          - -o
          - json
        assertions:
          - select: "[?version=='1.0.0']"
            expect:
              fields:
                "length(@)": 1
          - select: "[?version=='1.0.0'] | [0]"
            expect:
              fields:
                version: "1.0.0"

  # Step 2c: Attempt to delete protected child resource (should fail)
  - name: 002c-attempt-child-delete
    inputOverlayDirs:
      - overlays/002c-attempt-child-delete
    commands:
      - name: 000-sync-should-fail
        run:
          - sync
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        expectFailure:
          exitCode: 1
          contains: "protected"

      # Verify child resource still exists
      - name: 001-verify-child-still-exists
        run:
          - get
          - api
          - versions
          - --api-name
          - "{{ .vars.protectedAPIName }}"
          - -o
          - json
        assertions:
          - select: "[?version=='1.0.0']"
            expect:
              fields:
                "length(@)": 1

  # Step 3: Unprotect the resource (version child is preserved in config)
  - name: 003-unprotect-resource
    inputOverlayDirs:
      - overlays/003-unprotect
    commands:
      - name: 000-sync-unprotect
        run:
          - sync
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          # Should see UPDATE action for protection change
          - select: >-
              plan.changes[?resource_type=='api' &&
                            resource_ref=='customer-api'] | [0]
            expect:
              fields:
                action: UPDATE

          # Verify execution succeeded
          - select: "summary"
            expect:
              fields:
                applied: 1
                failed: 0

          # Verify protection changes
          - select: "plan.summary.protection_changes"
            expect:
              fields:
                protecting: 0
                unprotecting: 1

      # Verify protected label removed
      - name: 001-verify-unprotected
        run: ["get", "apis", "-o", "json"]
        assertions:
          - select: "[?name=='{{ .vars.protectedAPIName }}'] | [0]"
            expect:
              fields:
                labels."KONGCTL-namespace": "default"

  # Step 4: Update child after parent is unprotected (should succeed)
  - name: 004-update-child-unprotected
    inputOverlayDirs:
      - overlays/004-update-child-unprotected
    commands:
      - name: 000-sync-update-child
        run:
          - sync
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: >-
              plan.changes[?resource_type=='api_version' &&
                            resource_ref=='customer-api-v1'] | [0]
            expect:
              fields:
                action: UPDATE
          - select: "summary"
            expect:
              fields:
                applied: 1
                failed: 0

      - name: 001-verify-child-updated
        run:
          - get
          - api
          - versions
          - --api-name
          - "{{ .vars.protectedAPIName }}"
          - -o
          - json
        assertions:
          - select: "[?version=='1.0.0'] | [0]"
            expect:
              fields:
                version: "1.0.0"

  # Step 5: Delete child after parent is unprotected (should succeed)
  - name: 005-delete-child-unprotected
    inputOverlayDirs:
      - overlays/005-delete-child-unprotected
    commands:
      - name: 000-sync-delete-child
        run:
          - sync
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          - select: "plan.changes[?resource_type=='api_version'] | [0]"
            expect:
              fields:
                action: DELETE
          - select: "summary"
            expect:
              fields:
                applied: 1
                failed: 0

      - name: 001-verify-child-deleted
        run:
          - get
          - api
          - versions
          - --api-name
          - "{{ .vars.protectedAPIName }}"
          - -o
          - json
        assertions:
          - select: "length(@)"
            expect:
              fields:
                "@": 0

  # Step 6: Delete now-unprotected parent APIs (should succeed)
  - name: 006-delete-unprotected
    inputOverlayDirs:
      - overlays/006-delete-unprotected
    commands:
      - name: 000-sync-delete
        run:
          - sync
          - -f
          - "{{ .workdir }}/apis.yaml"
          - --auto-approve
        assertions:
          # Verify DELETE action planned
          - select: >-
              plan.changes[?resource_type=='api' &&
                            resource_ref=='Customer API'] | [0]
            expect:
              fields:
                action: DELETE

          - select: >-
              plan.changes[?resource_type=='api' &&
                            resource_ref=='Test API'] | [0]
            expect:
              fields:
                action: DELETE

          # Verify execution succeeded
          - select: "summary"
            expect:
              fields:
                applied: 2
                failed: 0

      # Verify resource deleted
      - name: 001-verify-deleted
        run: ["get", "apis", "-o", "json"]
        assertions:
          - select: "[?name=='{{ .vars.protectedAPIName }}']"
            expect:
              fields:
                "length(@)": 0
