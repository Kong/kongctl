baseInputsPath: testdata

env:
  KONGCTL_LOG_LEVEL: info

vars:
  protectedControlPlaneName: "kongctl-e2e-protected-cp"

defaults:
  mask:
    dropKeys:
      - id
      - created_at
      - updated_at

steps:
  # Step 0: Clean environment
  - name: 000-reset-org
    skipInputs: true
    commands:
      - resetOrg: true

  # Step 1: Initial sync - create protected control plane
  - name: 001-initial-sync
    commands:
      - name: 000-sync
        run:
          - sync
          - -f
          - "{{ .workdir }}/control-plane.yaml"
          - --auto-approve
        assertions:
          # Verify sync mode
          - select: "plan.metadata"
            expect:
              fields:
                mode: sync

          # Verify protected control plane created
          - select: >-
              plan.changes[?resource_type=='control_plane' &&
                            resource_ref=='cp-protected'] | [0]
            expect:
              fields:
                action: CREATE

          # Verify protection changes
          - select: "plan.summary.protection_changes"
            expect:
              fields:
                protecting: 1
                unprotecting: 0

      # Verify resource exists with proper labels
      - name: 001-get-control-planes
        run:
          - get
          - konnect
          - gateway
          - control-planes
          - -o
          - json
        assertions:
          # Verify Protected Control Plane has protected label
          - select: "[?name=='{{ .vars.protectedControlPlaneName }}'] | [0]"
            expect:
              fields:
                name: "kongctl-e2e-protected-cp"
                labels."KONGCTL-protected": "true"
                labels."KONGCTL-namespace": "cp-protection"

  # Step 2: Attempt to sync-delete protected control plane (should fail)
  - name: 002-attempt-sync-delete-protected
    inputOverlayDirs:
      - overlays/002-attempt-sync-delete
    commands:
      - name: 000-sync-should-fail
        run:
          - sync
          - -f
          - "{{ .workdir }}/control-plane.yaml"
          - --auto-approve
        expectFailure:
          exitCode: 1
          contains: "protected"

      # Verify protected resource still exists
      - name: 001-verify-protected-exists
        run:
          - get
          - konnect
          - gateway
          - control-planes
          - -o
          - json
        assertions:
          - select: "[?name=='{{ .vars.protectedControlPlaneName }}']"
            expect:
              fields:
                "length(@)": 1
          # Verify it still has protected label
          - select: "[?name=='{{ .vars.protectedControlPlaneName }}'] | [0]"
            expect:
              fields:
                labels."KONGCTL-protected": "true"

  # Step 3: Unprotect the resource
  - name: 003-unprotect
    inputOverlayDirs:
      - overlays/003-unprotect
    commands:
      - name: 000-sync-unprotect
        run:
          - sync
          - -f
          - "{{ .workdir }}/control-plane.yaml"
          - --auto-approve
        assertions:
          # Should see UPDATE action for protection change
          - select: >-
              plan.changes[?resource_type=='control_plane' &&
                            resource_ref=='cp-protected'] | [0]
            expect:
              fields:
                action: UPDATE

          # Verify execution succeeded
          - select: "summary"
            expect:
              fields:
                failed: 0

          # Verify protection changes
          - select: "plan.summary.protection_changes"
            expect:
              fields:
                protecting: 0
                unprotecting: 1

      # Verify protected label removed
      - name: 001-verify-unprotected
        run:
          - get
          - konnect
          - gateway
          - control-planes
          - -o
          - json
        assertions:
          - select: "[?name=='{{ .vars.protectedControlPlaneName }}'] | [0]"
            expect:
              fields:
                labels."KONGCTL-namespace": "cp-protection"

  # Step 4: Delete now-unprotected control plane (should succeed)
  - name: 004-delete-after-unprotect
    inputOverlayDirs:
      - overlays/004-delete-after-unprotect
    commands:
      - name: 000-sync-delete
        run:
          - sync
          - -f
          - "{{ .workdir }}/control-plane.yaml"
          - --auto-approve
        assertions:
          # Verify DELETE action planned
          - select: >-
              plan.changes[?resource_type=='control_plane' &&
                            resource_ref=='{{ .vars.protectedControlPlaneName }}'] | [0]
            expect:
              fields:
                action: DELETE

          # Verify execution succeeded
          - select: "summary"
            expect:
              fields:
                applied: 1
                failed: 0

      # Verify control plane deleted
      - name: 001-verify-deleted
        run:
          - get
          - konnect
          - gateway
          - control-planes
          - -o
          - json
        assertions:
          - select: "[?name=='{{ .vars.protectedControlPlaneName }}']"
            expect:
              fields:
                "length(@)": 0
