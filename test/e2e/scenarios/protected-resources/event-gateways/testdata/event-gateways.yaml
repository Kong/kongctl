event_gateways:
  - ref: egw-protected-top-level
    name: "My Protected Event Gateway CP"
    description: "Initial description for My Protected Event Gateway CP"
    labels:
      owner: "platform"
      lifecycle: "dev"
    kongctl:
      namespace: "egw-protection"
      protected: true
    backend_clusters:
      - ref: default-backend-cluster
        name: default-backend-cluster
        description: "Protected backend cluster"
        bootstrap_servers:
          - "egw-backend-1.example.com:9092"
        authentication:
          type: anonymous
        tls:
          enabled: false
