_defaults:
  kongctl:
    namespace: default

portals:
  - ref: protected-portal
    name: "Protected Portal"
    display_name: "Protected Portal"
    description: "Protected portal for e2e coverage"
    kongctl:
      protected: true
      namespace: default

  - ref: unprotected-portal
    name: "Unprotected Portal"
    display_name: "Unprotected Portal"
    description: "Unprotected portal for e2e coverage"
    kongctl:
      namespace: default
