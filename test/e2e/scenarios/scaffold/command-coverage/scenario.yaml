test:
  requiresPAT: false

steps:
  - name: 001-scaffold-api-root
    skipInputs: true
    commands:
      - name: 000-scaffold-api
        run:
          - scaffold
          - api
        outputFormat: disable
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'apis:')": true
                "contains(stdout, '- ref: my-resource')": true
                "contains(stdout, '# versions:')": true
                "contains(stdout, 'spec_content')": false

  - name: 002-scaffold-api-versions-nested
    skipInputs: true
    commands:
      - name: 000-scaffold-api-versions
        run:
          - scaffold
          - api.versions
        outputFormat: disable
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'apis:')": true
                "contains(stdout, 'versions:')": true
                "contains(stdout, '# kongctl:')": false
                "contains(stdout, '# api:')": false

  - name: 003-scaffold-rejects-output-flag
    skipInputs: true
    commands:
      - name: 000-scaffold-api-output-json
        run:
          - scaffold
          - api
          - --output
          - json
        outputFormat: disable
        expectFailure:
          exitCode: 1
          contains: "flags -o/--output are not supported for the scaffold command"

  - name: 004-scaffold-control-plane-data-plane-certificate-root
    skipInputs: true
    commands:
      - name: 000-scaffold-control-plane-data-plane-certificate
        run:
          - scaffold
          - control_plane_data_plane_certificate
        outputFormat: disable
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'control_plane_data_plane_certificates:')": true
                "contains(stdout, '- ref: my-resource')": true
                "contains(stdout, 'control_plane: value')": true
                "contains(stdout, 'cert: !file ./certs/data-plane.pem')": true

  - name: 005-scaffold-control-plane-data-plane-certificate-nested
    skipInputs: true
    commands:
      - name: 000-scaffold-control-plane-data-plane-certificate-nested
        run:
          - scaffold
          - control_plane.data_plane_certificates
        outputFormat: disable
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'control_planes:')": true
                "contains(stdout, 'data_plane_certificates:')": true
                "contains(stdout, 'cert: !file ./certs/data-plane.pem')": true
                "contains(stdout, 'control_plane: value')": false

  - name: 006-scaffold-rejects-output-parse-error
    skipInputs: true
    commands:
      - name: 000-scaffold-api-output-path
        run:
          - scaffold
          - api
          - -o
          - docs/out.yaml
        outputFormat: disable
        expectFailure:
          exitCode: 1
          contains: "flags -o/--output are not supported for the scaffold command"

  - name: 007-scaffold-event-gateway-virtual-cluster-topic-aliases
    skipInputs: true
    commands:
      - name: 000-scaffold-event-gateway-virtual-cluster
        run:
          - scaffold
          - event_gateway_virtual_cluster
        outputFormat: disable
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'event_gateway_virtual_clusters:')": true
                "contains(stdout, '# topic_aliases:')": true
                "contains(stdout, '# - alias: value')": true
                "contains(stdout, '# condition: value')": true

  - name: 008-scaffold-ai-gateway-models-nested
    skipInputs: true
    commands:
      - name: 000-scaffold-ai-gateway-models
        run:
          - scaffold
          - ai_gateway.models
        outputFormat: disable
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'ai_gateways:')": true
                "contains(stdout, 'models:')": true
                "contains(stdout, 'route: {}')": true
                "contains(stdout, 'model: {}')": true
                "contains(stdout, '- type: openai')": true
                "contains(stdout, 'target_models:')": true
                "contains(stdout, 'provider: existing-provider-name')": true
                "contains(stdout, 'type: model')": true
                "contains(stdout, '# type: api')": true
                "contains(stdout, 'provider: openai')": false
                "contains(stdout, 'ai_gateway: value')": false
                "contains(stdout, 'kongctl:')": false

  - name: 008-scaffold-ai-gateway-nodes-nested
    skipInputs: true
    commands:
      - name: 000-scaffold-ai-gateway-nodes
        run:
          - scaffold
          - ai_gateway.nodes
        outputFormat: disable
        parseAs: raw
        assertions:
          - expect:
              fields:
                "contains(stdout, 'ai_gateways:')": true
                "contains(stdout, 'nodes:')": true
                "contains(stdout, 'id:')": true
                "contains(stdout, 'version:')": true
                "contains(stdout, 'hostname:')": true
                "contains(stdout, 'type: data-plane')": true
                "contains(stdout, 'ai_gateway: value')": false
                "contains(stdout, 'kongctl:')": false
